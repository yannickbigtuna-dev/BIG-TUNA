name: Build Lights Mac App

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-lights-mac.yml'
      - 'desktop/big-tuna-lights/**'
      - 'apps/lights/index.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/big-tuna-lights/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop/big-tuna-lights
        run: npm ci

      - name: Package unsigned macOS app
        working-directory: desktop/big-tuna-lights
        run: npm run package:mac

      - name: Publish release download
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          zip_path="apps/lights/downloads/big-tuna-lights-mac.zip"
          if gh release view lights-mac-latest >/dev/null 2>&1; then
            gh release upload lights-mac-latest "$zip_path" --clobber
          else
            gh release create lights-mac-latest "$zip_path" \
              --title "BIG TUNA Lights macOS app" \
              --notes "Unsigned macOS build of the BIG TUNA Lights desktop controller."
          fi
