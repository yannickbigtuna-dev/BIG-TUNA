<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Weather</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --text: #f6f8fb;
    --muted: rgba(246, 248, 251, 0.66);
    --line: rgba(255, 255, 255, 0.15);
    --panel: rgba(30, 44, 66, 0.64);
    --panel-strong: rgba(20, 30, 48, 0.78);
    --accent: #73c7ff;
    --warm: #ffd27a;
  }
  html, body { min-height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at 16% 8%, rgba(255, 210, 122, 0.42), transparent 28%),
      linear-gradient(155deg, #507caa 0%, #375f91 34%, #1e365e 66%, #111827 100%);
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(120deg, rgba(255,255,255,0.12), transparent 42%),
      radial-gradient(circle at 84% 14%, rgba(255,255,255,0.18), transparent 20%);
  }
  main {
    min-height: calc(100svh - 52px);
    padding: clamp(14px, 3vw, 28px);
    display: grid;
    place-items: center;
  }
  .window {
    width: min(1120px, 100%);
    min-height: min(720px, calc(100svh - 92px));
    display: grid;
    grid-template-columns: 270px 1fr;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 18px;
    background: rgba(23, 35, 55, 0.48);
    box-shadow: 0 28px 70px rgba(0,0,0,0.34), inset 0 1px 0 rgba(255,255,255,0.12);
    backdrop-filter: blur(28px) saturate(1.2);
    -webkit-backdrop-filter: blur(28px) saturate(1.2);
  }
  aside {
    padding: 16px;
    background: rgba(16, 24, 39, 0.34);
    border-right: 1px solid rgba(255,255,255,0.13);
  }
  .traffic {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  .traffic span {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }
  .traffic span:nth-child(1) { background: #ff5f57; }
  .traffic span:nth-child(2) { background: #ffbd2e; }
  .traffic span:nth-child(3) { background: #28c840; }
  .search {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    margin-bottom: 14px;
  }
  input, button {
    font: inherit;
  }
  #city-input {
    min-width: 0;
    height: 38px;
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 9px;
    padding: 0 11px;
    color: var(--text);
    background: rgba(255,255,255,0.1);
    outline: none;
  }
  #city-input::placeholder { color: rgba(255,255,255,0.52); }
  #city-input:focus { border-color: rgba(115,199,255,0.72); }
  button {
    border: 0;
    border-radius: 9px;
    color: #102033;
    background: var(--accent);
    font-weight: 800;
    cursor: pointer;
  }
  #search-btn {
    width: 42px;
    display: grid;
    place-items: center;
  }
  .loc-list {
    display: grid;
    gap: 8px;
  }
  .loc {
    width: 100%;
    min-height: 64px;
    padding: 9px 10px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 8px;
    text-align: left;
    color: var(--text);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .loc.active {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.24);
  }
  .loc-name {
    display: block;
    font-weight: 800;
    line-height: 1.2;
  }
  .loc-meta {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-size: 0.75rem;
  }
  .loc-temp {
    font-size: 1.25rem;
    font-weight: 300;
  }
  .content {
    padding: clamp(18px, 3.4vw, 34px);
    overflow: auto;
  }
  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: start;
    gap: 22px;
    margin-bottom: 24px;
  }
  .place {
    font-size: clamp(2rem, 6vw, 4.3rem);
    font-weight: 720;
    letter-spacing: 0;
    line-height: 1;
  }
  .condition {
    margin-top: 8px;
    color: var(--muted);
    font-size: 1.05rem;
  }
  .temp {
    font-size: clamp(4.8rem, 12vw, 8.5rem);
    font-weight: 180;
    line-height: 0.86;
    white-space: nowrap;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 11px;
    margin-bottom: 16px;
  }
  .card, .forecast, .hourly {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .card {
    min-height: 94px;
    padding: 13px;
  }
  .label {
    color: rgba(255,255,255,0.58);
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .value {
    margin-top: 13px;
    font-size: 1.45rem;
    font-weight: 720;
  }
  .hourly {
    margin-bottom: 16px;
    padding: 14px 13px;
  }
  .hour-strip {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: minmax(68px, 1fr);
    gap: 8px;
    overflow-x: auto;
    padding-top: 12px;
  }
  .hour {
    min-height: 96px;
    display: grid;
    justify-items: center;
    align-content: space-between;
    padding: 8px 6px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
  }
  .hour-time, .day-detail {
    color: var(--muted);
    font-size: 0.76rem;
    font-weight: 700;
  }
  .weather-icon {
    font-size: 1.35rem;
    line-height: 1;
  }
  .forecast {
    padding: 8px 13px;
  }
  .day {
    min-height: 48px;
    display: grid;
    grid-template-columns: 76px 34px 1fr 58px;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.11);
  }
  .day:last-child { border-bottom: 0; }
  .bar {
    height: 5px;
    border-radius: 999px;
    background: rgba(255,255,255,0.16);
    overflow: hidden;
  }
  .bar span {
    display: block;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #75cfff, #ffd27a);
  }
  .status {
    min-height: 20px;
    margin-top: 10px;
    color: rgba(255,255,255,0.72);
    font-size: 0.84rem;
  }
  @media (max-width: 820px) {
    main { display: block; padding: 10px; }
    .window {
      min-height: calc(100svh - 72px);
      grid-template-columns: 1fr;
      border-radius: 14px;
    }
    aside {
      border-right: 0;
      border-bottom: 1px solid rgba(255,255,255,0.13);
    }
    .traffic { display: none; }
    .loc-list {
      grid-auto-flow: column;
      grid-auto-columns: minmax(190px, 1fr);
      overflow-x: auto;
    }
    .hero { grid-template-columns: 1fr; }
    .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .temp { font-size: 5.1rem; }
    .day { grid-template-columns: 64px 30px 1fr 52px; }
  }
  @media (max-width: 480px) {
    .cards { grid-template-columns: 1fr; }
    .content { padding: 16px; }
    .place { font-size: 2.15rem; }
    .temp { font-size: 4.6rem; }
  }
</style>
</head>
<body>
<main>
  <section class="window" aria-label="Weather app">
    <aside>
      <div class="traffic" aria-hidden="true"><span></span><span></span><span></span></div>
      <form class="search" id="search-form">
        <input id="city-input" type="search" placeholder="Search city" autocomplete="off" spellcheck="false">
        <button id="search-btn" type="submit" aria-label="Search">⌕</button>
      </form>
      <div class="loc-list" id="locations"></div>
      <div class="status" id="status"></div>
    </aside>
    <section class="content">
      <div class="hero">
        <div>
          <div class="place" id="place">Weather</div>
          <div class="condition" id="condition">Loading forecast...</div>
        </div>
        <div class="temp" id="temp">--°</div>
      </div>
      <section class="cards" aria-label="Current conditions">
        <div class="card"><div class="label">Feels Like</div><div class="value" id="feels">--°</div></div>
        <div class="card"><div class="label">Wind</div><div class="value" id="wind">--</div></div>
        <div class="card"><div class="label">Humidity</div><div class="value" id="humidity">--</div></div>
        <div class="card"><div class="label">Precip</div><div class="value" id="precip">--</div></div>
      </section>
      <section class="hourly" aria-label="Hourly forecast">
        <div class="label">Hourly Forecast</div>
        <div class="hour-strip" id="hourly"></div>
      </section>
      <section class="forecast" aria-label="7-day forecast" id="daily"></section>
    </section>
  </section>
</main>
<script src="/topbar.js"></script>
<script>
  Topbar.setTitle('Weather');

  const HALIFAX = { name: 'Halifax', admin: 'Nova Scotia', country: 'Canada', latitude: 44.6488, longitude: -63.5752, fallback: true };
  const STORAGE_KEY = 'weather_locations';
  const LAST_KEY = 'weather_last_location';
  const state = {
    locations: loadLocations(),
    selected: null,
    weatherByKey: new Map(),
  };

  const els = {
    form: document.getElementById('search-form'),
    input: document.getElementById('city-input'),
    locations: document.getElementById('locations'),
    status: document.getElementById('status'),
    place: document.getElementById('place'),
    condition: document.getElementById('condition'),
    temp: document.getElementById('temp'),
    feels: document.getElementById('feels'),
    wind: document.getElementById('wind'),
    humidity: document.getElementById('humidity'),
    precip: document.getElementById('precip'),
    hourly: document.getElementById('hourly'),
    daily: document.getElementById('daily'),
  };

  function keyFor(loc) {
    return `${Number(loc.latitude).toFixed(3)},${Number(loc.longitude).toFixed(3)}`;
  }
  function loadLocations() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      return Array.isArray(saved) && saved.length ? saved : [HALIFAX];
    } catch {
      return [HALIFAX];
    }
  }
  function saveLocations() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.locations));
  }
  function setStatus(text, isError = false) {
    els.status.textContent = text || '';
    els.status.style.color = isError ? '#ffd1cc' : '';
  }
  function weatherCode(code) {
    const map = {
      0: ['☀', 'Clear'], 1: ['🌤', 'Mostly clear'], 2: ['⛅', 'Partly cloudy'], 3: ['☁', 'Cloudy'],
      45: ['🌫', 'Fog'], 48: ['🌫', 'Rime fog'], 51: ['🌦', 'Light drizzle'], 53: ['🌦', 'Drizzle'],
      55: ['🌧', 'Heavy drizzle'], 61: ['🌧', 'Light rain'], 63: ['🌧', 'Rain'], 65: ['🌧', 'Heavy rain'],
      71: ['🌨', 'Light snow'], 73: ['🌨', 'Snow'], 75: ['🌨', 'Heavy snow'], 80: ['🌦', 'Rain showers'],
      81: ['🌦', 'Rain showers'], 82: ['⛈', 'Heavy showers'], 95: ['⛈', 'Thunderstorm'],
    };
    return map[code] || ['•', 'Forecast'];
  }
  function fmtTemp(value) {
    return Number.isFinite(value) ? `${Math.round(value)}°` : '--°';
  }
  function fmtTime(iso) {
    return new Date(iso).toLocaleTimeString([], { hour: 'numeric' });
  }
  function fmtDay(iso, index) {
    if (index === 0) return 'Today';
    return new Date(`${iso}T12:00:00`).toLocaleDateString([], { weekday: 'short' });
  }
  function renderLocations() {
    const selectedKey = state.selected ? keyFor(state.selected) : '';
    els.locations.innerHTML = state.locations.map(loc => {
      const key = keyFor(loc);
      const weather = state.weatherByKey.get(key);
      return `<button class="loc${key === selectedKey ? ' active' : ''}" data-key="${key}" type="button">
        <span><span class="loc-name">${loc.name}</span><span class="loc-meta">${[loc.admin, loc.country].filter(Boolean).join(', ') || 'Saved location'}</span></span>
        <span class="loc-temp">${weather ? fmtTemp(weather.current.temperature_2m) : '--°'}</span>
      </button>`;
    }).join('');
  }
  function renderWeather(loc, data) {
    const [icon, label] = weatherCode(data.current.weather_code);
    els.place.textContent = loc.name;
    els.condition.textContent = `${icon} ${label}`;
    els.temp.textContent = fmtTemp(data.current.temperature_2m);
    els.feels.textContent = fmtTemp(data.current.apparent_temperature);
    els.wind.textContent = `${Math.round(data.current.wind_speed_10m)} km/h`;
    els.humidity.textContent = `${Math.round(data.current.relative_humidity_2m)}%`;
    els.precip.textContent = `${Math.round(data.daily.precipitation_sum[0] || 0)} mm`;

    const nowIndex = Math.max(0, data.hourly.time.findIndex(t => new Date(t) >= new Date()));
    els.hourly.innerHTML = data.hourly.time.slice(nowIndex, nowIndex + 12).map((time, offset) => {
      const index = nowIndex + offset;
      const [hourIcon] = weatherCode(data.hourly.weather_code[index]);
      return `<div class="hour">
        <div class="hour-time">${offset === 0 ? 'Now' : fmtTime(time)}</div>
        <div class="weather-icon">${hourIcon}</div>
        <div>${fmtTemp(data.hourly.temperature_2m[index])}</div>
      </div>`;
    }).join('');

    const minAll = Math.min(...data.daily.temperature_2m_min);
    const maxAll = Math.max(...data.daily.temperature_2m_max);
    const span = Math.max(1, maxAll - minAll);
    els.daily.innerHTML = data.daily.time.map((day, index) => {
      const [dayIcon] = weatherCode(data.daily.weather_code[index]);
      const min = data.daily.temperature_2m_min[index];
      const max = data.daily.temperature_2m_max[index];
      const width = Math.max(12, ((max - minAll) / span) * 100);
      return `<div class="day">
        <strong>${fmtDay(day, index)}</strong>
        <span class="weather-icon">${dayIcon}</span>
        <div class="bar"><span style="width:${width}%"></span></div>
        <span class="day-detail">${Math.round(min)}° ${Math.round(max)}°</span>
      </div>`;
    }).join('');
  }
  async function fetchWeather(loc) {
    const params = new URLSearchParams({
      latitude: loc.latitude,
      longitude: loc.longitude,
      current: 'temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,weather_code,wind_speed_10m',
      hourly: 'temperature_2m,weather_code',
      daily: 'weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum',
      timezone: 'auto',
      temperature_unit: 'celsius',
      wind_speed_unit: 'kmh',
    });
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
    if (!res.ok) throw new Error('Weather request failed');
    return res.json();
  }
  async function selectLocation(loc) {
    state.selected = loc;
    localStorage.setItem(LAST_KEY, keyFor(loc));
    renderLocations();
    setStatus('Updating...');
    try {
      const data = await fetchWeather(loc);
      state.weatherByKey.set(keyFor(loc), data);
      renderWeather(loc, data);
      renderLocations();
      setStatus('');
    } catch {
      if (keyFor(loc) !== keyFor(HALIFAX)) {
        setStatus('Weather unavailable. Showing Halifax.', true);
        await selectLocation(HALIFAX);
      } else {
        setStatus('Weather unavailable.', true);
      }
    }
  }
  function addLocation(loc) {
    const key = keyFor(loc);
    state.locations = [loc, ...state.locations.filter(item => keyFor(item) !== key)].slice(0, 8);
    saveLocations();
    selectLocation(loc);
  }
  async function searchCity(query) {
    const params = new URLSearchParams({ name: query, count: '1', language: 'en', format: 'json' });
    const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?${params}`);
    if (!res.ok) throw new Error('Search failed');
    const data = await res.json();
    const hit = data.results && data.results[0];
    if (!hit) throw new Error('City not found');
    return {
      name: hit.name,
      admin: hit.admin1 || '',
      country: hit.country || '',
      latitude: hit.latitude,
      longitude: hit.longitude,
    };
  }
  function geolocate() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) {
        reject(new Error('Geolocation unavailable'));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        pos => resolve({ name: 'Current Location', admin: '', country: '', latitude: pos.coords.latitude, longitude: pos.coords.longitude }),
        reject,
        { enableHighAccuracy: false, timeout: 7000, maximumAge: 600000 }
      );
    });
  }

  els.locations.addEventListener('click', event => {
    const btn = event.target.closest('.loc');
    if (!btn) return;
    const loc = state.locations.find(item => keyFor(item) === btn.dataset.key);
    if (loc) selectLocation(loc);
  });
  els.form.addEventListener('submit', async event => {
    event.preventDefault();
    const query = els.input.value.trim();
    if (!query) return;
    setStatus('Searching...');
    try {
      const loc = await searchCity(query);
      els.input.value = '';
      addLocation(loc);
    } catch (error) {
      setStatus(error.message || 'Search failed', true);
    }
  });

  (async function init() {
    renderLocations();
    const last = localStorage.getItem(LAST_KEY);
    const saved = state.locations.find(loc => keyFor(loc) === last);
    try {
      if (saved) {
        await selectLocation(saved);
      } else {
        const loc = await geolocate();
        addLocation(loc);
      }
    } catch {
      await selectLocation(saved || HALIFAX);
    }
  })();
</script>
</body>
</html>
