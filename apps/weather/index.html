<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Weather</title>
<link rel="stylesheet" href="/styles/tokens.css">
<style>
  /* ── App-level layout overrides (tokens.css handles reset + base body) ── */
  :root {
    /* local aliases for glass-tint layering */
    --glass-line: color-mix(in srgb, var(--border-strong) 55%, transparent);
    --soft-ease: cubic-bezier(0.2, 0.8, 0.2, 1);
    /* window glass: surface token at 80% opacity so backdrop-filter shows through */
    --window-bg:  color-mix(in srgb, var(--surface) 82%, transparent);
    /* sidebar slightly darker glass */
    --sidebar-bg: color-mix(in srgb, var(--bg-raised) 72%, transparent);
    /* panel/card glass – one step above surface */
    --panel-bg:   color-mix(in srgb, var(--surface-2) 78%, transparent);
    /* nested surface inside detail panels */
    --nested-bg:  color-mix(in srgb, var(--surface-3) 70%, transparent);
    /* window-level shadow */
    --window-shadow: var(--shadow-3);
    /* card-level shadow (elevation 2) */
    --card-shadow: var(--shadow-2);
    /* accent-tinted highlight inset used on selected states */
    --accent-inset: color-mix(in srgb, var(--accent) 16%, transparent);
  }

  html, body { min-height: 100%; }
  body {
    /* Dark page background from tokens; subtle radial accent tint replaces the old light gradients */
    background:
      radial-gradient(circle at 12% 12%, color-mix(in srgb, var(--accent) 6%, transparent), transparent 34%),
      radial-gradient(circle at 86% 78%, color-mix(in srgb, var(--accent-press) 4%, transparent), transparent 34%),
      var(--bg);
  }

  main {
    min-height: calc(100svh - 52px);
    padding: clamp(18px, 3vw, 34px);
    display: grid;
    place-items: center;
  }

  /* ── Glass window ── */
  .window {
    width: min(1368px, 100%);
    min-height: min(860px, calc(100svh - 96px));
    display: grid;
    grid-template-columns: 324px minmax(0, 1fr);
    overflow: hidden;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border-strong);
    background: var(--window-bg);
    box-shadow: var(--window-shadow);
    backdrop-filter: blur(34px) saturate(1.25);
    -webkit-backdrop-filter: blur(34px) saturate(1.25);
  }

  /* ── Sidebar ── */
  .sidebar {
    min-width: 0;
    padding: 20px 16px;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    gap: 14px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--glass-line);
    backdrop-filter: blur(30px) saturate(1.18);
    -webkit-backdrop-filter: blur(30px) saturate(1.18);
  }

  /* macOS traffic-light dots — kept as functional OS-chrome decoration */
  .traffic {
    display: flex;
    gap: 10px;
    padding: 2px 6px 12px;
  }
  .traffic span {
    width: 14px;
    height: 14px;
    border-radius: var(--radius-full);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--text) 8%, transparent);
  }
  .traffic span:nth-child(1) { background: #ff5f57; }   /* macOS red   — functional chrome */
  .traffic span:nth-child(2) { background: #ffbd2e; }   /* macOS amber — functional chrome */
  .traffic span:nth-child(3) { background: #28c840; }   /* macOS green — functional chrome */

  /* ── Search ── */
  .search {
    position: relative;
  }
  .search::before {
    content: "";
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    width: 13px;
    height: 13px;
    border: 2px solid color-mix(in srgb, var(--text-dim) 90%, transparent);
    border-radius: var(--radius-full);
  }
  .search::after {
    content: "";
    position: absolute;
    left: 25px;
    top: 25px;
    width: 7px;
    height: 2px;
    border-radius: var(--radius-full);
    background: color-mix(in srgb, var(--text-dim) 90%, transparent);
    transform: rotate(45deg);
    pointer-events: none;
  }
  #city-input {
    width: 100%;
    height: 36px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 0 12px 0 40px;
    color: var(--text);
    background: color-mix(in srgb, var(--surface-2) 72%, transparent);
    outline: none;
    font: inherit;
    font-family: var(--font-ui);
  }
  #city-input::placeholder { color: var(--text-dim); }
  #city-input:focus {
    border-color: var(--accent);
    box-shadow: var(--ring);
  }

  /* ── Location list ── */
  .locations {
    display: grid;
    gap: 8px;
    align-content: start;
    overflow: auto;
    padding-right: 2px;
  }
  .loc {
    width: 100%;
    min-height: 74px;
    display: grid;
    grid-template-columns: 46px 1fr auto;
    align-items: center;
    gap: 11px;
    border: 0;
    border-radius: var(--radius);
    padding: 10px 12px;
    color: var(--text);
    background: transparent;
    text-align: left;
    cursor: pointer;
    font-family: var(--font-ui);
    transition: background 160ms var(--soft-ease), box-shadow 160ms var(--soft-ease), transform 160ms var(--soft-ease);
  }
  .loc.active {
    background: var(--accent-soft);
    box-shadow: inset 0 0 0 1px var(--accent-inset);
  }
  .loc:hover { background: color-mix(in srgb, var(--surface-3) 66%, transparent); }
  .loc:active { transform: scale(0.985); }
  .loc:focus-visible { outline: none; box-shadow: var(--ring); border-radius: var(--radius); }

  .loc-icon, .large-icon, .hour-icon, .day-icon {
    display: inline-grid;
    place-items: center;
    line-height: 1;
    filter: drop-shadow(0 5px 5px color-mix(in srgb, var(--bg) 55%, transparent));
  }
  .loc-icon { font-size: 1.9rem; }
  .loc-name {
    display: block;
    font-weight: var(--weight-bold);
    font-size: 0.96rem;
    letter-spacing: -0.01em;
  }
  .loc-condition {
    display: block;
    margin-top: 4px;
    color: var(--text-muted);
    font-size: 0.86rem;
  }
  .loc-temp {
    font-size: 1.42rem;
    font-weight: 400;
    color: var(--text);
  }

  /* ── Sidebar footer ── */
  .sidebar-foot {
    min-height: 42px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    background: color-mix(in srgb, var(--surface-2) 46%, transparent);
    border: 1px solid var(--border);
  }
  .add-btn, .chev, .search button {
    border: 0;
    background: transparent;
    color: inherit;
    font: inherit;
    cursor: pointer;
  }
  .search button { display: none; }
  .add-btn { font-size: 1.9rem; line-height: 1; }

  /* ── Main content pane ── */
  .content {
    min-width: 0;
    padding: 30px 38px 26px;
    overflow: auto;
  }

  /* ── Hero / current conditions ── */
  .hero {
    position: relative;
    min-height: 246px;
    display: grid;
    grid-template-columns: minmax(340px, 1fr) minmax(360px, 48%);
    align-items: start;
    gap: 28px;
    margin-bottom: 14px;
    padding: 24px;
    border: 1px solid var(--glass-line);
    border-radius: var(--radius-lg);
    background:
      radial-gradient(circle at 80% 18%, color-mix(in srgb, var(--accent) 8%, transparent), transparent 24%),
      color-mix(in srgb, var(--surface) 70%, transparent);
    box-shadow: var(--shadow-2);
    backdrop-filter: blur(28px) saturate(1.12);
    -webkit-backdrop-filter: blur(28px) saturate(1.12);
  }
  .place-row {
    display: flex;
    align-items: center;
    gap: 9px;
    margin: 0 0 20px;
    font-size: 1.56rem;
    font-weight: 760;
    letter-spacing: -0.02em;
  }
  .place-row .down { color: var(--text-muted); font-size: 1.1rem; }
  .temp {
    font-size: clamp(6.8rem, 10vw, 8.7rem);
    line-height: 0.83;
    font-weight: 520;
    letter-spacing: -0.08em;
  }
  .condition {
    margin-top: 18px;
    font-size: 1.62rem;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .hi-lo {
    margin-top: 11px;
    display: flex;
    gap: 22px;
    color: var(--text-muted);
    font-size: 1.05rem;
    font-weight: 560;
  }

  /* ── Wind compass / current-meta ── */
  .current-meta {
    position: absolute;
    left: auto;
    right: calc(48% + 34px);
    top: auto;
    bottom: 26px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-width: 104px;
    color: var(--text-muted);
    font-size: 0.86rem;
    font-weight: 650;
    letter-spacing: -0.02em;
    text-align: center;
    z-index: 2;
    cursor: pointer;
    padding: 9px 11px;
    border: 1px solid var(--glass-line);
    border-radius: var(--radius-lg);
    background: color-mix(in srgb, var(--surface-2) 46%, transparent);
    transition: border-color 160ms var(--soft-ease), background 160ms var(--soft-ease), box-shadow 160ms var(--soft-ease);
  }
  .current-meta span:last-child {
    white-space: nowrap;
  }
  .current-meta:focus-visible { outline: none; box-shadow: var(--ring); }
  .current-meta.is-selected {
    border-color: var(--accent);
    background: var(--accent-soft);
    box-shadow: 0 8px 22px color-mix(in srgb, var(--accent) 13%, transparent);
  }

  /* Wind compass dial */
  .wind-compass {
    width: min(var(--wind-size, 52px), 58px);
    height: min(var(--wind-size, 52px), 58px);
    display: inline-grid;
    place-items: center;
    position: relative;
    border-radius: var(--radius-full);
    background:
      radial-gradient(circle, color-mix(in srgb, var(--surface-3) 76%, transparent) 0 48%, transparent 49%),
      conic-gradient(from 0deg, color-mix(in srgb, var(--text) 34%, transparent) 0deg 2deg, transparent 2deg 45deg, color-mix(in srgb, var(--text) 18%, transparent) 45deg 47deg, transparent 47deg 90deg);
    border: 1px solid var(--border-strong);
    box-shadow: var(--shadow-1);
  }
  .wind-compass::before {
    content: "";
    position: absolute;
    inset: 16%;
    border-radius: var(--radius-full);
    border: 1px solid var(--border);
  }

  /* Wind arrow — use accent so it reads clearly on dark glass */
  .wind-arrow {
    position: absolute;
    left: 50%;
    top: 50%;
    width: max(2px, calc(var(--wind-size, 64px) * 0.035));
    height: 39%;
    border-radius: var(--radius-full);
    background: var(--accent);
    transform: translate(-50%, -100%) rotate(var(--wind-rotation, 0deg));
    transform-origin: 50% 100%;
    filter: drop-shadow(0 4px 7px color-mix(in srgb, var(--accent) 30%, transparent));
    transition: transform 180ms ease;
  }
  .wind-arrow::after {
    content: "";
    position: absolute;
    left: 50%;
    top: -2px;
    width: 0;
    height: 0;
    border-left: max(5px, calc(var(--wind-size, 64px) * 0.08)) solid transparent;
    border-right: max(5px, calc(var(--wind-size, 64px) * 0.08)) solid transparent;
    border-bottom: max(10px, calc(var(--wind-size, 64px) * 0.16)) solid var(--accent);
    transform: translateX(-50%);
  }

  /* ── Decorative sky illustration ── */
  .sky-card {
    position: relative;
    min-height: 232px;
    align-self: stretch;
    overflow: hidden;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    border-radius: 20px;
    /* Subtle dark tone-on-tone sky — conveys "current conditions" without the old light gradients */
    background:
      radial-gradient(circle at 72% 32%, color-mix(in srgb, var(--accent) 10%, transparent), transparent 19%),
      color-mix(in srgb, var(--surface-2) 62%, transparent);
    opacity: 0.9;
  }
  .sky-card::before,
  .sky-card::after {
    content: "";
    position: absolute;
    border-radius: var(--radius-full);
    background: color-mix(in srgb, var(--surface-3) 70%, transparent);
    filter: blur(2px);
  }
  .sky-card::before {
    width: 260px;
    height: 86px;
    right: 18px;
    top: 112px;
    box-shadow: -95px 20px 55px color-mix(in srgb, var(--surface-3) 40%, transparent), -180px 40px 70px color-mix(in srgb, var(--surface-3) 25%, transparent);
  }
  .sky-card::after {
    width: 170px;
    height: 58px;
    right: 100px;
    top: 92px;
    opacity: 0.76;
  }

  /* ── Metric cards ── */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, minmax(128px, 1fr));
    gap: 14px;
    margin-bottom: 12px;
  }
  .metric {
    appearance: none;
    border: 1px solid var(--glass-line);
    color: inherit;
    text-align: left;
    font: inherit;
    font-family: var(--font-ui);
    cursor: pointer;
    min-height: 86px;
    display: grid;
    grid-template-columns: 30px 1fr;
    align-items: center;
    gap: 11px;
    padding: 15px 18px;
    border-radius: var(--radius-lg);
    background: var(--panel-bg);
    box-shadow: var(--shadow-2);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    transition: background 160ms var(--soft-ease), box-shadow 160ms var(--soft-ease), transform 160ms var(--soft-ease), border-color 160ms var(--soft-ease);
  }
  .metric.is-expanded {
    grid-column: auto;
    animation: none;
  }
  .metric:hover { background: color-mix(in srgb, var(--surface-2) 66%, transparent); }
  .metric.is-selected {
    border-color: var(--accent);
    background: var(--accent-soft);
    box-shadow: 0 14px 36px color-mix(in srgb, var(--accent) 14%, transparent), var(--shadow-1);
  }
  .metric:focus-visible {
    outline: none;
    box-shadow: var(--ring);
  }
  .metric:active { transform: scale(0.985); }
  .metric-icon {
    color: var(--text-muted);
    font-size: 1.48rem;
  }
  .metric:nth-child(3) .metric-icon { color: var(--accent); }
  .metric-label {
    display: block;
    color: var(--text-muted);
    font-size: 0.83rem;
    font-weight: 560;
  }
  .metric-value {
    display: block;
    margin-top: 6px;
    color: var(--text);
    font-size: 1.34rem;
    font-weight: 560;
  }
  .metric-detail {
    grid-column: 1 / -1;
    min-width: 0;
    margin-top: 4px;
    overflow: hidden;
    transform-origin: top;
    animation: metricDetailSlideOpen 820ms cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .metric-detail.is-closing {
    animation: metricDetailSlideClose 820ms cubic-bezier(0.7, 0, 0.84, 0) both;
  }

  /* ── Detail panels ── */
  .detail-panel {
    margin: -4px 0 22px;
    padding: 18px;
    overflow: hidden;
    border: 1px solid var(--glass-line);
    border-radius: var(--radius-lg);
    background: color-mix(in srgb, var(--surface-2) 58%, transparent);
    box-shadow: var(--shadow-2);
    backdrop-filter: blur(24px) saturate(1.12);
    -webkit-backdrop-filter: blur(24px) saturate(1.12);
    transform-origin: top;
    animation: detailSlideOpen 420ms var(--soft-ease) both;
  }
  .detail-panel.is-closing {
    animation: detailSlideClose 820ms cubic-bezier(0.7, 0, 0.84, 0) both;
    pointer-events: none;
  }
  .hour-detail-stack {
    display: grid;
    gap: 10px;
    margin-top: 12px;
  }
  .hour-detail-panel {
    margin: 0;
  }
  .detail-panel[hidden] { display: none; }
  .wind-detail-panel:empty { display: none; }
  .wind-detail-panel {
    margin: -2px 0 18px;
  }

  @keyframes detailSlideOpen {
    from {
      max-height: 0;
      opacity: 0;
      clip-path: inset(0 0 100% 0 round 16px);
      transform: translateY(-8px);
    }
    to {
      max-height: 760px;
      opacity: 1;
      clip-path: inset(0 0 0 0 round 16px);
      transform: translateY(0);
    }
  }
  @keyframes detailSlideClose {
    from {
      max-height: 760px;
      opacity: 1;
      clip-path: inset(0 0 0 0 round 16px);
      transform: translateY(0);
    }
    to {
      max-height: 0;
      opacity: 0;
      clip-path: inset(0 0 100% 0 round 16px);
      transform: translateY(-8px);
    }
  }
  @keyframes metricCardOpen {
    from { transform: translateY(-3px); }
    to   { transform: translateY(0); }
  }
  @keyframes metricDetailSlideOpen {
    from {
      max-height: 0;
      opacity: 0;
      clip-path: inset(0 0 100% 0 round 12px);
      transform: translateY(-6px);
    }
    to {
      max-height: 640px;
      opacity: 1;
      clip-path: inset(0 0 0 0 round 12px);
      transform: translateY(0);
    }
  }
  @keyframes metricDetailSlideClose {
    from {
      max-height: 640px;
      opacity: 1;
      clip-path: inset(0 0 0 0 round 12px);
      transform: translateY(0);
    }
    to {
      max-height: 0;
      opacity: 0;
      clip-path: inset(0 0 100% 0 round 12px);
      transform: translateY(-6px);
    }
  }

  /* ── Detail panel internals ── */
  .detail-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 14px;
  }
  .detail-title {
    margin: 0;
    color: var(--text);
    font-size: 1rem;
    font-weight: 720;
  }
  .detail-copy {
    max-width: 520px;
    margin: 5px 0 0;
    color: var(--text-muted);
    font-size: 0.82rem;
    line-height: 1.45;
  }
  .detail-current {
    color: var(--text);
    font-size: 1.55rem;
    font-weight: 640;
    white-space: nowrap;
  }
  .detail-back {
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-full);
    padding: 7px 12px;
    color: var(--accent);
    background: var(--accent-soft);
    font: inherit;
    font-family: var(--font-ui);
    font-size: 0.78rem;
    font-weight: var(--weight-bold);
    cursor: pointer;
    transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease);
  }
  .detail-back:hover { background: color-mix(in srgb, var(--accent) 20%, transparent); border-color: var(--accent); }
  .detail-back:focus-visible { outline: none; box-shadow: var(--ring); }

  /* ── SVG line chart — accent used for the data line/dots; grid uses tokens ── */
  .line-chart {
    width: 100%;
    height: 176px;
    display: block;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: color-mix(in srgb, var(--surface-2) 62%, transparent);
  }
  .chart-grid {
    stroke: var(--border);
    stroke-width: 1;
  }
  /* Chart data line — intentional accent; encodes data, not decoration */
  .chart-line {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  /* Chart fill — intentional accent-soft tint; encodes data area */
  .chart-fill {
    fill: var(--accent-soft);
  }
  /* Chart dots — intentional accent; marks data points */
  .chart-dot {
    fill: var(--accent);
    stroke: var(--surface-2);
    stroke-width: 3;
  }
  .chart-axis {
    fill: var(--text-dim);
    font-size: 10px;
    font-weight: 600;
  }

  /* ── Detail tile grid ── */
  .detail-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }
  .detail-tile {
    min-height: 64px;
    padding: 11px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: color-mix(in srgb, var(--surface-3) 48%, transparent);
  }
  .tile-label {
    display: block;
    color: var(--text-dim);
    font-size: 0.72rem;
    font-weight: 680;
  }
  .tile-value {
    display: block;
    margin-top: 6px;
    color: var(--text);
    font-size: 1rem;
    font-weight: 650;
  }

  /* ── Wind series / day-hour strip ── */
  .wind-series,
  .day-hour-strip {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: minmax(74px, 1fr);
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .wind-series::-webkit-scrollbar,
  .day-hour-strip::-webkit-scrollbar { display: none; }
  .wind-point,
  .day-hour {
    display: grid;
    justify-items: center;
    gap: 7px;
    padding: 12px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: color-mix(in srgb, var(--surface-3) 43%, transparent);
    color: var(--text-muted);
    font-size: 0.75rem;
    font-weight: 650;
  }

  /* Mini wind arrow inside wind-series cards */
  .mini-arrow {
    width: 28px;
    height: 28px;
    display: grid;
    place-items: center;
    border-radius: var(--radius-full);
    border: 1px solid var(--border-strong);
    background: color-mix(in srgb, var(--surface-3) 58%, transparent);
  }
  .mini-arrow::before {
    content: "";
    width: 2px;
    height: 17px;
    border-radius: var(--radius-full);
    background: var(--accent);
    transform: rotate(var(--wind-rotation, 0deg));
    transform-origin: 50% 80%;
    box-shadow: 0 -5px 0 -1px var(--accent);
  }

  .detail-note {
    margin: 12px 0 0;
    color: var(--accent);
    font-size: 0.78rem;
    font-weight: 650;
  }

  /* ── Hour / day detail heads ── */
  .hour-detail-head,
  .day-detail-head {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .detail-date {
    color: var(--text-muted);
    font-size: 0.86rem;
    font-weight: var(--weight-bold);
  }
  .detail-temp {
    color: var(--text);
    font-size: 2rem;
    font-weight: 560;
  }
  .detail-icon {
    font-size: 3.2rem;
    filter: drop-shadow(0 10px 18px color-mix(in srgb, var(--bg) 55%, transparent));
  }
  .day-summary {
    margin: 0 0 14px;
    color: var(--text-muted);
    font-size: 0.84rem;
  }
  .section-title {
    margin: 0 0 10px 12px;
    color: var(--text-muted);
    font-size: 0.95rem;
    font-weight: 650;
  }

  /* ── Hourly strip ── */
  .hour-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .hourly {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: minmax(86px, 1fr);
    overflow-x: auto;
    border-radius: var(--radius-lg);
    border: 1px solid var(--glass-line);
    background: color-mix(in srgb, var(--surface-2) 42%, transparent);
    box-shadow: var(--shadow-2);
    gap: 8px;
    padding: 10px;
    scrollbar-width: none;
  }
  .hourly::-webkit-scrollbar { display: none; }
  .hour {
    appearance: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: color-mix(in srgb, var(--surface-3) 38%, transparent);
    color: inherit;
    font: inherit;
    font-family: var(--font-ui);
    cursor: pointer;
    min-height: 118px;
    display: grid;
    justify-items: center;
    align-content: center;
    gap: 12px;
    padding: 12px 8px;
    transition: background 160ms var(--soft-ease), box-shadow 160ms var(--soft-ease), transform 160ms var(--soft-ease);
  }
  .hour:hover,
  .hour.is-selected {
    background: var(--accent-soft);
    box-shadow: inset 0 0 0 1px var(--accent-inset);
  }
  .hour:last-child { border-right: 0; }
  .hour:active { transform: scale(0.985); }
  .hour:focus-visible { outline: none; box-shadow: var(--ring); }
  .hour-time {
    color: var(--text-muted);
    font-size: 0.88rem;
    font-weight: 560;
  }
  .hour-icon { font-size: 1.75rem; }
  .hour-temp {
    font-size: 1.15rem;
    font-weight: 560;
  }

  /* Scroll chevrons */
  .chev {
    position: absolute;
    top: 86px;
    width: 32px;
    height: 32px;
    display: grid;
    place-items: center;
    border-radius: var(--radius-full);
    border: 1px solid var(--border-strong);
    background: color-mix(in srgb, var(--surface-2) 62%, transparent);
    box-shadow: var(--shadow-1);
    color: var(--text-muted);
    transform: translateY(-50%);
    z-index: 2;
    backdrop-filter: blur(8px);
    transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease);
  }
  .chev:hover { background: var(--surface-2); border-color: var(--accent); color: var(--accent); }
  .chev:focus-visible { outline: none; box-shadow: var(--ring); }
  .chev.left { left: -18px; }
  .chev.right { right: -18px; }

  /* ── 7-day forecast ── */
  .daily {
    overflow: hidden;
    border-radius: var(--radius-lg);
    border: 1px solid var(--glass-line);
    background: color-mix(in srgb, var(--surface-2) 44%, transparent);
    box-shadow: var(--shadow-2);
  }
  .day-entry {
    border-bottom: 1px solid var(--border);
  }
  .day-entry:last-child { border-bottom: 0; }
  .day {
    appearance: none;
    width: 100%;
    border: 0;
    border-bottom: 0;
    background: transparent;
    color: inherit;
    font: inherit;
    font-family: var(--font-ui);
    text-align: left;
    cursor: pointer;
    min-height: 47px;
    display: grid;
    grid-template-columns: 86px 46px 1fr 56px minmax(180px, 34%) 56px;
    align-items: center;
    gap: 14px;
    padding: 0 24px;
    border-radius: var(--radius);
    transition: background 160ms var(--soft-ease), box-shadow 160ms var(--soft-ease), transform 160ms var(--soft-ease);
  }
  .day:hover,
  .day.is-selected {
    background: var(--accent-soft);
    box-shadow: inset 0 0 0 1px var(--accent-inset);
  }
  .day:active { transform: scale(0.985); }
  .day:focus-visible { outline: none; box-shadow: var(--ring); }
  .day-detail-panel {
    margin: 0 12px 12px;
  }
  .day-name { font-weight: var(--weight-bold); }
  .day-icon { font-size: 1.55rem; }
  .day-condition, .low {
    color: var(--text-muted);
    font-size: 0.92rem;
  }
  .high {
    color: var(--text);
    font-size: 1rem;
    text-align: right;
  }

  /* Temperature range bar — gradient encodes temp range: cooler→warmer */
  .range {
    position: relative;
    height: 6px;
    border-radius: var(--radius-full);
    background: color-mix(in srgb, var(--border-strong) 28%, transparent);
  }
  .range span {
    position: absolute;
    top: 0;
    height: 100%;
    border-radius: inherit;
    /* Two-stop gradient from muted accent to full accent encodes the temperature range */
    background: linear-gradient(90deg,
      color-mix(in srgb, var(--accent) 45%, transparent),
      var(--accent));
    box-shadow: 0 1px 4px color-mix(in srgb, var(--accent) 22%, transparent);
  }
  .range i {
    position: absolute;
    top: 50%;
    width: 9px;
    height: 9px;
    border-radius: var(--radius-full);
    background: var(--text);
    box-shadow: var(--shadow-1);
    transform: translate(-50%, -50%);
  }

  /* ── Status line ── */
  .status {
    min-height: 20px;
    margin-top: 10px;
    color: var(--text-dim);
    font-size: 0.86rem;
  }

  /* ── Responsive — 960px ── */
  @media (max-width: 960px) {
    main { display: block; padding: 10px; }
    .window {
      min-height: calc(100svh - 72px);
      grid-template-columns: 1fr;
      border-radius: var(--radius-lg);
    }
    .sidebar {
      grid-template-rows: auto auto auto;
      border-right: 0;
      border-bottom: 1px solid var(--glass-line);
    }
    .traffic { display: none; }
    .locations {
      grid-auto-flow: column;
      grid-auto-columns: minmax(236px, 1fr);
      overflow-x: auto;
    }
    .sidebar-foot { display: none; }
    .content { padding: 24px 18px; }
    .hero {
      min-height: auto;
      grid-template-columns: 1fr;
      padding: 18px;
    }
    .sky-card { display: none; }
    .current-meta {
      position: static;
      flex-direction: row;
      justify-content: flex-start;
      min-width: 0;
      width: fit-content;
      margin-top: 16px;
      font-size: 1rem;
      text-align: left;
    }
    .wind-compass {
      --wind-size: min(var(--wind-size), 34px);
    }
    .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .metric.is-expanded { grid-column: 1 / -1; }
    .detail-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .detail-head,
    .hour-detail-head,
    .day-detail-head {
      grid-template-columns: 1fr;
    }
    .day {
      grid-template-columns: 64px 34px 1fr 42px minmax(88px, 1fr) 42px;
      gap: 8px;
      padding: 0 12px;
    }
  }

  /* ── Responsive — 560px ── */
  @media (max-width: 560px) {
    .metrics { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
    .temp { font-size: 5.6rem; }
    .condition { font-size: 1.28rem; }
    .day-condition { display: none; }
    .day { grid-template-columns: 58px 32px 40px 1fr 38px; }
  }

  /* ── misc overrides ── */
  .metric-detail-area:empty { display: none; }
  .metric-detail-panel {
    margin: -2px 0 18px;
    padding: 18px 20px 16px;
  }
</style>
</head>
<body>
<main>
  <section class="window" aria-label="Weather app">
    <aside class="sidebar">
      <div class="traffic" aria-hidden="true"><span></span><span></span><span></span></div>
      <form class="search" id="search-form">
        <input id="city-input" type="search" placeholder="Search Locations" autocomplete="off" spellcheck="false">
        <button type="submit" aria-label="Search"></button>
      </form>
      <div class="locations" id="locations"></div>
      <div class="sidebar-foot"><button class="add-btn" type="button" aria-label="Add location">+</button></div>
    </aside>
    <section class="content">
      <div class="hero">
        <div>
          <div class="place-row"><span id="place">Weather</span><span class="down">⌄</span></div>
          <div class="temp" id="temp">--°</div>
          <div class="condition" id="condition">Loading forecast...</div>
          <div class="hi-lo"><span id="high">H: --°</span><span id="low">L: --°</span></div>
          <div class="current-meta" id="wind-meta"><span class="wind-compass"><span class="wind-arrow"></span></span><span>Wind --</span></div>
        </div>
        <div class="sky-card" aria-hidden="true"></div>
      </div>
      <div class="detail-panel wind-detail-panel" id="wind-detail-panel" aria-live="polite"></div>
      <section class="metrics" aria-label="Current conditions">
        <div class="metric"><span class="metric-icon">♨</span><span><span class="metric-label">Feels Like</span><span class="metric-value" id="feels">--°</span></span></div>
        <div class="metric"><span class="metric-icon" id="precip-icon">☂</span><span><span class="metric-label" id="precip-label">Precipitation</span><span class="metric-value" id="precip">--</span></span></div>
        <div class="metric"><span class="metric-icon">♢</span><span><span class="metric-label">Humidity</span><span class="metric-value" id="humidity">--</span></span></div>
        <div class="metric"><span class="metric-icon">◷</span><span><span class="metric-label">Pressure</span><span class="metric-value" id="pressure">--</span></span></div>
      </section>
      <section id="metric-detail-area" class="metric-detail-area" aria-live="polite"></section>
      <section class="hour-wrap" aria-label="Hourly forecast">
        <div class="section-title">Hourly Forecast</div>
        <button class="chev left" type="button" aria-label="Previous hours">‹</button>
        <div class="hourly" id="hourly"></div>
        <div class="hour-detail-stack" id="hour-detail-stack" aria-live="polite"></div>
        <button class="chev right" type="button" aria-label="Next hours">›</button>
      </section>
      <section aria-label="7-day forecast">
        <div class="section-title">7-Day Forecast</div>
        <div class="daily" id="daily"></div>
      </section>
      <div class="status" id="status"></div>
    </section>
  </section>
</main>
<script>
  const HALIFAX = { name: 'Halifax, NS', admin: 'Nova Scotia', country: 'Canada', latitude: 44.6488, longitude: -63.5752, fallback: true };
  const STORAGE_KEY = 'weather_locations';
  const LAST_KEY = 'weather_last_location';
  const DETAIL_ANIMATION_MS = 820;
  const SOURCES = {
    auto: 'Auto Best',
    'open-meteo': 'Open-Meteo',
    'met-no': 'MET Norway',
    nws: 'NOAA / NWS',
  };
  const state = {
    locations: loadLocations(),
    selected: null,
    weatherByKey: new Map(),
    source: 'auto',
    activeSource: '',
    latestWeather: null,
    activeDetails: [],
  };

  const els = {
    form: document.getElementById('search-form'),
    input: document.getElementById('city-input'),
    locations: document.getElementById('locations'),
    status: document.getElementById('status'),
    place: document.getElementById('place'),
    condition: document.getElementById('condition'),
    temp: document.getElementById('temp'),
    high: document.getElementById('high'),
    low: document.getElementById('low'),
    feels: document.getElementById('feels'),
    precipIcon: document.getElementById('precip-icon'),
    precipLabel: document.getElementById('precip-label'),
    precip: document.getElementById('precip'),
    humidity: document.getElementById('humidity'),
    pressure: document.getElementById('pressure'),
    metricDetails: document.getElementById('metric-detail-area'),
    hourly: document.getElementById('hourly'),
    daily: document.getElementById('daily'),
    windDetails: document.getElementById('wind-detail-panel'),
    hourDetails: document.getElementById('hour-detail-stack'),
  };

  function keyFor(loc) {
    return `${Number(loc.latitude).toFixed(3)},${Number(loc.longitude).toFixed(3)}`;
  }
  function displayName(hit) {
    const region = hit.admin1 || hit.country_code || hit.country || '';
    return region ? `${hit.name}, ${region}` : hit.name;
  }
  function loadLocations() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      return Array.isArray(saved) && saved.length ? saved : [HALIFAX];
    } catch {
      return [HALIFAX];
    }
  }
  function saveLocations() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.locations));
  }
  function setStatus(text, isError = false) {
    els.status.textContent = text || '';
    els.status.style.color = isError ? 'var(--danger)' : '';
  }
  function weatherMeta(code) {
    const map = {
      0: ['☀️', 'Sunny'], 1: ['🌤️', 'Mostly Clear'], 2: ['🌤️', 'Partly Cloudy'], 3: ['☁️', 'Cloudy'],
      45: ['🌫️', 'Fog'], 48: ['🌫️', 'Fog'], 51: ['🌦️', 'Light Drizzle'], 53: ['🌦️', 'Drizzle'],
      55: ['🌧️', 'Heavy Drizzle'], 61: ['🌧️', 'Light Rain'], 63: ['🌧️', 'Rain'], 65: ['🌧️', 'Heavy Rain'],
      71: ['🌨️', 'Light Snow'], 73: ['🌨️', 'Snow'], 75: ['🌨️', 'Heavy Snow'], 80: ['🌦️', 'Showers'],
      81: ['🌦️', 'Showers'], 82: ['⛈️', 'Heavy Showers'], 95: ['⛈️', 'Thunderstorm'],
    };
    return map[code] || ['🌤️', 'Partly Cloudy'];
  }
  function windArrowStyle(speed, direction) {
    const size = Math.round(Math.min(120, Math.max(62, 62 + (Number(speed) || 0) * 2.2)));
    const rotation = (((Number(direction) || 0) + 180) % 360).toFixed(0);
    return `--wind-size:${size}px;--wind-rotation:${rotation}deg`;
  }
  function heading(deg) {
    return `${Math.round((((Number(deg) || 0) % 360) + 360) % 360)}°`;
  }
  function fmtTemp(value) {
    return Number.isFinite(value) ? `${Math.round(value)}°` : '--°';
  }
  function fmtTime(iso) {
    return new Date(iso).toLocaleTimeString([], { hour: 'numeric' });
  }
  function fmtDay(iso, index) {
    if (index === 0) return 'Today';
    return new Date(`${iso}T12:00:00`).toLocaleDateString([], { weekday: 'short' });
  }
  function fmtDateTime(iso) {
    return new Date(iso).toLocaleString([], { weekday: 'long', month: 'short', day: 'numeric', hour: 'numeric' });
  }
  function fmtFullDate(iso) {
    return new Date(`${iso}T12:00:00`).toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
  }
  function fmtNumber(value, suffix = '', digits = 0) {
    return Number.isFinite(value) ? `${Number(value).toFixed(digits)}${suffix}` : '--';
  }
  function currentHourlyIndex(data) {
    return Math.max(0, data.hourly.time.findIndex(t => new Date(t) >= new Date()));
  }
  function detailMetricKey() {
    if (!state.latestWeather) return 'precip';
    return (Number(state.latestWeather.current.precipitation) || 0) > 0 ? 'precip' : 'uv';
  }
  function detailId(type, value) {
    return `${type}:${value}`;
  }
  function isDetailOpen(type, value) {
    return state.activeDetails.includes(detailId(type, value));
  }
  function toggleDetail(type, value) {
    const id = detailId(type, value);
    if (type === 'metric' && value !== 'wind') {
      state.activeDetails = state.activeDetails.includes(id)
        ? state.activeDetails.filter(item => item !== id)
        : [...state.activeDetails.filter(item => !item.startsWith('metric:') || item === 'metric:wind'), id];
      return;
    }
    state.activeDetails = state.activeDetails.includes(id)
      ? state.activeDetails.filter(item => item !== id)
      : [...state.activeDetails, id];
  }
  function closeDetail(type, value, element, afterClose) {
    const id = detailId(type, value);
    if (!state.activeDetails.includes(id)) return;
    if (element) element.classList.add('is-closing');
    window.setTimeout(() => {
      state.activeDetails = state.activeDetails.filter(item => item !== id);
      if (typeof afterClose === 'function') afterClose();
    }, DETAIL_ANIMATION_MS);
  }
  function closeOtherDetails(type, keepValue) {
    state.activeDetails
      .filter(id => id.startsWith(`${type}:`) && id !== detailId(type, keepValue))
      .forEach(id => {
        const value = Number(id.split(':')[1]);
        const selector = `[data-detail-id="${id}"]`;
        const panel = document.querySelector(selector);
        const trigger = type === 'hour'
          ? els.hourly.querySelector(`[data-hour-index="${value}"]`)
          : els.daily.querySelector(`[data-day-index="${value}"]`);
        state.activeDetails = state.activeDetails.filter(item => item !== id);
        if (trigger) trigger.classList.remove('is-selected');
        if (panel) {
          panel.classList.add('is-closing');
          window.setTimeout(() => panel.remove(), DETAIL_ANIMATION_MS);
        }
      });
  }
  function pruneOpenDetails(data) {
    if (!data) {
      state.activeDetails = [];
      return;
    }
    const metricKeys = new Set(['feels', 'precip', 'uv', 'humidity', 'pressure', 'wind']);
    state.activeDetails = state.activeDetails.filter(id => {
      const [type, raw] = id.split(':');
      const value = Number(raw);
      if (type === 'metric') return metricKeys.has(raw);
      if (type === 'hour') return Number.isInteger(value) && value >= 0 && value < data.hourly.time.length;
      if (type === 'day') return Number.isInteger(value) && value >= 0 && value < data.daily.time.length;
      return false;
    });
  }
  function metricValue(key, index = null) {
    const data = state.latestWeather;
    if (!data) return '--';
    if (index === null) index = currentHourlyIndex(data);
    const hourly = data.hourly;
    if (key === 'feels') return fmtTemp(hourly.apparent_temperature?.[index] ?? hourly.temperature_2m?.[index]);
    if (key === 'wind') return `${fmtNumber(hourly.wind_speed_10m?.[index], ' km/h')} · ${heading(hourly.wind_direction_10m?.[index])}`;
    if (key === 'humidity') return fmtNumber(hourly.relative_humidity_2m?.[index], '%');
    if (key === 'pressure') return fmtNumber(hourly.pressure_msl?.[index], ' hPa');
    if (key === 'uv') return fmtNumber(hourly.uv_index?.[index], '', 1);
    return fmtNumber(hourly.precipitation?.[index], ' mm/hr', 1);
  }
  function metricSeries(key) {
    const data = state.latestWeather;
    if (!data) return [];
    const hourly = data.hourly;
    const start = currentHourlyIndex(data);
    const source = key === 'feels' ? (hourly.apparent_temperature || hourly.temperature_2m)
      : key === 'humidity' ? hourly.relative_humidity_2m
      : key === 'pressure' ? hourly.pressure_msl
      : key === 'uv' ? hourly.uv_index
      : key === 'wind' ? hourly.wind_speed_10m
      : hourly.precipitation;
    return [0, 3, 6, 9, 12, 15, 18, 21].map(offset => {
      const index = Math.min(hourly.time.length - 1, start + offset);
      return {
        index,
        time: offset === 0 ? 'Now' : fmtTime(hourly.time[index]),
        value: Number(source?.[index]),
      };
    }).filter(point => Number.isFinite(point.value));
  }
  function lineChart(points, formatter, yLabel = 'Value') {
    if (!points.length) return '<div class="detail-copy">Detailed timeline data is unavailable for this source.</div>';
    const width = 720;
    const height = 190;
    const pad = { left: 56, right: 20, top: 20, bottom: 44 };
    const values = points.map(point => point.value);
    let min = Math.min(...values);
    let max = Math.max(...values);
    if (min === max) { min -= 1; max += 1; }
    const x = index => pad.left + (index * (width - pad.left - pad.right)) / Math.max(1, points.length - 1);
    const y = value => pad.top + ((max - value) * (height - pad.top - pad.bottom)) / (max - min);
    const coords = points.map((point, index) => `${x(index)},${y(point.value)}`).join(' ');
    const fill = `${pad.left},${height - pad.bottom} ${coords} ${x(points.length - 1)},${height - pad.bottom}`;
    const rows = [0, 1, 2, 3, 4].map(row => {
      const value = max - row * ((max - min) / 4);
      const yy = y(value);
      return `<line class="chart-grid" x1="${pad.left}" y1="${yy}" x2="${width - pad.right}" y2="${yy}"></line><text class="chart-axis" x="${pad.left - 8}" y="${yy + 3}" text-anchor="end">${formatter(value)}</text>`;
    }).join('');
    const columns = points.map((point, index) => `<line class="chart-grid" x1="${x(index)}" y1="${pad.top}" x2="${x(index)}" y2="${height - pad.bottom}"></line>`).join('');
    const dots = points.map((point, index) => `<circle class="chart-dot" cx="${x(index)}" cy="${y(point.value)}" r="4"></circle><text class="chart-axis" x="${x(index)}" y="${height - 24}" text-anchor="middle">${point.time}</text>`).join('');
    return `<svg class="line-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="${yLabel} timeline chart"><polygon class="chart-fill" points="${fill}"></polygon>${columns}${rows}<polyline class="chart-line" points="${coords}"></polyline>${dots}</svg>`;
  }
  function detailTile(label, value) {
    return `<div class="detail-tile"><span class="tile-label">${label}</span><span class="tile-value">${value}</span></div>`;
  }
  function moonPhase(iso) {
    const date = new Date(`${iso}T12:00:00Z`);
    const knownNewMoon = Date.UTC(2000, 0, 6, 18, 14);
    const days = (date.getTime() - knownNewMoon) / 86400000;
    const phase = ((days % 29.53058867) + 29.53058867) % 29.53058867;
    if (phase < 1.85 || phase > 27.68) return 'New Moon';
    if (phase < 5.54) return 'Waxing Crescent';
    if (phase < 9.23) return 'First Quarter';
    if (phase < 12.92) return 'Waxing Gibbous';
    if (phase < 16.61) return 'Full Moon';
    if (phase < 20.30) return 'Waning Gibbous';
    if (phase < 23.99) return 'Last Quarter';
    return 'Waning Crescent';
  }
  function renderLocations() {
    const selectedKey = state.selected ? keyFor(state.selected) : '';
    els.locations.innerHTML = state.locations.map(loc => {
      const data = state.weatherByKey.get(keyFor(loc));
      const current = data && data.current;
      const meta = weatherMeta(current ? current.weather_code : 2);
      return `<button class="loc${keyFor(loc) === selectedKey ? ' active' : ''}" data-key="${keyFor(loc)}" type="button">
        <span class="loc-icon">${meta[0]}</span>
        <span><span class="loc-name">${loc.name}</span><span class="loc-condition">${current ? meta[1] : 'Saved Location'}</span></span>
        <span class="loc-temp">${current ? fmtTemp(current.temperature_2m) : '--°'}</span>
      </button>`;
    }).join('');
  }
  function renderWeather(loc, data) {
    state.latestWeather = data;

    return (
      inBox(24, 50, -125, -66) ||    // contiguous U.S.
      inBox(51, 72, -170, -129) ||   // Alaska
      inBox(18, 23, -161, -154) ||   // Hawaii
      inBox(17, 19, -68, -64) ||     // Puerto Rico / U.S. Virgin Islands
      inBox(13, 15, 144, 146) ||     // Guam
      inBox(-15, -14, -171, -168)    // American Samoa
    );
  }
  async function fetchWeather(loc) {
    const requested = state.source;
    const attempts = requested === 'auto'
      ? (isNwsLocation(loc) ? ['nws', 'open-meteo'] : ['open-meteo'])
      : [requested, 'open-meteo']
        .filter(source => source !== 'nws' || isNwsLocation(loc))
        .filter((item, index, arr) => arr.indexOf(item) === index);
    let lastError = null;
    for (const source of attempts) {
      try {
        const data = source === 'nws' ? await fetchNws(loc) : source === 'met-no' ? await fetchMetNo(loc) : await fetchOpenMeteo(loc);
        state.activeSource = data.source;
        return data;
      } catch (error) {
        lastError = error;
      }
    }
    throw lastError || new Error('Weather unavailable');
  }
  async function selectLocation(loc) {
    state.selected = loc;
    localStorage.setItem(LAST_KEY, keyFor(loc));
    renderLocations();
    setStatus('Updating...');
    try {
      const data = await fetchWeather(loc);
      state.weatherByKey.set(keyFor(loc), data);
      renderWeather(loc, data);
      renderLocations();
      setStatus(`Source: ${data.sourceLabel || SOURCES[state.source] || 'Weather'}`);
    } catch {
      if (keyFor(loc) !== keyFor(HALIFAX)) {
        setStatus('Weather unavailable. Showing Halifax.', true);
        await selectLocation(HALIFAX);
      } else {
        setStatus('Weather unavailable.', true);
      }
    }
  }
  function addLocation(loc) {
    const key = keyFor(loc);
    state.locations = [loc, ...state.locations.filter(item => keyFor(item) !== key)].slice(0, 8);
    saveLocations();
    selectLocation(loc);
  }
  async function searchCity(query) {
    const params = new URLSearchParams({ name: query, count: '1', language: 'en', format: 'json' });
    const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?${params}`);
    if (!res.ok) throw new Error('Search failed');
    const data = await res.json();
    const hit = data.results && data.results[0];
    if (!hit) throw new Error('City not found');
    return { name: displayName(hit), admin: hit.admin1 || '', country: hit.country || '', latitude: hit.latitude, longitude: hit.longitude };
  }
  function geolocate() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) {
        reject(new Error('Geolocation unavailable'));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        pos => resolve({ name: 'Current Location', admin: '', country: '', latitude: pos.coords.latitude, longitude: pos.coords.longitude }),
        reject,
        { enableHighAccuracy: false, timeout: 7000, maximumAge: 600000 }
      );
    });
  }

  els.locations.addEventListener('click', event => {
    const btn = event.target.closest('.loc');
    if (!btn) return;
    const loc = state.locations.find(item => keyFor(item) === btn.dataset.key);
    if (loc) selectLocation(loc);
  });
  els.form.addEventListener('submit', async event => {
    event.preventDefault();
    const query = els.input.value.trim();
    if (!query) return;
    setStatus('Searching...');
    try {
      const loc = await searchCity(query);
      els.input.value = '';
      addLocation(loc);
    } catch (error) {
      setStatus(error.message || 'Search failed', true);
    }
  });
  document.querySelectorAll('.metric').forEach((card, index) => {
    const keys = ['feels', 'precip', 'humidity', 'pressure'];
    const activate = event => {
      const key = keys[index] === 'precip' ? detailMetricKey() : keys[index];
      if (isDetailOpen('metric', key)) {
        const detail = els.metricDetails.querySelector(`[data-detail-id="${detailId('metric', key)}"]`);
        closeDetail('metric', key, detail, () => {
          els.metricDetails.dataset.detailId = '';
          els.metricDetails.innerHTML = '';
          renderDetail();
        });
        card.classList.remove('is-selected');
      } else {
        toggleDetail('metric', key);
        renderDetail();
      }
    };
    card.addEventListener('click', activate);
    card.addEventListener('keydown', event => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        activate();
      }
    });
  });
  document.getElementById('wind-meta').addEventListener('click', () => {
    if (isDetailOpen('metric', 'wind')) {
      closeDetail('metric', 'wind', els.windDetails, () => {
        els.windDetails.classList.remove('is-closing');
        renderDetail();
      });
      document.getElementById('wind-meta').classList.remove('is-selected');
    } else {
      toggleDetail('metric', 'wind');
      renderDetail();
    }
  });
  document.querySelector('.chev.left').addEventListener('click', event => {
    event.preventDefault();
    event.stopPropagation();
    els.hourly.scrollBy({ left: -Math.max(120, els.hourly.clientWidth * 0.75), behavior: 'smooth' });
  });
  document.querySelector('.chev.right').addEventListener('click', event => {
    event.preventDefault();
    event.stopPropagation();
    els.hourly.scrollBy({ left: Math.max(120, els.hourly.clientWidth * 0.75), behavior: 'smooth' });
  });
  els.hourly.addEventListener('click', event => {
    const btn = event.target.closest('.hour');
    if (!btn) return;
    const index = Number(btn.dataset.hourIndex);
    if (isDetailOpen('hour', index)) {
      const panel = els.hourDetails.querySelector(`[data-detail-id="${detailId('hour', index)}"]`);
      closeDetail('hour', index, panel, () => {
        if (panel) panel.remove();
        renderDetail();
      });
      btn.classList.remove('is-selected');
    } else {
      closeOtherDetails('hour', index);
      toggleDetail('hour', index);
      renderDetail();
    }
  });
  els.daily.addEventListener('click', event => {
    const btn = event.target.closest('.day');
    if (!btn) return;
    const index = Number(btn.dataset.dayIndex);
    const entry = btn.closest('.day-entry');
    const panel = entry && entry.querySelector('.day-detail-panel');
    if (isDetailOpen('day', index)) {
      closeDetail('day', index, panel, () => {
        if (panel) panel.remove();
      });
      btn.classList.remove('is-selected');
    } else {
      closeOtherDetails('day', index);
      toggleDetail('day', index);
      if (entry && !panel) entry.insertAdjacentHTML('beforeend', `<div class="detail-panel day-detail-panel" data-detail-id="${detailId('day', index)}">${renderDayDetail(index)}</div>`);
      btn.classList.add('is-selected');
    }
  });
  document.addEventListener('click', event => {
    if (!event.target.closest('[data-detail-close]')) return;
    const day = event.target.closest('.day-entry')?.querySelector('.day');
    if (!day) return;
    const index = Number(day.dataset.dayIndex);
    const panel = day.closest('.day-entry')?.querySelector('.day-detail-panel');
    closeDetail('day', index, panel, () => {
      if (panel) panel.remove();
    });
    day.classList.remove('is-selected');
  });
  (async function init() {
    renderLocations();
    const last = localStorage.getItem(LAST_KEY);
    const saved = state.locations.find(loc => keyFor(loc) === last);
    try {
      if (saved) {
        await selectLocation(saved);
      } else {
        addLocation(await geolocate());
      }
    } catch {
      await selectLocation(saved || HALIFAX);
    }
  })();
</script>
</body>
</html>
