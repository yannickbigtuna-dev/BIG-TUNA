<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal — BIG TUNA</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a0a; overflow: hidden; }
    body { display: flex; flex-direction: column; }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 14px;
      background: #111;
      border-bottom: 1px solid #222;
      font-family: monospace;
      font-size: 12px;
      flex-shrink: 0;
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555; flex-shrink: 0; transition: background 0.3s;
    }
    #status-dot.connected    { background: #3fb950; }
    #status-dot.connecting   { background: #d29922; }
    #status-dot.disconnected { background: #f85149; }
    #status-text { color: #888; flex: 1; }
    #reconnect-btn {
      display: none; padding: 3px 10px; background: #1f6feb;
      color: #fff; border: none; border-radius: 4px; font-size: 12px; cursor: pointer;
    }
    #reconnect-btn:hover { background: #388bfd; }

    #terminal-container { flex: 1; overflow: hidden; padding: 4px; }
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto !important; }
  </style>
</head>
<body>

<div id="status-bar">
  <div id="status-dot" class="connecting"></div>
  <span id="status-text">Connecting…</span>
  <button id="reconnect-btn" onclick="connect()">Reconnect</button>
</div>
<div id="terminal-container"></div>

<script src="/topbar.js"></script>
<script src="/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script>
Topbar.setTitle('Terminal');

Auth.onReady(user => {
  const term = new Terminal({
    cursorBlink: true,
    fontFamily: '"Cascadia Code", "Fira Code", Consolas, monospace',
    fontSize: 14,
    lineHeight: 1.2,
    theme: {
      background:  '#0a0a0a',
      foreground:  '#e0e0e0',
      cursor:      '#58a6ff',
      black:       '#1e1e1e',
      red:         '#f85149',
      green:       '#3fb950',
      yellow:      '#d29922',
      blue:        '#58a6ff',
      magenta:     '#bc8cff',
      cyan:        '#39c5cf',
      white:       '#e0e0e0',
      brightBlack: '#484f58',
    },
  });

  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal-container'));
  fitAddon.fit();

  let ws = null;

  // Send resize to server whenever terminal dimensions change
  function sendResize() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
    }
  }

  new ResizeObserver(() => { fitAddon.fit(); sendResize(); })
    .observe(document.getElementById('terminal-container'));

  term.onResize(sendResize);

  function setStatus(state, text) {
    document.getElementById('status-dot').className = state;
    document.getElementById('status-text').textContent = text;
    document.getElementById('reconnect-btn').style.display = state === 'disconnected' ? 'inline-block' : 'none';
  }

  window.connect = function connect() {
    if (ws && ws.readyState < 2) ws.close();
    const token = Auth.token;
    if (!token) { setStatus('disconnected', 'Not authenticated'); return; }

    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const { cols, rows } = term;
    const url = `${proto}://${location.host}/terminal/ws?t=${encodeURIComponent(token)}&cols=${cols}&rows=${rows}`;

    setStatus('connecting', 'Connecting…');
    ws = new WebSocket(url);

    ws.onopen = () => {
      setStatus('connected', 'Connected');
      term.focus();
    };

    ws.onmessage = e => term.write(e.data);

    ws.onclose = e => setStatus('disconnected', `Disconnected (${e.code})`);
    ws.onerror  = () => setStatus('disconnected', 'Connection error');
  };

  // Forward all keystrokes straight to the PTY — it handles echo, line editing, etc.
  term.onData(data => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(data);
  });

  connect();
});
</script>
</body>
</html>
