<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Lights</title>
<link rel="stylesheet" href="/styles/tokens.css">
<style>
  html { min-height: 100%; }

  body {
    min-height: 100vh;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(circle at 50% 42%, color-mix(in srgb, var(--warning) 10%, transparent), transparent 34%),
      linear-gradient(180deg, var(--bg-raised), var(--bg));
    transition: background 360ms ease;
  }

  body.is-on {
    background:
      radial-gradient(circle at 50% 38%, color-mix(in srgb, var(--warning) 52%, transparent), transparent 38%),
      linear-gradient(180deg, #b8924a, #5a4220);
    color: #201b14;
  }

  body.standalone #topbar {
    display: none;
  }

  main {
    flex: 1;
    display: grid;
    place-items: center;
    padding: 32px 18px 44px;
  }

  .room {
    width: min(100%, 520px);
    display: grid;
    justify-items: center;
    gap: 24px;
  }

  .light-cone {
    position: fixed;
    inset: 52px 0 0;
    pointer-events: none;
    opacity: 0;
    background: radial-gradient(ellipse at 50% 36%, color-mix(in srgb, var(--warning) 46%, transparent), transparent 44%);
    transition: opacity 360ms ease;
  }

  body.is-on .light-cone { opacity: 1; }

  .switch-wrap {
    width: min(74vw, 210px);
    aspect-ratio: 0.64;
    display: grid;
    place-items: center;
    filter: drop-shadow(0 30px 34px color-mix(in srgb, var(--bg) 55%, transparent));
  }

  .plate {
    width: 100%;
    height: 100%;
    position: relative;
    display: grid;
    place-items: center;
    border-radius: var(--radius-sm);
    background: linear-gradient(145deg, var(--surface-3), var(--surface-2));
    border: 1px solid var(--border-strong);
    box-shadow:
      inset 2px 2px 2px color-mix(in srgb, var(--text) 8%, transparent),
      inset -3px -3px 6px color-mix(in srgb, var(--bg) 22%, transparent),
      var(--shadow-3);
  }

  /* ON state: plate picks up warm tones from the ambient light */
  body.is-on .plate {
    background: linear-gradient(145deg, #e8d9b8, #c9bb9a);
    border-color: #a09070;
    box-shadow:
      inset 2px 2px 2px color-mix(in srgb, #fff 42%, transparent),
      inset -3px -3px 6px color-mix(in srgb, #5a4220 22%, transparent),
      var(--shadow-3);
  }

  .plate::before,
  .plate::after {
    content: "";
    position: absolute;
    left: 50%;
    width: 9px;
    height: 9px;
    transform: translateX(-50%);
    border-radius: var(--radius-full);
    background: radial-gradient(circle at 35% 35%, var(--text), var(--border-strong) 58%, var(--surface) 100%);
    box-shadow: inset 0 1px 2px color-mix(in srgb, var(--bg) 35%, transparent);
  }

  body.is-on .plate::before,
  body.is-on .plate::after {
    background: radial-gradient(circle at 35% 35%, #fff, #aba393 58%, #6f685e 100%);
  }

  .plate::before { top: 21px; }
  .plate::after { bottom: 21px; }

  .switch {
    width: 45%;
    height: 46%;
    min-width: 78px;
    border: 0;
    padding: 0;
    position: relative;
    cursor: pointer;
    border-radius: var(--radius-sm);
    background: transparent;
    perspective: 600px;
    touch-action: manipulation;
  }

  .switch:focus-visible {
    outline: none;
    box-shadow: var(--ring);
  }

  .switch[disabled] {
    cursor: default;
  }

  .paddle {
    position: absolute;
    inset: 0;
    border-radius: var(--radius-sm);
    background: linear-gradient(180deg, var(--surface-3), var(--surface-2));
    border: 1px solid var(--border-strong);
    box-shadow:
      inset 0 10px 18px color-mix(in srgb, var(--text) 6%, transparent),
      inset 0 -16px 20px color-mix(in srgb, var(--bg) 25%, transparent),
      var(--shadow-2);
    transform: rotateX(-13deg);
    transform-origin: 50% 82%;
    transition: transform 210ms cubic-bezier(.2,.9,.2,1), box-shadow 210ms ease;
  }

  .paddle::after {
    content: "";
    position: absolute;
    inset: 50% 8px auto;
    height: 1px;
    background: color-mix(in srgb, var(--border-strong) 50%, transparent);
  }

  body.is-on .paddle {
    background: linear-gradient(180deg, #e8d9b8, #c9bb9a);
    border-color: #a09070;
    transform: rotateX(13deg);
    transform-origin: 50% 18%;
    box-shadow:
      inset 0 16px 20px color-mix(in srgb, #fff 40%, transparent),
      inset 0 -9px 15px color-mix(in srgb, #5a4220 18%, transparent),
      var(--shadow-1),
      0 0 24px color-mix(in srgb, var(--warning) 38%, transparent);
  }

  .status-panel {
    width: min(100%, 340px);
    display: grid;
    gap: 7px;
    text-align: center;
    min-height: 62px;
  }

  .auth-panel {
    width: min(100%, 340px);
    display: grid;
    gap: 10px;
    padding: 14px;
    border-radius: var(--radius-lg);
    background: color-mix(in srgb, var(--surface) 60%, transparent);
    border: 1px solid var(--border);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  body.is-on .auth-panel {
    background: color-mix(in srgb, #e8d9b8 34%, transparent);
    border-color: color-mix(in srgb, #5a4220 12%, transparent);
  }

  .auth-panel[hidden] {
    display: none;
  }

  .auth-actions {
    display: grid;
    gap: 10px;
  }

  .auth-input {
    width: 100%;
    padding: 12px 13px;
    border-radius: var(--radius);
    border: 1px solid var(--border-strong);
    background: var(--surface-2);
    color: inherit;
    font: inherit;
  }

  .auth-input::placeholder {
    color: var(--text-dim);
  }

  body.is-on .auth-input {
    background: color-mix(in srgb, #e8d9b8 62%, transparent);
    border-color: color-mix(in srgb, #5a4220 16%, transparent);
    color: #201b14;
  }

  body.is-on .auth-input::placeholder {
    color: color-mix(in srgb, #201b14 46%, transparent);
  }

  .auth-button,
  .secondary-button {
    width: 100%;
    min-height: 44px;
    border: 0;
    border-radius: var(--radius);
    font: inherit;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    touch-action: manipulation;
  }

  .auth-button {
    background: var(--accent);
    color: var(--on-accent);
  }

  .secondary-button {
    background: var(--surface-2);
    color: inherit;
    border: 1px solid var(--border-strong);
  }

  body.is-on .secondary-button {
    background: color-mix(in srgb, #201b14 10%, transparent);
    border-color: color-mix(in srgb, #201b14 16%, transparent);
  }

  .install-tip {
    font-size: 0.82rem;
    line-height: 1.4;
    color: var(--text-muted);
    text-align: center;
  }

  body.is-on .install-tip {
    color: color-mix(in srgb, #201b14 62%, transparent);
  }

  .state-label {
    font-size: 0.86rem;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .access-label {
    min-height: 1.25em;
    color: var(--text-muted);
    font-size: 0.88rem;
    line-height: 1.4;
  }

  body.is-on .access-label { color: color-mix(in srgb, #201b14 66%, transparent); }

  .poll-label {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    min-height: 1.2em;
    color: var(--text-muted);
    font-size: 0.78rem;
    line-height: 1.35;
  }

  .poll-dot {
    width: 8px;
    height: 8px;
    flex: 0 0 8px;
    border-radius: var(--radius-full);
    background: var(--text-dim);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--text-dim) 18%, transparent);
  }

  .poll-label.is-recent { color: var(--success); }
  .poll-label.is-recent .poll-dot {
    background: var(--success);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--success) 20%, transparent);
  }

  body.is-on .poll-label { color: color-mix(in srgb, #201b14 66%, transparent); }
  body.is-on .poll-label.is-recent { color: color-mix(in srgb, var(--success) 80%, #201b14); }

  .switch[aria-busy="true"] .paddle {
    transition-duration: 80ms;
    filter: saturate(0.78);
  }

  @media (max-width: 520px) {
    main { padding: 24px 14px 34px; }
    .switch-wrap { width: min(72vw, 180px); }
    .room { gap: 20px; }
  }
</style>
</head>
<body>
<div class="light-cone"></div>
<main>
  <section class="room" aria-label="Light switch">
    <div class="switch-wrap">
      <div class="plate">
        <button class="switch" id="switch" type="button" role="switch" aria-checked="false" aria-label="Lights" disabled>
          <span class="paddle"></span>
        </button>
      </div>
    </div>
    <div class="status-panel">
      <div class="state-label" id="state-label">Loading</div>
      <div class="access-label" id="access-label"></div>
      <div class="poll-label" id="poll-label">
        <span class="poll-dot" aria-hidden="true"></span>
        <span id="poll-text">No device poll</span>
      </div>
    </div>
    <div class="auth-panel" id="auth-panel" hidden>
      <div class="auth-actions" id="signed-out-actions">
        <input class="auth-input" id="username" type="text" placeholder="Username" autocomplete="username" autocapitalize="none" spellcheck="false">
        <input class="auth-input" id="password" type="password" placeholder="Password" autocomplete="current-password">
        <button class="auth-button" id="login-btn" type="button">Sign In</button>
      </div>
      <div class="auth-actions" id="signed-in-actions" hidden>
        <button class="secondary-button" id="logout-btn" type="button">Log Out</button>
      </div>
    </div>
    <div class="install-tip" id="install-tip">
      On iPhone: Share -> Add to Home Screen
    </div>
  </section>
</main>
<script src="/topbar.js"></script>
<script>
  Topbar.setTitle('Lights');

  const TOKEN_KEY = 'auth_token';
  const USER_KEY = 'auth_user';
  const switchBtn = document.getElementById('switch');
  const stateLabel = document.getElementById('state-label');
  const accessLabel = document.getElementById('access-label');
  const pollLabel = document.getElementById('poll-label');
  const pollText = document.getElementById('poll-text');
  const authPanel = document.getElementById('auth-panel');
  const signedOutActions = document.getElementById('signed-out-actions');
  const signedInActions = document.getElementById('signed-in-actions');
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('login-btn');
  const logoutBtn = document.getElementById('logout-btn');
  const installTip = document.getElementById('install-tip');
  const INVERT_WEBSITE_STATE = true;

  let currentOn = false;
  let canControl = false;
  let pending = false;
  let eventsConnected = false;
  let lastUpdatedAt = '';
  let hasLoadedState = false;
  let authPending = false;

  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  document.body.classList.toggle('standalone', isStandalone);

  function getCachedUser() {
    try { return JSON.parse(localStorage.getItem(USER_KEY) || 'null'); }
    catch { return null; }
  }

  function getToken() {
    return localStorage.getItem(TOKEN_KEY) || '';
  }

  function setCachedSession(session) {
    localStorage.setItem(TOKEN_KEY, session.token);
    localStorage.setItem(USER_KEY, JSON.stringify({ username: session.username, id: session.id || '' }));
  }

  function clearCachedSession() {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(USER_KEY);
  }

  function apiToWebsiteState(on) {
    return INVERT_WEBSITE_STATE ? on !== true : on === true;
  }

  function websiteToApiState(on) {
    return INVERT_WEBSITE_STATE ? on !== true : on === true;
  }

  function setVisual(on, updatedAt) {
    if (updatedAt) lastUpdatedAt = updatedAt;
    hasLoadedState = true;
    currentOn = on === true;
    document.body.classList.toggle('is-on', currentOn);
    switchBtn.setAttribute('aria-checked', String(currentOn));
    stateLabel.textContent = currentOn ? 'On' : 'Off';
  }

  function updateAccess() {
    const user = getCachedUser();
    canControl = !!user && typeof user.username === 'string' && user.username.toLowerCase() === 'yannick';
    switchBtn.disabled = !canControl || pending;
    const hasSession = !!getToken() && !!user;
    authPanel.hidden = !isStandalone && canControl;
    signedOutActions.hidden = hasSession;
    signedInActions.hidden = !hasSession;
    if (isStandalone) {
      installTip.textContent = hasSession ? 'Installed web app. Sign in as yannick to control the light.' : 'Installed web app. Sign in to control the light.';
    } else {
      installTip.textContent = 'On iPhone: Share -> Add to Home Screen';
    }
    if (pending) {
      accessLabel.textContent = 'Saving...';
    } else if (authPending) {
      accessLabel.textContent = 'Signing in...';
    } else if (canControl) {
      accessLabel.textContent = 'Signed in as yannick';
    } else if (hasSession) {
      accessLabel.textContent = 'Signed in read only';
    } else {
      accessLabel.textContent = 'Read only';
    }
  }

  async function loadState() {
    try {
      const res = await fetch('/api/lights', { cache: 'no-store' });
      if (!res.ok) throw new Error('load failed');
      const data = await res.json();
      if (!lastUpdatedAt || !data.updatedAt || data.updatedAt >= lastUpdatedAt) {
        setVisual(apiToWebsiteState(data.on), data.updatedAt);
      }
    } catch {
      if (hasLoadedState || pending) return;
      stateLabel.textContent = 'Unavailable';
    } finally {
      updateAccess();
    }
  }

  async function login() {
    const username = usernameInput.value.trim();
    const password = passwordInput.value;
    if (!username || !password || authPending) return;
    authPending = true;
    updateAccess();
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.token || !data.username) throw new Error(data.error || 'Sign-in failed');
      setCachedSession(data);
      passwordInput.value = '';
      updateAccess();
    } catch (error) {
      accessLabel.textContent = error && error.message ? error.message : 'Sign-in failed';
    } finally {
      authPending = false;
      updateAccess();
    }
  }

  async function logout() {
    if (authPending) return;
    authPending = true;
    updateAccess();
    const token = getToken();
    clearCachedSession();
    try {
      if (token) {
        await fetch('/api/auth/logout', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token },
        });
      }
    } catch {}
    authPending = false;
    updateAccess();
  }

  async function loadDeviceStatus() {
    try {
      const res = await fetch('/api/lights/device/status', { cache: 'no-store' });
      if (!res.ok) throw new Error('status failed');
      const data = await res.json();
      const recent = data.recentlyPolled === true;
      pollLabel.classList.toggle('is-recent', recent);
      pollText.textContent = recent ? 'Polled in last 5s' : 'No poll in last 5s';
    } catch {
      pollLabel.classList.remove('is-recent');
      pollText.textContent = 'Poll status unavailable';
    }
  }

  function connectEvents() {
    if (!window.EventSource) return false;

    const events = new EventSource('/api/lights/events');
    events.onopen = () => {
      eventsConnected = true;
    };
    events.onmessage = event => {
      try {
        const data = JSON.parse(event.data);
        setVisual(apiToWebsiteState(data.on), data.updatedAt);
        updateAccess();
      } catch {}
    };
    events.onerror = () => {
      eventsConnected = false;
    };
    return true;
  }

  async function saveState(on) {
    if (!canControl || pending) return;
    const previous = currentOn;
    pending = true;
    switchBtn.setAttribute('aria-busy', 'true');
    setVisual(on);
    updateAccess();

    try {
      const res = await fetch('/api/lights', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + getToken(),
        },
        body: JSON.stringify({ on: websiteToApiState(on) }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'save failed');
      setVisual(apiToWebsiteState(data.on), data.updatedAt);
    } catch {
      setVisual(previous);
      accessLabel.textContent = 'Save failed';
    } finally {
      pending = false;
      switchBtn.setAttribute('aria-busy', 'false');
      updateAccess();
    }
  }

  function handleSwitchPress(event) {
    event.preventDefault();
    saveState(!currentOn);
  }

  switchBtn.addEventListener('pointerdown', handleSwitchPress);
  switchBtn.addEventListener('keydown', event => {
    if (event.key === ' ' || event.key === 'Enter') handleSwitchPress(event);
  });
  loginBtn.addEventListener('click', login);
  logoutBtn.addEventListener('click', logout);
  passwordInput.addEventListener('keydown', event => {
    if (event.key === 'Enter') login();
  });
  window.addEventListener('storage', updateAccess);

  updateAccess();
  loadState();
  loadDeviceStatus();
  connectEvents();
  setInterval(() => {
    if (!pending && !eventsConnected) loadState();
  }, 1000);
  setInterval(loadDeviceStatus, 1000);
</script>
</body>
</html>
