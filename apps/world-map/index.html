<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>World Map Quiz — BIG TUNA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  :root {
    --game-vh: 100dvh;
    --game-top: 52px;
    --game-height: calc(100dvh - 52px);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #eee;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    user-select: none;
  }

  /* Lock layout to visible viewport while game is active so the keyboard
     can't push the input bar off screen on Android (dvh shrinks with keyboard)
     or let it scroll out of view. iOS is handled separately via visualViewport. */
  body.game-active {
    height: 100svh;
    height: var(--game-vh);
    overflow: hidden;
  }
  body.game-active #app {
    height: 100%;
    overflow: hidden;
  }

  #app { flex: 1; display: flex; flex-direction: column; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    border: none; border-radius: 12px; cursor: pointer;
    font-family: inherit; font-weight: 800; letter-spacing: 0.06em;
    transition: opacity .15s, transform .1s, background .12s;
    touch-action: manipulation; text-decoration: none;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary   { background: #fff; color: #0a0a0a; padding: 14px 24px; font-size: 0.88rem; }
  .btn-primary:hover { background: #f0f0f0; }
  .btn-secondary { background: #1e1e1e; color: #ccc; padding: 12px 20px; font-size: 0.85rem; border: 1px solid #2a2a2a; }
  .btn-secondary:hover { background: #252525; }
  .btn-danger    { background: #1a0707; color: #ff6b6b; padding: 10px 18px; font-size: 0.82rem; border: 1px solid #3a1010; }
  .btn-danger:hover { background: #220909; }
  .btn-sm { padding: 8px 14px; font-size: 0.78rem; letter-spacing: 0.05em; }
  .btn-full { width: 100%; }

  /* ── HOME ── */
  .home {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px 48px;
    gap: 48px;
  }
  .home-hero { text-align: center; }
  .home-globe { font-size: clamp(3rem, 10vw, 5rem); line-height: 1; margin-bottom: 16px; }
  .home-title {
    font-size: clamp(2rem, 7vw, 3.2rem);
    font-weight: 900; letter-spacing: -0.03em; line-height: 1.05;
    color: #eee;
  }
  .home-sub {
    margin-top: 10px;
    font-size: clamp(0.8rem, 2vw, 0.95rem);
    color: #444; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .home-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 260px; }

  /* ── GAME ── */
  .game-wrap {
    flex: 1; display: flex; flex-direction: column;
    min-height: 0; overflow: hidden;
  }
  body.keyboard-open .game-wrap {
    position: fixed;
    left: 0;
    right: 0;
    top: var(--game-top);
    height: var(--game-height);
    width: 100%;
    z-index: 150;
    background: #0a0a0a;
  }

  .map-container {
    flex: 1; position: relative; overflow: hidden;
    background: #0b141f;
    min-height: 150px;
  }
  .map-container svg {
    display: block; width: 100%; height: 100%;
  }

  .country-path {
    fill: #252525; stroke: #111; stroke-width: 0.4px;
    transition: fill 0.5s ease;
    cursor: default;
  }
  .country-path.guessed { fill: #1b5e38; }
  .country-path.flash   { fill: #4caf50; transition: fill 0.05s; }

  /* Graticule */
  .graticule { fill: none; stroke: #131c26; stroke-width: 0.3px; }

  .bottom-bar {
    background: #111; border-top: 1px solid #1c1c1c;
    padding: 10px 14px 12px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    flex-shrink: 0;
  }
  .stats-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; gap: 4px;
  }
  .stat-box { display: flex; flex-direction: column; align-items: center; gap: 1px; min-width: 48px; }
  .stat-val {
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
    line-height: 1;
  }
  .stat-lbl { font-size: 0.6rem; color: #444; text-transform: uppercase; letter-spacing: 0.1em; }
  .stat-val.red { color: #ef5350; }
  .stat-val.green { color: #4caf50; }
  .stat-divider { width: 1px; background: #1e1e1e; align-self: stretch; margin: 2px 0; }

  .input-row { display: flex; gap: 8px; align-items: center; }

  #country-input {
    flex: 1; background: #1a1a1a; border: 1px solid #2a2a2a;
    border-radius: 10px; padding: 11px 14px; color: #eee;
    font-family: inherit; font-size: 1rem; outline: none;
    transition: border-color .2s, background .2s;
    user-select: text; -webkit-user-select: text;
  }
  #country-input:focus { border-color: #3a3a3a; }
  #country-input.correct { border-color: #4caf50; background: #0c1c0e; }
  #country-input.wrong   { border-color: #ef5350; background: #1a0808; }

  body.keyboard-open .bottom-bar {
    padding: 6px 10px 7px;
    padding-bottom: calc(7px + env(safe-area-inset-bottom, 0px));
  }
  body.keyboard-open .map-container { min-height: 0; }
  body.keyboard-open .stats-row { margin-bottom: 6px; gap: 3px; }
  body.keyboard-open .stat-box { min-width: 42px; }
  body.keyboard-open .stat-val { font-size: 1rem; }
  body.keyboard-open .stat-lbl { font-size: 0.5rem; letter-spacing: 0.08em; }
  body.keyboard-open .btn-sm {
    padding: 7px 10px;
    font-size: 0.7rem;
    border-radius: 9px;
  }
  body.keyboard-open #country-input {
    padding: 9px 12px;
    font-size: 16px;
    border-radius: 9px;
  }

  @media (max-height: 560px) {
    body.game-active .bottom-bar {
      padding-top: 6px;
      padding-bottom: calc(7px + env(safe-area-inset-bottom, 0px));
    }
    body.game-active .stats-row { margin-bottom: 6px; }
    body.game-active .stat-val { font-size: 1rem; }
  }

  /* ── SCREEN (settings / highscores / results) ── */
  .screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; padding: 28px 20px 60px;
    gap: 20px; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .screen-title {
    font-size: 1.5rem; font-weight: 900; letter-spacing: -0.01em;
    align-self: flex-start; max-width: 480px; width: 100%;
    margin: 0 auto;
  }

  .card {
    background: #141414; border: 1px solid #1e1e1e;
    border-radius: 16px; padding: 20px;
    width: 100%; max-width: 480px;
  }
  .card-label {
    font-size: 0.68rem; color: #444; text-transform: uppercase;
    letter-spacing: 0.12em; margin-bottom: 14px; font-weight: 700;
  }

  /* Settings option grid */
  .opt-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .opt-btn {
    padding: 11px 6px; border-radius: 9px; border: 1px solid #2a2a2a;
    background: #1a1a1a; color: #777; font-family: inherit;
    font-size: 0.82rem; font-weight: 700; cursor: pointer;
    text-align: center; transition: all .15s;
  }
  .opt-btn.on { background: #eee; color: #0a0a0a; border-color: #eee; }
  .opt-btn:hover:not(.on) { background: #222; color: #ccc; }

  /* Highscores */
  .hs-list { display: flex; flex-direction: column; gap: 8px; }
  .hs-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; background: #0f0f0f;
    border-radius: 10px; border: 1px solid #1a1a1a;
  }
  .hs-rank { font-size: 0.78rem; color: #333; font-weight: 700; width: 18px; text-align: center; flex-shrink: 0; }
  .hs-body { flex: 1; }
  .hs-score { font-size: 1.05rem; font-weight: 800; }
  .hs-meta { font-size: 0.72rem; color: #444; margin-top: 2px; }
  .hs-time { font-size: 0.82rem; color: #555; font-variant-numeric: tabular-nums; }
  .hs-empty { text-align: center; padding: 28px 0; color: #333; font-size: 0.9rem; }

  /* Results */
  .result-big {
    font-size: clamp(3.5rem, 14vw, 6rem);
    font-weight: 900; letter-spacing: -0.04em; line-height: 1;
    color: #4caf50;
  }
  .result-sub { font-size: 0.95rem; color: #444; margin-top: 6px; }
  .missed-wrap { display: flex; flex-wrap: wrap; gap: 6px; max-height: 240px; overflow-y: auto; }
  .missed-tag {
    background: #111; border: 1px solid #1e1e1e; border-radius: 6px;
    padding: 4px 10px; font-size: 0.78rem; color: #555;
  }
  .btn-row { display: flex; gap: 10px; width: 100%; max-width: 480px; }
  .btn-row .btn { flex: 1; }

  /* Toast for already-guessed */
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: #222; border: 1px solid #333; color: #aaa;
    padding: 8px 18px; border-radius: 8px; font-size: 0.82rem;
    opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none;
    white-space: nowrap; z-index: 1000;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── EXPERT MODE overrides ── */
  body.expert-mode { background: #020202; }
  body.expert-mode .map-container { background: #060008; }
  body.expert-mode .bottom-bar { background: #060000; border-top-color: #1c0000; }
  body.expert-mode .country-path { fill: #180000; stroke: #0a0000; }
  body.expert-mode .country-path.guessed { fill: #5a0000; transition: fill 0.5s ease; }
  body.expert-mode .country-path.flash   { fill: #cc1100; transition: fill 0.05s; }
  body.expert-mode .btn-primary   { background: #bb0000; color: #fff; }
  body.expert-mode .btn-primary:hover { background: #990000; }
  body.expert-mode .stat-val.green { color: #cc2200; }
  body.expert-mode #country-input:focus { border-color: #5a0000; }
  body.expert-mode #country-input.correct { border-color: #cc1100; background: #120000; }
  body.expert-mode .result-big { color: #cc2200; }
  body.expert-mode .home { background: #020202; }
  body.expert-mode .graticule { stroke: #0d0005; }

  /* ── EXPERT INTRO overlay ── */
  #expert-intro {
    position: fixed; inset: 0; background: #000;
    z-index: 9999; overflow: hidden;
  }
  #expert-intro canvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
  }
  #expert-intro-title {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(2.8rem, 13vw, 7rem);
    font-weight: 900; letter-spacing: -0.04em; line-height: 0.88;
    text-align: center; color: #fff; pointer-events: none;
    animation: expert-glow 0.45s ease-in-out infinite alternate;
  }
  @keyframes expert-glow {
    from { text-shadow: 0 0 20px rgba(255,30,0,.7),  0 0 60px rgba(200,0,0,.4); }
    to   { text-shadow: 0 0 60px rgba(255,60,0,1),   0 0 130px rgba(220,0,0,.8), 0 0 220px rgba(180,0,0,.3); }
  }

// ─────────────────────────────────────────────────────────────────────────────
// FUZZY MATCHING
// ─────────────────────────────────────────────────────────────────────────────
function norm(s) {
  return s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

// Build lookup maps for each database
function buildMaps(db) {
  const nameToId = {}, aliasToId = {}, nameList = [];
  for (const [id, data] of Object.entries(db)) {
    const n = norm(data.name);
    nameToId[n] = id;
    nameList.push({ id, n });
    for (const a of data.aliases) {
      const an = norm(a);
      if (!aliasToId[an]) aliasToId[an] = id;
    }
  }
  return { nameToId, aliasToId, nameList };
}
const worldMaps = buildMaps(COUNTRIES);
const stateMaps = buildMaps(STATES);

function getMaps() { return state.mode === 'usa' ? stateMaps : worldMaps; }
function getDB()   { return state.mode === 'usa' ? STATES   : COUNTRIES; }

function levenshtein(a, b) {
  if (a === b) return 0;
  const m = a.length, n = b.length;
  if (!m) return n; if (!n) return m;
  let prev = Array.from({ length: n + 1 }, (_, i) => i);
  let curr = new Array(n + 1);
  for (let i = 1; i <= m; i++) {
    curr[0] = i;
    for (let j = 1; j <= n; j++) {
      curr[j] = a[i-1] === b[j-1]
        ? prev[j-1]
        : 1 + Math.min(prev[j-1], prev[j], curr[j-1]);
    }
    [prev, curr] = [curr, prev];
  }
  return prev[n];
}

function maxDist(len) {
  if (len <= 3) return 0;
  if (len <= 5) return 1;
  if (len <= 9) return 2;
  return 3;
}

// Returns country/state id or null
function matchCountry(input) {
  const { nameToId, aliasToId, nameList } = getMaps();
  const n = norm(input);
  if (!n) return null;
  if (nameToId[n])  return nameToId[n];   // exact match — no length gate
  if (aliasToId[n]) return aliasToId[n];  // alias match — no length gate

  // Fuzzy against names (needs min 3 chars)
  if (n.length < 3) return null;
  const threshold = maxDist(n.length);
  if (threshold === 0) return null;

  let best = null, bestDist = threshold + 1;
  for (const entry of nameList) {
    const d = levenshtein(n, entry.n);
    if (d < bestDist) { bestDist = d; best = entry.id; }
    else if (d === bestDist) { best = null; }
  }
  for (const [an, aid] of Object.entries(aliasToId)) {
    const d = levenshtein(n, an);
    if (d < bestDist) { bestDist = d; best = aid; }
    else if (d === bestDist && aid !== best) { best = null; }
  }
  return (best && bestDist <= threshold) ? best : null;
}

// Quick exact/alias match (for real-time as user types)
function quickMatch(input) {
  const { nameToId, aliasToId } = getMaps();
  const n = norm(input);
  return nameToId[n] || aliasToId[n] || null;
}

function installKeyboardViewportFix(input) {
  const root = document.documentElement;
  const baselineHeight = window.innerHeight;
  let focused = document.activeElement === input;

  const setCompact = () => {
    const vv = window.visualViewport;
    const viewportHeight = vv ? vv.height : window.innerHeight;
    const viewportTop = vv ? vv.offsetTop : 0;
    const topbarEl = document.getElementById('topbar');
    const tbH = topbarEl ? topbarEl.offsetHeight : 52;
    const gameTop = Math.max(tbH, viewportTop + tbH);
    const available = Math.max(1, viewportHeight - tbH);
    const keyboardLikelyOpen = focused && (
      (vv && baselineHeight - viewportHeight > 90) ||
      window.innerHeight < baselineHeight - 90
    );

    root.style.setProperty('--game-vh', `${viewportHeight}px`);
    root.style.setProperty('--game-top', `${gameTop}px`);
    root.style.setProperty('--game-height', `${available}px`);
    document.body.classList.toggle('keyboard-open', keyboardLikelyOpen);

    const wrap = document.querySelector('.game-wrap');
    if (wrap) wrap.style.height = `${available}px`;
  };

  const onFocus = () => { focused = true; setCompact(); };
  const onBlur = () => {
    focused = false;
    setTimeout(setCompact, 80);
  };

  input.addEventListener('focus', onFocus);
  input.addEventListener('blur', onBlur);
  window.addEventListener('resize', setCompact);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', setCompact);
    window.visualViewport.addEventListener('scroll', setCompact);
  }

  setCompact();

  return () => {
    input.removeEventListener('focus', onFocus);
    input.removeEventListener('blur', onBlur);
    window.removeEventListener('resize', setCompact);
    if (window.visualViewport) {
      window.visualViewport.removeEventListener('resize', setCompact);
      window.visualViewport.removeEventListener('scroll', setCompact);
    }
    document.body.classList.remove('keyboard-open');
    root.style.removeProperty('--game-vh');
    root.style.removeProperty('--game-top');
    root.style.removeProperty('--game-height');
    const wrap = document.querySelector('.game-wrap');
    if (wrap) wrap.style.height = '';
  };
}

function focusWithoutScroll(input) {
  try { input.focus({ preventScroll: true }); }
  catch { input.focus(); }
}

  document.body.classList.toggle('game-active', state.view === 'game');
  document.body.classList.toggle('expert-mode', state.mode === 'world' && state.difficulty === 'expert');
  clearTopbarLeft();

  const app = document.getElementById('app');
  switch (state.view) {
    case 'home':       renderHome(app);       break;

    case 'results':    renderResults(app);    break;
    case 'settings':   renderSettings(app);   break;
    case 'highscores': renderHighscores(app); break;

}

    const id = quickMatch(val);
    if (id && state.mapIds.has(id)) {
      if (state.guessed.has(id)) {
        // Already guessed — only interrupt if no unguessed country's name/alias starts with this input
        const db = getDB();
        const hasLongerMatch = [...state.mapIds].some(cid => {
          if (cid === id) return false;
          if (state.guessed.has(cid)) return false;
          const data = db[cid];
          return [data.name, ...data.aliases].some(s => norm(s).startsWith(n));
        });
        if (hasLongerMatch) return;
        showToast(`Already got ${db[id].name}!`);
        input.value = '';
      } else {
        // If this is a full-name match (not an alias), don't auto-confirm while
        // another unguessed country's full name starts with the same input.
        // This lets you type "nigeria" through "niger" without accidentally
        // confirming Niger. Alias matches ("uk", "aus") still confirm instantly.
        const { nameToId } = getMaps();
        if (nameToId[n] === id) {
          const db = getDB();
          const blockedByLonger = [...state.mapIds].some(cid => {
            if (cid === id || state.guessed.has(cid)) return false;
            const cn = norm(db[cid].name);
            return cn.startsWith(n) && cn.length > n.length;
          });
          if (blockedByLonger) return;
        }
        confirmGuess(id, input);
      }
    }
  });

  input.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const val = input.value.trim();
    if (!val) return;
    const id = matchCountry(val);
    if (!id || !state.mapIds.has(id)) {
      input.classList.add('wrong');
      setTimeout(() => input.classList.remove('wrong'), 500);
      return;
    }
    if (state.guessed.has(id)) {
      showToast(`Already got ${getDB()[id].name}!`);
      input.value = '';
      return;
    }
    confirmGuess(id, input);
  });

  // Map
  initMap(document.getElementById('map-container'));

  state.vvCleanup = installKeyboardViewportFix(input);

  // Timer (delayed for expert intro)
  const startGameTimer = () => {
    const inp = document.getElementById('country-input');
    if (inp) { inp.disabled = false; focusWithoutScroll(inp); }
    if (state.settings.timeLimit > 0) {
      state.timer = setInterval(() => {
        state.timeLeft--;
        updateTimer();
        if (state.timeLeft <= 0) { clearInterval(state.timer); state.timer = null; endGame(); }
      }, 1000);
    } else {
      state.timer = setInterval(() => { state.timeLeft++; updateTimer(); }, 1000);
    }
  };

  if (state.mode === 'world' && state.difficulty === 'expert') {
    const inp = document.getElementById('country-input');
    if (inp) inp.disabled = true;
    showExpertIntro().then(startGameTimer);
  } else {
    startGameTimer();
  }
}

function confirmGuess(id, input) {
  state.guessed.add(id);

  // Flash path on map (plus any territories — world mode only)
  const territoryIds = state.mode === 'world' ? (TERRITORIES[id] || []) : [];
  for (const pid of [id, ...territoryIds]) {
    const paths = document.querySelectorAll(`[data-id="${pid}"]`);
    paths.forEach(path => {
      path.classList.add('flash');
      setTimeout(() => {
        path.classList.remove('flash');
        path.classList.add('guessed');
      }, 350);
    });
  }

  // Check combo territories (world mode only)
  for (const combo of (state.mode === 'world' ? COMBO_TERRITORIES : [])) {
    if (!combo.requires.includes(id)) continue;
    if (combo.requires.every(cid => state.guessed.has(cid))) {
      for (const pid of combo.unlocks) {
        const paths = document.querySelectorAll(`[data-id="${pid}"]`);
        paths.forEach(path => {
          path.classList.add('flash');
          setTimeout(() => {
            path.classList.remove('flash');
            path.classList.add('guessed');
          }, 350);
        });
      }
    }
  }

  // Show country name, clear after delay
  if (input) {
    input.value = getDB()[id]?.name || '';
    input.classList.add('correct');
    setTimeout(() => {
      input.classList.remove('correct');
      input.value = '';
      focusWithoutScroll(input);
    }, 700);
  }

  const el = document.getElementById('stat-guessed');
  if (el) el.textContent = state.guessed.size;

  if (state.guessed.size >= state.mapIds.size) {
    clearInterval(state.timer); state.timer = null;
    setTimeout(endGame, 500);
  }
}

function updateTimer() {
  const el = document.getElementById('stat-timer');
  if (!el) return;
  el.textContent = fmt(state.timeLeft);
  el.classList.toggle('red', state.settings.timeLimit > 0 && state.timeLeft <= 30);
}

function endGame() {
  if (state.timer) { clearInterval(state.timer); state.timer = null; }

  const elapsed = Math.floor((Date.now() - state.gameStartTime) / 1000);
  const score = {
    count: state.guessed.size,
    total: state.mapIds.size,
    elapsed,
    date: new Date().toLocaleDateString(),
    timestamp: Date.now(),
  };
  state.lastScore = score;
  state.missedIds = [...state.mapIds].filter(id => !state.guessed.has(id));

  const hs = getHighscores();
  hs.push(score);
  hs.sort((a, b) => b.count - a.count || a.elapsed - b.elapsed);
  hs.splice(10);
  saveSettings();

  state.view = 'results';
  render();
}

// MAP (D3 + topojson)
// ─────────────────────────────────────────────────────────────────────────────
async function initMap(container) {
  if (state.mode === 'usa') {
    await initMapUSA(container);
  } else {
    await initMapWorld(container);
  }
}

async function initMapWorld(container) {
  if (!state.worldData) {
    try {
      const r = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
      state.worldData = await r.json();
    } catch {
      container.innerHTML = '<div style="color:#333;text-align:center;padding:60px 20px;font-size:.9rem">Failed to load map data.<br>Check your connection.</div>';
      return;
    }
  }

  const W = 960, H = 500;
  const projection = d3.geoNaturalEarth1().scale(153.5).translate([W / 2, H / 2]);
  const pathGen = d3.geoPath().projection(projection);

  const svg = d3.select(container).append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('preserveAspectRatio', 'xMidYMid meet')
    .style('display', 'block').style('width', '100%').style('height', '100%');

  svg.append('rect').attr('width', W).attr('height', H).attr('fill', '#0b141f');
  svg.append('path').datum(d3.geoGraticule()()).attr('class', 'graticule').attr('d', pathGen);

  const countries = topojson.feature(state.worldData, state.worldData.objects.countries);

  const expert = state.difficulty === 'expert';
  const bonusIds = expert ? [...REGULAR_BONUS, ...EXPERT_ONLY_BONUS] : REGULAR_BONUS;

  state.mapIds.clear();
  countries.features.forEach(f => {
    const id = getWorldFeatureId(f);
    if (COUNTRIES[id]) state.mapIds.add(id);
  });
  for (const id of bonusIds) {
    if (COUNTRIES[id]) state.mapIds.add(id);
  }

  const totalEl = document.getElementById('stat-total');
  if (totalEl) totalEl.textContent = state.mapIds.size;

  svg.selectAll('.country-path')
    .data(countries.features)
    .enter().append('path')
    .attr('class', 'country-path')
    .attr('d', pathGen)
    .attr('data-id', d => getWorldFeatureId(d));

  svg.append('path')
    .datum(topojson.mesh(state.worldData, state.worldData.objects.countries, (a, b) => a !== b))
    .attr('fill', 'none').attr('stroke', '#111').attr('stroke-width', 0.4).attr('d', pathGen);

  svg.append('path')
    .datum({ type: 'Sphere' })
    .attr('fill', 'none').attr('stroke', '#1a2a3a').attr('stroke-width', 0.6).attr('d', pathGen);

  // Dots for bonus countries (all modes show REGULAR_BONUS dots; expert adds the rest)
  for (const id of bonusIds) {
    const coords = BONUS_COORDS[id];
    if (!coords) continue;
    const projected = projection(coords);
    if (!projected) continue;
    svg.append('circle')
      .attr('class', 'country-path')
      .attr('data-id', id)
      .attr('cx', projected[0])
      .attr('cy', projected[1])
      .attr('r', 2.5)
      .attr('stroke-width', 0.6);
  }

  state.svgEl = svg.node();
}

async function initMapUSA(container) {
  if (!state.usaData) {
    try {
      const r = await fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json');

    }
  }

  const svg = d3.select(container).append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)

  svg.append('rect').attr('width', W).attr('height', H).attr('fill', '#0b141f');

  const statesGeo = topojson.feature(state.usaData, state.usaData.objects.states);

  statesGeo.features.forEach(f => {

// ─────────────────────────────────────────────────────────────────────────────
// EXPERT AUDIO  (Web Audio API procedural beat)
// ─────────────────────────────────────────────────────────────────────────────
const ExpertAudio = (() => {
  let ctx = null, master = null, schedId = null, nextTime = 0, step = 0;
  const BPM = 138, S16 = 60 / BPM / 4; // 16th-note duration

  function noise(t, dur, freq, vol) {
    const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const filt = ctx.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = freq; filt.Q.value = 0.8;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(filt); filt.connect(g); g.connect(master);
    src.start(t); src.stop(t + dur);
  }

  function kick(t) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.exponentialRampToValueAtTime(28, t + 0.45);
    g.gain.setValueAtTime(1.6, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);
    osc.connect(g); g.connect(master); osc.start(t); osc.stop(t + 0.45);
  }

  function snare(t) {
    noise(t, 0.14, 1800, 0.45);
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.frequency.value = 220; osc.type = 'triangle';
    g.gain.setValueAtTime(0.25, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);
    osc.connect(g); g.connect(master); osc.start(t); osc.stop(t + 0.1);
  }

  function hihat(t, vol) { noise(t, 0.04, 9000, vol); }

  function bass(t, freq) {
    if (!freq) return;
    const osc = ctx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = freq;
    const filt = ctx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 280; filt.Q.value = 3;
    const dist = ctx.createWaveShaper();
    const curve = new Float32Array(128);
    for (let i = 0; i < 128; i++) { const x = (i * 2) / 128 - 1; curve[i] = Math.tanh(x * 4) * 0.7; }
    dist.curve = curve;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.38, t); g.gain.exponentialRampToValueAtTime(0.0001, t + S16 * 1.8);
    osc.connect(dist); dist.connect(filt); filt.connect(g); g.connect(master);
    osc.start(t); osc.stop(t + S16 * 2);
  }

  // 16-step pattern at 138 BPM
  const KICK  = new Set([0, 6, 8, 14]);           // syncopated kick
  const SNARE = new Set([4, 12]);                  // beats 2 & 4
  const HHAT  = new Set([0,2,4,6,8,10,12,14]);    // 8th notes open
  // E minor bass riff (Hz, 0 = rest)
  const BASS  = [41.2, 0, 41.2, 0, 49.0, 0, 41.2, 36.7, 41.2, 0, 41.2, 0, 49.0, 55.0, 0, 41.2];

  function tick() {
    while (nextTime < ctx.currentTime + 0.18) {
      const s = step % 16;
      if (KICK.has(s))  kick(nextTime);
      if (SNARE.has(s)) snare(nextTime);
      hihat(nextTime, HHAT.has(s) ? 0.1 : 0.045);
      bass(nextTime, BASS[s]);
      nextTime += S16; step++;
    }
    schedId = setTimeout(tick, 50);
  }

  return {
    start() {
      if (ctx) return;
      try {
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        master = ctx.createGain(); master.gain.value = 0.5; master.connect(ctx.destination);
        nextTime = ctx.currentTime + 0.05; step = 0; tick();
      } catch(e) {}
    },
    stop() {
      if (schedId) { clearTimeout(schedId); schedId = null; }
      if (ctx) {
        try { master.gain.setValueAtTime(master.gain.value, ctx.currentTime);
              master.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.4); } catch(e) {}
        setTimeout(() => { if (ctx) { ctx.close(); ctx = null; } }, 500);
      }
    }
  };
})();

// ─────────────────────────────────────────────────────────────────────────────
// EXPERT INTRO ANIMATION
// ─────────────────────────────────────────────────────────────────────────────
function showExpertIntro() {
  return new Promise(resolve => {
    ExpertAudio.start();

    const overlay = document.createElement('div');
    overlay.id = 'expert-intro';
    overlay.innerHTML = `<canvas id="ei-canvas"></canvas><div id="expert-intro-title">EXPERT<br>MODE</div>`;
    document.body.appendChild(overlay);

    const canvas = document.getElementById('ei-canvas');
    const c = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const W = canvas.width, H = canvas.height;
    const particles = [];

    function spawnParticle() {
      const smoke = Math.random() < 0.28;
      particles.push({
        x: Math.random() * W,
        y: H + 15,
        vx: (Math.random() - 0.5) * (smoke ? 1.2 : 1.8),
        vy: -(Math.random() * (smoke ? 2.5 : 4.5) + 1.5),
        life: smoke ? 0.55 + Math.random() * 0.3 : 0.8 + Math.random() * 0.2,
        size: smoke ? Math.random() * 30 + 20 : Math.random() * 22 + 8,
        decay: smoke ? 0.005 : 0.013 + Math.random() * 0.007,
        smoke,
      });
    }

    // Pre-seed particles spread across the screen vertically
    for (let i = 0; i < 90; i++) {
      spawnParticle();
      const p = particles[particles.length - 1];
      p.y = H * (0.3 + Math.random() * 0.8);
      p.life *= Math.random();
    }

    let animId;
    const start = Date.now();
    const DURATION = 2800;

    function frame() {
      const elapsed = Date.now() - start;
      c.clearRect(0, 0, W, H);

      // Spawn more
      for (let i = 0; i < 6; i++) spawnParticle();

      // Update & cull
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy -= 0.03;
        if (p.smoke) p.size += 0.5; else p.size *= 0.993;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }

      // Draw smoke first (behind fire)
      for (const p of particles) {
        if (!p.smoke) continue;
        c.save(); c.globalAlpha = p.life * 0.18;
        c.fillStyle = '#2a2a2a';
        c.beginPath(); c.arc(p.x, p.y, p.size, 0, Math.PI * 2); c.fill();
        c.restore();
      }
      // Draw fire
      for (const p of particles) {
        if (p.smoke) continue;
        const g = c.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
        const gb = Math.floor(p.life * 160);
        g.addColorStop(0,   `rgba(255,${gb + 60},10,${p.life})`);
        g.addColorStop(0.45,`rgba(230,${gb},0,${p.life * 0.65})`);
        g.addColorStop(1,   `rgba(160,0,0,0)`);
        c.save(); c.fillStyle = g;
        c.beginPath(); c.arc(p.x, p.y, p.size, 0, Math.PI * 2); c.fill();
        c.restore();
      }

      if (elapsed < DURATION) {
        animId = requestAnimationFrame(frame);
      } else {
        overlay.style.transition = 'opacity 0.55s';
        overlay.style.opacity = '0';
        setTimeout(() => { cancelAnimationFrame(animId); overlay.remove(); resolve(); }, 580);
      }
    }

    animId = requestAnimationFrame(frame);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// PERSISTENCE
// ─────────────────────────────────────────────────────────────────────────────
function saveSettings() {
  const data = {
    settings: state.settings,
    worldHighscores:       state.worldHighscores,
    worldExpertHighscores: state.worldExpertHighscores,
    usaHighscores:         state.usaHighscores,
  };
  try { localStorage.setItem('world-map', JSON.stringify(data)); } catch {}
  if (_sync) _sync.sync();
}

function applySettings(data) {
  if (!data) return;
  if (data.settings)              state.settings              = { ...state.settings, ...data.settings };
  if (data.worldHighscores)       state.worldHighscores       = data.worldHighscores;
  if (data.worldExpertHighscores) state.worldExpertHighscores = data.worldExpertHighscores;
  if (data.usaHighscores)         state.usaHighscores         = data.usaHighscores;
  // Migrate legacy single highscores array
  if (data.highscores && !data.worldHighscores) state.worldHighscores = data.highscores;
}

// BOOT
// ─────────────────────────────────────────────────────────────────────────────
window.__worldMapInit = async function () {
  const saved = window.Auth ? await Auth.loadSettings('world-map') : null;
  if (saved) {
    applySettings(saved);
  } else {
    try { applySettings(JSON.parse(localStorage.getItem('world-map'))); } catch {}
  }
  if (window.Auth) {
    _sync = Auth.autoSync('world-map', () => ({
      settings: state.settings,
      worldHighscores:       state.worldHighscores,
      worldExpertHighscores: state.worldExpertHighscores,
      usaHighscores:         state.usaHighscores,
    }));
  }
  render();
};
</script>

<script src="/topbar.js"></script>
<script src="/auth.js"></script>
<script>
  if (window.Auth) {
    Auth.onReady(() => window.__worldMapInit());
  } else {
    window.__worldMapInit();
  }
</script>
</body>
