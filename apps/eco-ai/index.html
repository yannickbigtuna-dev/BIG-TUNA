<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Eco AI - BIG TUNA</title>
  <style>
    :root {
      --bg: #212121;
      --surface: #171717;
      --surface-2: #2a2a2a;
      --surface-3: #343541;
      --surface-4: #40414f;
      --line: rgba(255, 255, 255, 0.08);
      --text: #ececec;
      --muted: #a9a9b3;
      --muted-2: #8e8ea0;
      --accent: #19c37d;
      --accent-2: #10a37f;
      --danger: #ef6b63;
      --bubble-user: #2f2f33;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --content-width: 48rem;
      --sidebar-width: 260px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    #app-shell {
      flex: 1;
      min-height: 0;
      display: flex;
      overflow: hidden;
      background: var(--bg);
    }

    #drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.52);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 310;
    }

    body.drawer-open #drawer-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    #sidebar {
      width: var(--sidebar-width);
      flex: 0 0 var(--sidebar-width);
      background: #171717;
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
      z-index: 320;
    }

    .sidebar-inner {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 12px;
    }

    .sidebar-top {
      display: grid;
      gap: 10px;
    }

    .sidebar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
    }

    .brand {
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .sidebar-btn,
    .mini-btn,
    .pill-btn,
    .send-btn,
    .danger-btn,
    .ghost-btn,
    .icon-btn {
      border: 0;
      color: var(--text);
      background: none;
    }

    .sidebar-btn {
      width: 100%;
      min-height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #2a2a2a;
      color: #f5f5f5;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .sidebar-btn:hover,
    .ghost-btn:hover,
    .mini-btn:hover,
    .pill-btn:hover,
    .icon-btn:hover,
    .send-btn:hover,
    .danger-btn:hover {
      filter: brightness(1.08);
    }

    .sidebar-search-note {
      color: var(--muted-2);
      font-size: 0.82rem;
      line-height: 1.45;
      padding: 0 2px;
    }

    #chat-list {
      flex: 1;
      min-height: 0;
      overflow: auto;
      display: grid;
      gap: 4px;
      padding-right: 2px;
    }

    .chat-item {
      width: 100%;
      text-align: left;
      border: 0;
      background: transparent;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      display: grid;
      gap: 4px;
    }

    .chat-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .chat-item.active {
      background: rgba(255, 255, 255, 0.1);
    }

    .chat-item-title {
      font-size: 0.92rem;
      font-weight: 500;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-meta {
      font-size: 0.74rem;
      color: var(--muted-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #main-shell {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    #main-header {
      height: 56px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      position: relative;
      padding: 0 18px;
      background: rgba(33, 33, 33, 0.96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .header-inner {
      width: 100%;
      max-width: calc(var(--content-width) + 180px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-left,
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .header-center {
      min-width: 0;
      flex: 1;
      text-align: center;
    }

    .header-title {
      font-size: 0.97rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-subtitle {
      margin-top: 2px;
      color: var(--muted-2);
      font-size: 0.73rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .ghost-btn,
    .danger-btn {
      min-height: 36px;
      padding: 0 12px;
      border-radius: 10px;
      font-size: 0.84rem;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text);
    }

    .danger-btn {
      color: #ffd7d4;
      background: rgba(239, 107, 99, 0.08);
      border-color: rgba(239, 107, 99, 0.18);
    }

    #status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 7px 11px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.76rem;
      max-width: 320px;
    }

    #status-badge.online {
      color: #d3f7e7;
      background: rgba(25, 195, 125, 0.1);
      border-color: rgba(25, 195, 125, 0.2);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
      opacity: 0.9;
    }

    #messages-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
    }

    #messages {
      width: 100%;
      max-width: var(--content-width);
      margin: 0 auto;
      padding: 18px 20px 28px;
      display: grid;
      gap: 26px;
      align-content: start;
    }

    .empty-state {
      min-height: calc(100dvh - 220px);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 18px 0 0;
    }

    .empty-card {
      width: 100%;
      max-width: 44rem;
      display: grid;
      gap: 18px;
      justify-items: center;
    }

    .empty-title {
      font-size: clamp(1.8rem, 4vw, 2.25rem);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .empty-copy {
      max-width: 38rem;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.6;
    }

    .suggestion-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 8px;
    }

    .suggestion-btn {
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: #2a2a2a;
      color: var(--text);
      border-radius: 18px;
      text-align: left;
      padding: 16px 18px;
      min-height: 92px;
      display: grid;
      gap: 6px;
    }

    .suggestion-title {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .suggestion-copy {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.45;
    }

    .msg {
      width: 100%;
      display: grid;
      gap: 10px;
    }

    .msg.user .msg-body {
      justify-content: end;
    }

    .msg-head {
      color: var(--muted-2);
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .msg-body {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      flex: 0 0 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.82rem;
      font-weight: 700;
      color: white;
      background: #10a37f;
      margin-top: 2px;
    }

    .msg.user .avatar {
      order: 2;
      background: #4b5563;
    }

    .bubble-wrap {
      min-width: 0;
      max-width: min(100%, 42rem);
      display: grid;
      gap: 8px;
    }

    .msg.user .bubble-wrap {
      justify-items: end;
    }

    .bubble {
      width: fit-content;
      max-width: 100%;
      padding: 14px 16px;
      border-radius: 20px;
      font-size: 0.97rem;
      line-height: 1.65;
      color: var(--text);
      word-break: break-word;
      white-space: normal;
    }

    .msg.assistant .bubble {
      width: 100%;
      padding: 0;
      background: transparent;
    }

    .msg.user .bubble {
      background: var(--bubble-user);
    }

    .attachments {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .attachment-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 0.79rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .msg-actions {
      display: flex;
      gap: 8px;
    }

    .mini-btn,
    .pill-btn {
      min-height: 32px;
      padding: 0 11px;
      border-radius: 999px;
      font-size: 0.78rem;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    pre,
    code {
      font-family: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
    }

    pre {
      margin: 14px 0 0;
      padding: 14px 16px;
      border-radius: 14px;
      overflow: auto;
      background: #111214;
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.87rem;
    }

    code.inline {
      padding: 2px 6px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
    }

    #composer-shell {
      flex: 0 0 auto;
      padding: 0 18px calc(18px + env(safe-area-inset-bottom, 0px));
      background: linear-gradient(180deg, rgba(33, 33, 33, 0), rgba(33, 33, 33, 0.94) 18%, rgba(33, 33, 33, 1));
    }

    #composer-width {
      width: 100%;
      max-width: calc(var(--content-width) + 60px);
      margin: 0 auto;
    }

    #draft-files {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      padding: 0 6px;
    }

    .draft-file {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #2a2a2a;
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.8rem;
      color: var(--text);
    }

    .draft-file button {
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0;
    }

    #composer-card {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #2f2f2f;
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 12px 14px 12px;
    }

    #composer-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .select-wrap {
      position: relative;
      min-width: 0;
    }

    .select-wrap select {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: #40414f;
      color: var(--text);
      border-radius: 999px;
      min-height: 34px;
      padding: 0 34px 0 12px;
      font-size: 0.78rem;
    }

    .select-wrap::after {
      content: "▾";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.78rem;
      pointer-events: none;
    }

    #composer-input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    #prompt {
      flex: 1;
      min-height: 24px;
      max-height: 220px;
      resize: none;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      padding: 6px 2px 8px;
      font-size: 1rem;
      line-height: 1.5;
    }

    #prompt::placeholder {
      color: var(--muted-2);
    }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: white;
      color: #171717;
      font-weight: 700;
    }

    #composer-footer {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted-2);
      font-size: 0.76rem;
      padding: 0 4px;
    }

    #composer-tip {
      line-height: 1.45;
    }

    #footer-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .desktop-only {
      display: inline-flex;
    }

    .mobile-only {
      display: none;
    }

    @media (max-width: 900px) {
      #status-badge {
        max-width: 220px;
      }
    }

    @media (max-width: 760px) {
      .desktop-only {
        display: none;
      }

      .mobile-only {
        display: inline-flex;
      }

      #sidebar {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        width: min(86vw, 320px);
        transform: translateX(-100%);
        transition: transform 0.22s ease;
        box-shadow: 20px 0 40px rgba(0, 0, 0, 0.35);
      }

      body.drawer-open #sidebar {
        transform: translateX(0);
      }

      #main-header {
        padding: 0 12px;
      }

      .header-inner {
        max-width: none;
      }

      .header-center {
        text-align: left;
      }

      .header-title {
        font-size: 0.92rem;
      }

      #status-badge {
        display: none;
      }

      #messages {
        padding: 16px 14px 24px;
      }

      .empty-state {
        min-height: calc(100dvh - 240px);
      }

      .suggestion-grid {
        grid-template-columns: 1fr;
      }

      #composer-shell {
        padding: 0 10px calc(10px + env(safe-area-inset-bottom, 0px));
      }

      #composer-card {
        border-radius: 22px;
        padding: 12px;
      }

      #composer-controls {
        gap: 6px;
      }

      .pill-btn,
      .mini-btn {
        min-height: 30px;
        font-size: 0.76rem;
      }

      #composer-footer {
        display: grid;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <script src="/topbar.js"></script>
  <script src="/auth.js"></script>

  <div id="drawer-backdrop"></div>

  <div id="app-shell">
    <aside id="sidebar" aria-label="Chats">
      <div class="sidebar-inner">
        <div class="sidebar-top">
          <div class="sidebar-row">
            <div class="brand">Eco AI</div>
            <button id="close-drawer-btn" class="icon-btn mobile-only" type="button" aria-label="Close chats">✕</button>
          </div>
          <button id="new-chat-btn" class="sidebar-btn" type="button">＋ New chat</button>
          <div class="sidebar-search-note">Local-first chats, files, and models. History stays in your BIG TUNA account.</div>
        </div>
        <div id="chat-list"></div>
      </div>
    </aside>

    <main id="main-shell">
      <header id="main-header">
        <div class="header-inner">
          <div class="header-left">
            <button id="open-drawer-btn" class="icon-btn mobile-only" type="button" aria-label="Open chats">☰</button>
            <div id="status-badge"><span class="status-dot"></span><span id="status-strip">Checking local Ollama status...</span></div>
          </div>

          <div class="header-center">
            <div id="active-title" class="header-title">Eco AI</div>
            <div id="header-subtitle" class="header-subtitle">Local Ollama chat on this machine</div>
          </div>

          <div class="header-right">
            <button id="rename-chat-btn" class="ghost-btn desktop-only" type="button">Rename</button>
            <button id="delete-chat-btn" class="danger-btn desktop-only" type="button">Delete</button>
          </div>
        </div>
      </header>

      <section id="messages-wrap">
        <div id="messages"></div>
      </section>

      <footer id="composer-shell">
        <div id="composer-width">
          <div id="draft-files"></div>

          <div id="composer-card">
            <div id="composer-controls">
              <button id="attach-btn" class="pill-btn" type="button">Attach</button>
              <button id="regenerate-btn" class="pill-btn" type="button">Regenerate</button>
              <button id="stop-btn" class="pill-btn" type="button">Stop</button>
              <button id="rename-chat-mobile-btn" class="pill-btn mobile-only" type="button">Rename</button>
              <button id="delete-chat-mobile-btn" class="pill-btn mobile-only" type="button">Delete</button>
              <div class="select-wrap">
                <select id="model-select" aria-label="Model"></select>
              </div>
              <div class="select-wrap">
                <select id="skill-select" aria-label="Skill"></select>
              </div>
              <input id="file-input" type="file" multiple hidden>
            </div>

            <div id="composer-input-row">
              <textarea id="prompt" rows="1" placeholder="Message Eco AI"></textarea>
              <button id="send-btn" class="send-btn" type="button" aria-label="Send">↑</button>
            </div>

            <div id="composer-footer">
              <div id="composer-tip">Local text and code files only. Prompts stay on BIG TUNA and go to Ollama on this machine.</div>
              <div id="footer-actions">
                <button id="clear-draft-btn" class="mini-btn" type="button">Clear draft</button>
              </div>
            </div>
          </div>
        </div>
      </footer>
    </main>
  </div>

  <script>
    Topbar.setTitle('Eco AI');

    const APP_ID = 'eco-ai';
    const SKILLS = [
      { id: 'general', label: 'General' },
      { id: 'coding', label: 'Coding' },
      { id: 'writing', label: 'Writing' },
      { id: 'study', label: 'Study' },
      { id: 'summarize', label: 'Summarize' },
      { id: 'file-analyst', label: 'File Analyst' },
    ];
    const FILE_CHAR_LIMIT = 80000;
    const FILE_TOTAL_LIMIT = 240000;
    const SUGGESTIONS = [
      {
        title: 'Review a local code file',
        copy: 'Attach a file and ask for a bug review, refactor, or explanation.',
        prompt: 'Review the attached file and point out the biggest correctness or maintainability issues.',
      },
      {
        title: 'Summarize notes or documents',
        copy: 'Drop in markdown, text, or CSV files and get a clean summary.',
        prompt: 'Summarize the attached material and give me the most important takeaways.',
      },
      {
        title: 'Use a study mode response',
        copy: 'Get step-by-step explanations instead of short answers.',
        prompt: 'Teach me this topic step by step and include a simple example.',
      },
      {
        title: 'Draft or rewrite something',
        copy: 'Use the writing skill to tighten wording while preserving meaning.',
        prompt: 'Rewrite this so it sounds clearer and more concise without losing the original intent.',
      },
    ];

    const state = {
      chats: [],
      activeChatId: '',
      draftFiles: [],
      status: { available: false, models: [], recommendedModel: '', setupMessage: '', error: '' },
      settings: { preferredModel: '', defaultSkill: 'general' },
      saveTimer: null,
      generating: false,
      activeAbort: null,
    };

    function uid() {
      return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function activeChat() {
      return state.chats.find(chat => chat.id === state.activeChatId) || null;
    }

    function newChat(seed = {}) {
      return {
        id: uid(),
        title: seed.title || 'New Chat',
        createdAt: nowIso(),
        updatedAt: nowIso(),
        model: seed.model || state.settings.preferredModel || '',
        skill: seed.skill || state.settings.defaultSkill || 'general',
        messages: Array.isArray(seed.messages) ? seed.messages : [],
      };
    }

    function ensureActiveChat() {
      if (!state.chats.length) {
        const chat = newChat();
        state.chats = [chat];
        state.activeChatId = chat.id;
      }
      if (!activeChat()) state.activeChatId = state.chats[0].id;
    }

    function scheduleSave() {
      clearTimeout(state.saveTimer);
      state.saveTimer = setTimeout(saveAll, 300);
    }

    async function api(path, options = {}) {
      const headers = { ...(options.headers || {}), Authorization: 'Bearer ' + Auth.token };
      if (options.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
      return fetch(path, { ...options, headers });
    }

    async function saveAll() {
      clearTimeout(state.saveTimer);
      state.saveTimer = null;
      await Promise.all([
        Auth.saveSettings(APP_ID, state.settings),
        api('/api/data/' + APP_ID, {
          method: 'POST',
          body: JSON.stringify({
            chats: state.chats,
            activeChatId: state.activeChatId,
          }),
        }),
      ]).catch(() => {});
    }

    function summarizeTitle(text) {
      const flat = String(text || '').replace(/\s+/g, ' ').trim();
      if (!flat) return 'New Chat';
      return flat.slice(0, 48);
    }

    function formatTime(iso) {
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return '';
      return date.toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    }

    function esc(text) {
      return String(text).replace(/[&<>"]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c]));
    }

    function renderMarkdown(text) {
      const blocks = [];
      let html = String(text || '').replace(/```([\s\S]*?)```/g, (_, code) => {
        blocks.push(code);
        return `@@CODE_BLOCK_${blocks.length - 1}@@`;
      });
      html = esc(html);
      html = html.replace(/@@CODE_BLOCK_(\d+)@@/g, (_, index) => {
        const code = blocks[Number(index)] || '';
        return `<pre><code>${esc(code.trim())}</code></pre>`;
      });
      html = html.replace(/`([^`\n]+)`/g, '<code class="inline">$1</code>');
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\n/g, '<br>');
      return html;
    }

    function updatePromptHeight() {
      const prompt = document.getElementById('prompt');
      prompt.style.height = 'auto';
      prompt.style.height = Math.min(prompt.scrollHeight, 220) + 'px';
    }

    function openDrawer() {
      document.body.classList.add('drawer-open');
    }

    function closeDrawer() {
      document.body.classList.remove('drawer-open');
    }

    function renderStatus() {
      const badge = document.getElementById('status-badge');
      const strip = document.getElementById('status-strip');
      const status = state.status;
      badge.classList.toggle('online', !!status.available);
      strip.textContent = status.available
        ? `Ollama online · ${status.models.length || 0} model${status.models.length === 1 ? '' : 's'}`
        : (status.setupMessage || status.error || 'Ollama offline');
      document.getElementById('header-subtitle').textContent = status.available
        ? 'Local Ollama chat on this machine'
        : 'Waiting for local Ollama';
    }

    function renderSidebar() {
      ensureActiveChat();
      const list = document.getElementById('chat-list');
      list.innerHTML = '';
      [...state.chats].sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || '')).forEach(chat => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'chat-item' + (chat.id === state.activeChatId ? ' active' : '');
        button.innerHTML = `
          <div class="chat-item-title">${esc(chat.title || 'New Chat')}</div>
          <div class="chat-item-meta">${esc((chat.model || 'Auto model') + ' · ' + formatTime(chat.updatedAt))}</div>
        `;
        button.onclick = () => {
          state.activeChatId = chat.id;
          syncControlsFromChat();
          render();
          scheduleSave();
          closeDrawer();
        };
        list.appendChild(button);
      });
    }

    function renderDraftFiles() {
      const wrap = document.getElementById('draft-files');
      wrap.innerHTML = '';
      state.draftFiles.forEach(file => {
        const pill = document.createElement('div');
        pill.className = 'draft-file';
        pill.innerHTML = `<span>${esc(file.name)}</span>`;
        const remove = document.createElement('button');
        remove.type = 'button';
        remove.textContent = '×';
        remove.onclick = () => {
          state.draftFiles = state.draftFiles.filter(item => item.id !== file.id);
          renderDraftFiles();
        };
        pill.appendChild(remove);
        wrap.appendChild(pill);
      });
    }

    function suggestionGridHtml() {
      return `
        <div class="suggestion-grid">
          ${SUGGESTIONS.map((item, index) => `
            <button class="suggestion-btn" type="button" data-suggestion="${index}">
              <span class="suggestion-title">${esc(item.title)}</span>
              <span class="suggestion-copy">${esc(item.copy)}</span>
            </button>
          `).join('')}
        </div>
      `;
    }

    function renderMessages() {
      const container = document.getElementById('messages');
      const chat = activeChat();
      document.getElementById('active-title').textContent = chat ? chat.title : 'Eco AI';
      container.innerHTML = '';

      if (!chat || !chat.messages.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-card">
              <div class="empty-title">How can I help?</div>
              <div class="empty-copy">Eco AI runs through a local Ollama model on this machine. Use files, skills, and saved chats while keeping inference local.</div>
              ${suggestionGridHtml()}
            </div>
          </div>
        `;

        container.querySelectorAll('[data-suggestion]').forEach(button => {
          button.addEventListener('click', () => {
            const item = SUGGESTIONS[Number(button.getAttribute('data-suggestion'))];
            if (!item) return;
            const prompt = document.getElementById('prompt');
            prompt.value = item.prompt;
            updatePromptHeight();
            prompt.focus();
          });
        });
        return;
      }

      chat.messages.forEach((message, index) => {
        const row = document.createElement('div');
        row.className = 'msg ' + message.role;
        const attachments = Array.isArray(message.attachments) && message.attachments.length
          ? `<div class="attachments">${message.attachments.map(file => `<span class="attachment-pill">${esc(file.name)}</span>`).join('')}</div>`
          : '';
        const actions = message.role === 'assistant'
          ? `<div class="msg-actions"><button class="mini-btn" data-copy="${index}">Copy</button></div>`
          : '';

        row.innerHTML = `
          <div class="msg-head">
            <span>${message.role === 'assistant' ? 'Eco AI' : 'You'}</span>
            <span>${formatTime(message.createdAt)}</span>
          </div>
          <div class="msg-body">
            <div class="avatar">${message.role === 'assistant' ? 'E' : 'Y'}</div>
            <div class="bubble-wrap">
              <div class="bubble">${renderMarkdown(message.content || '')}</div>
              ${attachments}
              ${actions}
            </div>
          </div>
        `;
        container.appendChild(row);
      });

      container.querySelectorAll('[data-copy]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const chat = activeChat();
          const index = Number(btn.getAttribute('data-copy'));
          const message = chat?.messages[index];
          if (!message) return;
          try {
            await navigator.clipboard.writeText(message.content || '');
            btn.textContent = 'Copied';
            setTimeout(() => { btn.textContent = 'Copy'; }, 900);
          } catch {}
        });
      });

      const wrap = document.getElementById('messages-wrap');
      wrap.scrollTop = wrap.scrollHeight;
    }

    function renderModelSelect() {
      const select = document.getElementById('model-select');
      const chat = activeChat();
      const current = chat?.model || state.settings.preferredModel || state.status.recommendedModel || '';
      const models = state.status.models || [];
      const options = [];
      if (state.status.recommendedModel) {
        options.push(`<option value="">Auto · ${esc(state.status.recommendedModel)}</option>`);
      } else {
        options.push('<option value="">Auto</option>');
      }
      models.forEach(model => {
        options.push(`<option value="${esc(model.name)}">${esc(model.name)}</option>`);
      });
      if (!models.length) options.push('<option value="" disabled>No local models</option>');
      select.innerHTML = options.join('');
      select.value = current && models.some(model => model.name === current) ? current : '';
    }

    function renderSkillSelect() {
      const select = document.getElementById('skill-select');
      select.innerHTML = SKILLS.map(skill => `<option value="${skill.id}">${skill.label}</option>`).join('');
      select.value = activeChat()?.skill || state.settings.defaultSkill || 'general';
    }

    function syncControlsFromChat() {
      renderModelSelect();
      renderSkillSelect();
    }

    function render() {
      renderStatus();
      renderSidebar();
      renderMessages();
      renderDraftFiles();
      syncControlsFromChat();
      document.getElementById('stop-btn').disabled = !state.generating;
      updatePromptHeight();
    }

    function updateActiveChat(mutator) {
      const chat = activeChat();
      if (!chat) return null;
      mutator(chat);
      chat.updatedAt = nowIso();
      return chat;
    }

    async function refreshStatus() {
      try {
        const res = await api('/api/eco-ai/status');
        const data = await res.json();
        state.status = data;
        if (!state.settings.preferredModel && data.recommendedModel) {
          state.settings.preferredModel = data.recommendedModel;
        }
        const chat = activeChat();
        if (chat && !chat.model && state.settings.preferredModel) chat.model = state.settings.preferredModel;
        render();
      } catch (error) {
        state.status = {
          available: false,
          models: [],
          recommendedModel: '',
          setupMessage: 'Could not reach the BIG TUNA server for Eco AI status.',
          error: String(error || ''),
        };
        renderStatus();
      }
    }

    function currentPayloadMessages(chat) {
      return chat.messages.map(message => ({
        role: message.role,
        content: message.content,
        attachments: Array.isArray(message.attachments) ? message.attachments.map(file => ({
          name: file.name,
          type: file.type || '',
          text: file.text || '',
        })) : [],
      }));
    }

    async function sendChatRequest(chat) {
      state.generating = true;
      render();

      const assistant = {
        id: uid(),
        role: 'assistant',
        content: '',
        attachments: [],
        createdAt: nowIso(),
      };
      chat.messages.push(assistant);
      renderMessages();

      const controller = new AbortController();
      state.activeAbort = controller;

      try {
        const res = await api('/api/eco-ai/chat', {
          method: 'POST',
          body: JSON.stringify({
            model: chat.model || state.settings.preferredModel || '',
            skill: chat.skill || 'general',
            messages: currentPayloadMessages(chat).slice(0, -1),
          }),
          signal: controller.signal,
        });

        if (!res.ok || !res.body) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || 'Eco AI request failed');
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          let newline = buffer.indexOf('\n');
          while (newline >= 0) {
            const line = buffer.slice(0, newline).trim();
            buffer = buffer.slice(newline + 1);
            newline = buffer.indexOf('\n');
            if (!line) continue;

            let event;
            try { event = JSON.parse(line); } catch { continue; }

            if (event.type === 'meta' && event.model) {
              chat.model = event.model;
              state.settings.preferredModel = event.model;
              renderSidebar();
              renderModelSelect();
            } else if (event.type === 'delta') {
              assistant.content += event.content || '';
              renderMessages();
            } else if (event.type === 'error') {
              throw new Error(event.error || 'Streaming failed');
            }
          }
        }

        if (!assistant.content.trim()) {
          assistant.content = 'No response content was returned by the local model.';
        }
      } catch (error) {
        assistant.content = controller.signal.aborted
          ? (assistant.content || '[Generation stopped]')
          : `Eco AI error: ${error.message || error}`;
      } finally {
        chat.updatedAt = nowIso();
        state.generating = false;
        state.activeAbort = null;
        if (!chat.title || chat.title === 'New Chat') {
          const firstUser = chat.messages.find(message => message.role === 'user');
          if (firstUser) chat.title = summarizeTitle(firstUser.content);
        }
        render();
        scheduleSave();
      }
    }

    async function handleSend() {
      if (state.generating) return;
      const promptEl = document.getElementById('prompt');
      const content = promptEl.value.trim();
      if (!content && !state.draftFiles.length) return;

      const chat = activeChat();
      if (!chat) return;

      chat.model = document.getElementById('model-select').value || chat.model || state.settings.preferredModel || '';
      chat.skill = document.getElementById('skill-select').value || 'general';
      state.settings.defaultSkill = chat.skill;
      if (chat.model) state.settings.preferredModel = chat.model;

      chat.messages.push({
        id: uid(),
        role: 'user',
        content,
        attachments: state.draftFiles.map(file => ({
          name: file.name,
          type: file.type,
          text: file.text,
        })),
        createdAt: nowIso(),
      });
      chat.updatedAt = nowIso();

      if (chat.title === 'New Chat') {
        chat.title = summarizeTitle(content || state.draftFiles[0]?.name || 'New Chat');
      }

      promptEl.value = '';
      state.draftFiles = [];
      render();
      scheduleSave();
      await sendChatRequest(chat);
    }

    async function readFileAsText(file) {
      const text = await file.text();
      return text.slice(0, FILE_CHAR_LIMIT);
    }

    async function handleFiles(fileList) {
      const files = Array.from(fileList || []);
      if (!files.length) return;

      let total = state.draftFiles.reduce((sum, file) => sum + (file.text || '').length, 0);

      for (const file of files) {
        const isTextLike = file.type.startsWith('text/')
          || /\.(txt|md|json|csv|js|ts|tsx|jsx|html|css|xml|yml|yaml|sql|py|java|c|cpp|h|cs|rb|go|rs|sh|ps1)$/i.test(file.name);
        if (!isTextLike) {
          alert(`Skipped ${file.name}: only text and code files are supported right now.`);
          continue;
        }

        const text = await readFileAsText(file);
        total += text.length;
        if (total > FILE_TOTAL_LIMIT) {
          alert('Attachment limit reached. Keep total attached text under roughly 240k characters.');
          break;
        }

        state.draftFiles.push({
          id: uid(),
          name: file.name,
          type: file.type || 'text/plain',
          text,
        });
      }

      renderDraftFiles();
    }

    function createAndSelectChat() {
      const chat = newChat({
        model: state.settings.preferredModel,
        skill: state.settings.defaultSkill,
      });
      state.chats.unshift(chat);
      state.activeChatId = chat.id;
      render();
      scheduleSave();
      const prompt = document.getElementById('prompt');
      prompt.focus();
      closeDrawer();
    }

    function renameActiveChat() {
      const chat = activeChat();
      if (!chat) return;
      const next = prompt('Rename chat', chat.title || '');
      if (!next) return;
      chat.title = next.trim().slice(0, 80) || chat.title;
      chat.updatedAt = nowIso();
      render();
      scheduleSave();
    }

    function deleteActiveChat() {
      const chat = activeChat();
      if (!chat) return;
      if (!confirm(`Delete "${chat.title}"?`)) return;
      state.chats = state.chats.filter(item => item.id !== chat.id);
      ensureActiveChat();
      render();
      scheduleSave();
    }

    async function regenerateLast() {
      if (state.generating) return;
      const chat = activeChat();
      if (!chat) return;
      if (!chat.messages.some(message => message.role === 'user')) return;
      if (chat.messages[chat.messages.length - 1]?.role === 'assistant') chat.messages.pop();
      render();
      scheduleSave();
      await sendChatRequest(chat);
    }

    function stopGeneration() {
      if (state.activeAbort) state.activeAbort.abort();
    }

    Auth.onReady(async () => {
      const [savedSettings, savedData] = await Promise.all([
        Auth.loadSettings(APP_ID).catch(() => null),
        api('/api/data/' + APP_ID).then(res => res.json()).catch(() => null),
      ]);

      if (savedSettings && typeof savedSettings === 'object') {
        state.settings = {
          preferredModel: typeof savedSettings.preferredModel === 'string' ? savedSettings.preferredModel : '',
          defaultSkill: typeof savedSettings.defaultSkill === 'string' ? savedSettings.defaultSkill : 'general',
        };
      }

      if (savedData && Array.isArray(savedData.chats)) {
        state.chats = savedData.chats.map(chat => ({
          ...newChat(),
          ...chat,
          messages: Array.isArray(chat.messages) ? chat.messages.map(message => ({
            id: message.id || uid(),
            role: message.role === 'assistant' ? 'assistant' : 'user',
            content: typeof message.content === 'string' ? message.content : '',
            attachments: Array.isArray(message.attachments) ? message.attachments.map(file => ({
              name: file.name || 'file',
              type: file.type || '',
              text: file.text || '',
            })) : [],
            createdAt: message.createdAt || nowIso(),
          })) : [],
        }));
        state.activeChatId = typeof savedData.activeChatId === 'string' ? savedData.activeChatId : '';
      }

      ensureActiveChat();
      render();
      refreshStatus();

      document.getElementById('new-chat-btn').onclick = createAndSelectChat;
      document.getElementById('rename-chat-btn').onclick = renameActiveChat;
      document.getElementById('delete-chat-btn').onclick = deleteActiveChat;
      document.getElementById('rename-chat-mobile-btn').onclick = renameActiveChat;
      document.getElementById('delete-chat-mobile-btn').onclick = deleteActiveChat;
      document.getElementById('regenerate-btn').onclick = regenerateLast;
      document.getElementById('send-btn').onclick = handleSend;
      document.getElementById('clear-draft-btn').onclick = () => {
        document.getElementById('prompt').value = '';
        state.draftFiles = [];
        renderDraftFiles();
        updatePromptHeight();
      };
      document.getElementById('stop-btn').onclick = stopGeneration;
      document.getElementById('attach-btn').onclick = () => document.getElementById('file-input').click();
      document.getElementById('file-input').addEventListener('change', async event => {
        await handleFiles(event.target.files);
        event.target.value = '';
      });
      document.getElementById('model-select').addEventListener('change', event => {
        updateActiveChat(chat => { chat.model = event.target.value; });
        state.settings.preferredModel = event.target.value;
        renderSidebar();
        scheduleSave();
      });
      document.getElementById('skill-select').addEventListener('change', event => {
        updateActiveChat(chat => { chat.skill = event.target.value; });
        state.settings.defaultSkill = event.target.value;
        scheduleSave();
      });

      const prompt = document.getElementById('prompt');
      prompt.addEventListener('input', updatePromptHeight);
      prompt.addEventListener('keydown', event => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          handleSend();
        }
      });
      updatePromptHeight();

      document.getElementById('open-drawer-btn').onclick = openDrawer;
      document.getElementById('close-drawer-btn').onclick = closeDrawer;
      document.getElementById('drawer-backdrop').onclick = closeDrawer;

      Auth.beforeLogout(saveAll);
    });
  </script>
</body>
</html>
