<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Emma - BIG TUNA</title>
  <link rel="stylesheet" href="/styles/tokens.css">
  <!-- KaTeX: render LaTeX math in assistant answers (loaded once, used by renderMarkdown). -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --content-width: 46rem;
      --sidebar-width: 264px;
    }

    html { height: 100%; }
    body {
      font-family: var(--font-ui);
      /* Size to the *visible* viewport (svh) so the topbar, chat composer and the
         model selectors below it always fit on one screen — on mobile, 100vh is
         the larger layout viewport and pushed the composer behind the browser UI. */
      height: 100vh;
      height: 100svh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #app-shell {
      flex: 1;
      min-height: 0;
      display: flex;
      overflow: hidden;
      background:
        radial-gradient(1100px 520px at 78% -8%, color-mix(in srgb, var(--accent) 9%, transparent), transparent 60%),
        var(--bg);
    }

    #drawer-backdrop {
      position: fixed;
      inset: 0;
      background: color-mix(in srgb, #000 56%, transparent);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--dur) var(--ease);
      z-index: 310;
      backdrop-filter: blur(2px);
    }

    body.drawer-open #drawer-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    /* ---------- Sidebar ---------- */
    #sidebar {
      width: var(--sidebar-width);
      flex: 0 0 var(--sidebar-width);
      background: color-mix(in srgb, var(--bg-raised) 86%, transparent);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
      z-index: 320;
    }

    .sidebar-inner {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 14px 12px;
      gap: 14px;
    }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2px 4px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 9px;
      height: 9px;
      border-radius: var(--radius-full);
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft), 0 0 14px var(--accent);
      animation: pulse 2.6s var(--ease) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(0.82); }
    }

    .brand-text {
      font-size: 0.86rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
    }

    .brand-text span { color: var(--accent); }

    .new-chat-btn {
      width: 100%;
      min-height: 44px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--surface-2);
      color: var(--text);
      font-weight: 600;
      font-size: 0.9rem;
      border: 1px solid var(--border-strong);
      transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease);
    }

    .new-chat-btn:hover {
      background: var(--surface-3);
      border-color: color-mix(in srgb, var(--accent) 40%, var(--border-strong));
    }

    .new-chat-btn:focus-visible { outline: none; box-shadow: var(--ring); }

    #chat-list {
      flex: 1;
      min-height: 0;
      overflow: auto;
      display: grid;
      gap: 2px;
      align-content: start;
      padding-right: 2px;
    }

    .chat-item {
      width: 100%;
      text-align: left;
      border: 0;
      background: transparent;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      padding: 9px 11px;
      display: grid;
      gap: 3px;
      position: relative;
      transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
    }

    .chat-item:hover { background: var(--surface-2); color: var(--text); }

    .chat-item.active {
      background: var(--accent-soft);
      color: var(--text);
    }

    .chat-item.active::before {
      content: "";
      position: absolute;
      left: 0;
      top: 18%;
      bottom: 18%;
      width: 3px;
      border-radius: var(--radius-full);
      background: var(--accent);
    }

    .chat-item:focus-visible { outline: none; box-shadow: var(--ring); }

    .chat-item-title {
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-meta {
      font-size: 0.72rem;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-foot {
      padding: 2px 4px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    #status-badge {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 0.76rem;
      color: var(--text-dim);
      max-width: 100%;
    }

    #status-badge.online { color: var(--text-muted); }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: var(--radius-full);
      background: var(--text-faint);
      flex-shrink: 0;
      transition: background var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    }

    #status-badge.online .status-dot {
      background: var(--success);
      box-shadow: 0 0 10px color-mix(in srgb, var(--success) 70%, transparent);
    }

    #status-strip {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ---------- Main ---------- */
    #main-shell {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    #main-header {
      height: 54px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      padding: 0 14px;
      background: color-mix(in srgb, var(--bg) 70%, transparent);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .header-title {
      flex: 1;
      min-width: 0;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid transparent;
      flex-shrink: 0;
      transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
    }

    .icon-btn:hover { background: var(--surface-2); color: var(--text); }
    .icon-btn:focus-visible { outline: none; box-shadow: var(--ring); }

    .header-menu-wrap { position: relative; flex-shrink: 0; }

    .menu-pop {
      position: absolute;
      top: 44px;
      right: 0;
      min-width: 168px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      box-shadow: var(--shadow-3);
      padding: 6px;
      display: grid;
      gap: 2px;
      z-index: 400;
    }

    .menu-pop[hidden] { display: none; }

    .menu-item {
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      padding: 9px 11px;
      border-radius: var(--radius-sm);
      font-size: 0.86rem;
      transition: background var(--dur-fast) var(--ease);
    }

    .menu-item:hover { background: var(--surface-2); }
    .menu-item.danger { color: var(--accent); }
    .menu-item.danger:hover { background: var(--accent-soft); }
    .menu-item:focus-visible { outline: none; box-shadow: var(--ring); }

    /* ---------- Messages ---------- */
    #messages-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
      scroll-behavior: smooth;
    }

    #messages {
      width: 100%;
      max-width: var(--content-width);
      margin: 0 auto;
      padding: 22px 20px 30px;
      display: grid;
      gap: 28px;
      align-content: start;
    }

    .empty-state {
      min-height: calc(100dvh - 230px);
      display: grid;
      place-items: center;
      text-align: center;
    }

    .empty-card {
      width: 100%;
      max-width: 40rem;
      display: grid;
      gap: 22px;
      justify-items: center;
    }

    .empty-mark {
      width: 54px;
      height: 54px;
      border-radius: var(--radius-lg);
      background: linear-gradient(150deg, var(--accent), var(--accent-press));
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 50%, transparent), 0 12px 40px color-mix(in srgb, var(--accent) 35%, transparent);
      position: relative;
    }

    .empty-mark::after {
      content: "";
      position: absolute;
      inset: 0;
      margin: auto;
      width: 16px;
      height: 16px;
      border-radius: var(--radius-full);
      background: var(--on-accent);
      box-shadow: 0 0 16px color-mix(in srgb, #fff 60%, transparent);
    }

    .empty-title {
      font-size: clamp(1.7rem, 4vw, 2.2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(180deg, var(--text), var(--text-muted));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .suggestion-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      justify-content: center;
      margin-top: 2px;
    }

    .suggestion-btn {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-muted);
      border-radius: var(--radius-full);
      text-align: left;
      padding: 9px 15px;
      font-size: 0.85rem;
      font-weight: 500;
      transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease);
    }

    .suggestion-btn:hover {
      background: var(--surface-3);
      color: var(--text);
      border-color: color-mix(in srgb, var(--accent) 45%, var(--border-strong));
    }

    .suggestion-btn:focus-visible { outline: none; box-shadow: var(--ring); }

    .msg {
      width: 100%;
      display: grid;
      gap: 9px;
    }

    .msg-head {
      color: var(--text-dim);
      font-size: 0.74rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .msg.user .msg-head { justify-content: flex-end; }

    .msg-author {
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.68rem;
      color: var(--text-muted);
    }

    .msg.assistant .msg-author { color: var(--accent); }

    .bubble-wrap {
      min-width: 0;
      display: grid;
      gap: 9px;
    }

    .msg.user .bubble-wrap { justify-items: end; }

    .bubble {
      max-width: 100%;
      font-size: 0.97rem;
      line-height: 1.7;
      color: var(--text);
      word-break: break-word;
    }

    .msg.user .bubble {
      width: fit-content;
      max-width: min(100%, 36rem);
      padding: 12px 16px;
      border-radius: var(--radius-lg) var(--radius-lg) var(--radius-sm) var(--radius-lg);
      background: var(--surface-2);
      border: 1px solid var(--border);
    }

    .attachments {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .attachment-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 11px;
      border-radius: var(--radius-full);
      background: var(--surface-3);
      color: var(--text-muted);
      font-size: 0.77rem;
      border: 1px solid var(--border);
    }

    .msg-actions {
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity var(--dur) var(--ease);
    }

    .msg:hover .msg-actions,
    .msg:focus-within .msg-actions { opacity: 1; }

    .mini-btn {
      min-height: 28px;
      padding: 0 10px;
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--border);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
    }

    .mini-btn:hover { background: var(--surface-2); color: var(--text); }
    .mini-btn:focus-visible { outline: none; box-shadow: var(--ring); }

    .thinking {
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 9px;
    }

    .thinking::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: var(--radius-full);
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 1s var(--ease) infinite;
    }

    .thinking::after {
      content: "Thinking";
    }

    pre, code { font-family: var(--font-mono); }

    pre {
      margin: 12px 0 0;
      padding: 14px 16px;
      border-radius: var(--radius);
      overflow: auto;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      font-size: 0.86rem;
    }

    code.inline {
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      background: var(--surface-3);
      font-size: 0.9em;
    }

    /* ---------- Composer ---------- */
    #composer-shell {
      flex: 0 0 auto;
      padding: 0 18px calc(16px + env(safe-area-inset-bottom, 0px));
      background: linear-gradient(180deg, transparent, var(--bg) 22%);
    }

    #composer-width {
      width: 100%;
      max-width: calc(var(--content-width) + 40px);
      margin: 0 auto;
    }

    #draft-files {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 9px;
      padding: 0 4px;
    }

    .draft-file {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border-radius: var(--radius-full);
      background: var(--surface-2);
      border: 1px solid var(--border-strong);
      font-size: 0.79rem;
      color: var(--text);
    }

    .draft-file button {
      border: 0;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.95rem;
      line-height: 1;
      padding: 0;
    }

    .draft-file button:hover { color: var(--accent); }

    #composer-card {
      border: 1px solid var(--border-strong);
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-2);
      padding: 8px 8px 8px 12px;
      transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    }

    #composer-card:focus-within {
      border-color: color-mix(in srgb, var(--accent) 55%, var(--border-strong));
      box-shadow: var(--shadow-2), 0 0 0 3px var(--accent-soft);
    }

    #composer-input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    #attach-btn {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    #prompt {
      flex: 1;
      min-height: 24px;
      max-height: 220px;
      resize: none;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      padding: 7px 2px 8px;
      font-size: 1rem;
      line-height: 1.5;
    }

    #prompt::placeholder { color: var(--text-dim); }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-full);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 0;
      background: var(--accent);
      color: var(--on-accent);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 60%, transparent), 0 6px 18px color-mix(in srgb, var(--accent) 35%, transparent);
      transition: background var(--dur) var(--ease), box-shadow var(--dur) var(--ease), transform var(--dur-fast) var(--ease);
    }

    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:active { transform: scale(0.94); }
    .send-btn:focus-visible { outline: none; box-shadow: var(--ring); }

    body.generating .send-btn {
      background: var(--surface-3);
      color: var(--text);
      box-shadow: 0 0 0 1px var(--border-strong);
    }

    #composer-controls {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 8px;
      padding: 0 2px;
    }

    .select-wrap {
      position: relative;
      min-width: 0;
    }

    .select-wrap select {
      appearance: none;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: var(--radius-full);
      min-height: 30px;
      padding: 0 28px 0 12px;
      font-size: 0.78rem;
      font-weight: 500;
      max-width: 150px;
      transition: color var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease);
    }

    .select-wrap select:hover {
      color: var(--text);
      border-color: var(--border-strong);
    }

    .select-wrap select:focus-visible { outline: none; box-shadow: var(--ring); }

    .select-wrap::after {
      content: "▾";
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 0.7rem;
      pointer-events: none;
    }

    #composer-hint {
      margin: 8px 4px 0;
      text-align: center;
      color: var(--text-faint);
      font-size: 0.72rem;
    }

    /* Capability blurb for the currently selected model, under the controls row. */
    #model-capability {
      margin: 7px 4px 0;
      display: flex;
      align-items: baseline;
      gap: 7px;
      flex-wrap: wrap;
      color: var(--text-dim);
      font-size: 0.74rem;
      line-height: 1.4;
    }

    #model-capability .cap-name {
      color: var(--text-muted);
      font-weight: 600;
    }

    #model-capability .cap-tag {
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 0.68rem;
      border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--border));
      border-radius: var(--radius-full);
      padding: 1px 8px;
    }

    #model-capability:empty { display: none; }

    /* Math: keep wide display equations inside the bubble (scroll instead of clipping). */
    .bubble .katex-display {
      margin: 12px 0;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 2px;
    }

    .bubble .katex { font-size: 1.02em; }

    .mobile-only { display: none; }

    /* ---------- Toast (transient, non-persisted notices) ---------- */
    #eco-toast {
      position: fixed;
      left: 50%;
      bottom: 104px;
      transform: translate(-50%, 12px);
      z-index: 500;
      max-width: min(92vw, 540px);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px 11px 15px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      box-shadow: var(--shadow-3);
      color: var(--text);
      font-size: 0.85rem;
      line-height: 1.45;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
    }

    #eco-toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
      pointer-events: auto;
    }

    #eco-toast .toast-msg { flex: 1; min-width: 0; }

    #eco-toast .toast-action {
      border: 0;
      background: var(--accent);
      color: var(--on-accent);
      border-radius: var(--radius-full);
      padding: 6px 13px;
      font-size: 0.8rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    #eco-toast .toast-action:hover { background: var(--accent-hover); }

    #eco-toast .toast-close {
      border: 0;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1;
      padding: 2px 4px;
      flex-shrink: 0;
    }

    #eco-toast .toast-close:hover { color: var(--text); }

    /* ---------- Responsive ---------- */
    @media (max-width: 760px) {
      .mobile-only { display: inline-flex; }

      #sidebar {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        width: min(86vw, 320px);
        transform: translateX(-100%);
        transition: transform var(--dur-slow) var(--ease);
        box-shadow: var(--shadow-3);
        background: var(--bg-raised);
      }

      body.drawer-open #sidebar { transform: translateX(0); }

      #messages { padding: 16px 14px 24px; }

      .empty-state { min-height: calc(100dvh - 240px); }

      #composer-shell { padding: 0 10px calc(10px + env(safe-area-inset-bottom, 0px)); }

      #composer-hint { display: none; }
    }
  </style>
</head>
<body>
  <script src="/topbar.js"></script>
  <script src="/auth.js"></script>

  <div id="drawer-backdrop"></div>
  <div id="eco-toast" role="status" aria-live="polite"></div>

  <div id="app-shell">
    <aside id="sidebar" aria-label="Chats">
      <div class="sidebar-inner">
        <div class="sidebar-head">
          <div class="brand">
            <span class="brand-mark"></span>
            <span class="brand-text">Emm<span>a</span></span>
          </div>
          <button id="close-drawer-btn" class="icon-btn mobile-only" type="button" aria-label="Close chats">✕</button>
        </div>

        <button id="new-chat-btn" class="new-chat-btn" type="button">＋ New chat</button>

        <div id="chat-list"></div>

        <div class="sidebar-foot">
          <div id="status-badge"><span class="status-dot"></span><span id="status-strip">Checking local model…</span></div>
        </div>
      </div>
    </aside>

    <main id="main-shell">
      <header id="main-header">
        <button id="open-drawer-btn" class="icon-btn mobile-only" type="button" aria-label="Open chats">☰</button>
        <div id="active-title" class="header-title">Emma</div>
        <div class="header-menu-wrap">
          <button id="menu-btn" class="icon-btn" type="button" aria-label="Chat options" aria-haspopup="true">⋯</button>
          <div id="chat-menu" class="menu-pop" role="menu" hidden>
            <button id="rename-chat-btn" class="menu-item" type="button" role="menuitem">Rename chat</button>
            <button id="delete-chat-btn" class="menu-item danger" type="button" role="menuitem">Delete chat</button>
          </div>
        </div>
      </header>

      <section id="messages-wrap">
        <div id="messages"></div>
      </section>

      <footer id="composer-shell">
        <div id="composer-width">
          <div id="draft-files"></div>

          <div id="composer-card">
            <div id="composer-input-row">
              <button id="attach-btn" class="icon-btn" type="button" aria-label="Attach file">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              </button>
              <textarea id="prompt" rows="1" placeholder="Message Emma"></textarea>
              <button id="send-btn" class="send-btn" type="button" aria-label="Send"></button>
            </div>

            <div id="composer-controls">
              <div class="select-wrap">
                <select id="skill-select" aria-label="Mode"></select>
              </div>
              <div class="select-wrap">
                <select id="model-select" aria-label="Model"></select>
              </div>
              <input id="file-input" type="file" multiple hidden>
            </div>

            <div id="model-capability" aria-live="polite"></div>
          </div>

          <div id="composer-hint">Emma runs locally on this machine · text &amp; code files supported</div>
        </div>
      </footer>
    </main>
  </div>

  <script>
    Topbar.setTitle('Emma');

    const APP_ID = 'eco-ai';
    const SKILLS = [
      { id: 'general', label: 'General' },
      { id: 'coding', label: 'Code' },
      { id: 'writing', label: 'Write' },
      { id: 'study', label: 'Study' },
      { id: 'summarize', label: 'Summary' },
      { id: 'file-analyst', label: 'Files' },
    ];
    const FILE_CHAR_LIMIT = 80000;
    const FILE_TOTAL_LIMIT = 240000;
    const SUGGESTIONS = [
      { title: 'Review a code file', prompt: 'Review the attached file and point out the biggest correctness or maintainability issues.' },
      { title: 'Summarize notes', prompt: 'Summarize the attached material and give me the most important takeaways.' },
      { title: 'Explain step by step', prompt: 'Teach me this topic step by step and include a simple example.' },
      { title: 'Rewrite this clearly', prompt: 'Rewrite this so it sounds clearer and more concise without losing the original intent.' },
    ];

    const SEND_ICON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>';
    const STOP_ICON = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2.5"/></svg>';

    const state = {
      chats: [],
      activeChatId: '',
      draftFiles: [],
      status: { available: false, models: [], recommendedModel: '', setupMessage: '', error: '' },
      settings: { preferredModel: '', defaultSkill: 'general' },
      saveTimer: null,
      generating: false,
      activeAbort: null,
    };

    function uid() {
      return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    }

    const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

    let toastTimer = null;
    function showToast(message, actionLabel, actionFn) {
      const el = document.getElementById('eco-toast');
      if (!el) return;
      el.innerHTML = '';
      const msg = document.createElement('span');
      msg.className = 'toast-msg';
      msg.textContent = message;
      el.appendChild(msg);
      if (actionLabel && typeof actionFn === 'function') {
        const action = document.createElement('button');
        action.type = 'button';
        action.className = 'toast-action';
        action.textContent = actionLabel;
        action.onclick = () => { hideToast(); actionFn(); };
        el.appendChild(action);
      }
      const close = document.createElement('button');
      close.type = 'button';
      close.className = 'toast-close';
      close.setAttribute('aria-label', 'Dismiss');
      close.textContent = '✕';
      close.onclick = hideToast;
      el.appendChild(close);
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(hideToast, 10000);
    }
    function hideToast() {
      const el = document.getElementById('eco-toast');
      if (el) el.classList.remove('show');
    }

    // A real saved answer is never discarded. Past failures used to persist an
    // assistant turn whose body was an error string or was empty; strip those so
    // reopening an old chat never shows "Eco AI error: load failed" again.
    function pruneBrokenMessages(messages) {
      return messages.filter(message => {
        if (message.role !== 'assistant') return true;
        const content = String(message.content || '').trim();
        if (!content) return false;
        if (/^Eco AI error:/i.test(content)) return false;
        if (content === '[Generation stopped]') return false;
        if (/^The local model returned no text\b/i.test(content)) return false;
        return true;
      });
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function activeChat() {
      return state.chats.find(chat => chat.id === state.activeChatId) || null;
    }

    function newChat(seed = {}) {
      return {
        id: uid(),
        title: seed.title || 'New Chat',
        createdAt: nowIso(),
        updatedAt: nowIso(),
        model: seed.model || state.settings.preferredModel || '',
        skill: seed.skill || state.settings.defaultSkill || 'general',
        messages: Array.isArray(seed.messages) ? seed.messages : [],
      };
    }

    function ensureActiveChat() {
      if (!state.chats.length) {
        const chat = newChat();
        state.chats = [chat];
        state.activeChatId = chat.id;
      }
      if (!activeChat()) state.activeChatId = state.chats[0].id;
    }

    function scheduleSave() {
      clearTimeout(state.saveTimer);
      state.saveTimer = setTimeout(saveAll, 300);
    }

    async function api(path, options = {}) {
      const headers = { ...(options.headers || {}), Authorization: 'Bearer ' + Auth.token };
      if (options.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
      return fetch(path, { ...options, headers });
    }

    async function persistChats() {
      const payload = JSON.stringify({
        chats: state.chats,
        activeChatId: state.activeChatId,
      });
      for (let attempt = 0; attempt < 3; attempt++) {
        try {
          const res = await api('/api/data/' + APP_ID, { method: 'POST', body: payload });
          if (res.ok) return true;
        } catch {}
        await sleep(500 * (attempt + 1));
      }
      return false;
    }

    async function saveAll() {
      clearTimeout(state.saveTimer);
      state.saveTimer = null;
      await Promise.all([
        Auth.saveSettings(APP_ID, state.settings).catch(() => {}),
        persistChats(),
      ]).catch(() => {});
    }

    function summarizeTitle(text) {
      const flat = String(text || '').replace(/\s+/g, ' ').trim();
      if (!flat) return 'New Chat';
      return flat.slice(0, 48);
    }

    function formatTime(iso) {
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return '';
      return date.toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    }

    function shortModelLabel(name) {
      const raw = String(name || '').trim();
      if (!raw) return 'Auto';
      const base = raw.split(':')[0].replace(/[-_]+/g, ' ');
      const lower = base.toLowerCase();
      if (lower.includes('qwen')) return 'Qwen';
      if (lower.includes('llama')) return 'Llama';
      if (lower.includes('gemma')) return 'Gemma';
      if (lower.includes('phi')) return 'Phi';
      if (lower.includes('mistral')) return 'Mistral';
      if (lower.includes('deepseek')) return 'DeepSeek';
      return base.split(/\s+/).filter(Boolean).slice(0, 2).join(' ') || 'Model';
    }

    function esc(text) {
      return String(text).replace(/[&<>"]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c]));
    }

    // Render one LaTeX fragment to safe HTML. KaTeX escapes its own output, so the
    // result can be dropped into innerHTML directly. If KaTeX hasn't loaded (or the
    // expression is malformed) we fall back to the literal source so nothing is lost.
    function renderTex(tex, displayMode) {
      const src = String(tex || '').trim();
      if (window.katex) {
        try {
          return window.katex.renderToString(src, {
            displayMode,
            throwOnError: false,
            strict: false,
            output: 'html',
          });
        } catch {}
      }
      const wrap = displayMode ? '$$' : '$';
      return `<code class="inline">${esc(wrap + src + wrap)}</code>`;
    }

    function renderMarkdown(text) {
      // Code and math are extracted to placeholders BEFORE HTML-escaping so their
      // contents (which legitimately contain <, >, &, \, {, }) survive intact, then
      // restored afterwards as already-safe HTML.
      const stash = [];
      const keep = html => `@@TUNA${stash.push(html) - 1}@@`;
      let src = String(text || '');

      // Fenced code blocks first, so $ / backticks inside code are never touched.
      src = src.replace(/```([\s\S]*?)```/g, (_, code) =>
        keep(`<pre><code>${esc(code.replace(/^\n/, '').replace(/\s+$/, ''))}</code></pre>`));

      // Display math: $$ … $$ and \[ … \]
      src = src.replace(/\$\$([\s\S]+?)\$\$/g, (_, tex) => keep(renderTex(tex, true)));
      src = src.replace(/\\\[([\s\S]+?)\\\]/g, (_, tex) => keep(renderTex(tex, true)));

      // Inline math: \( … \) and $ … $ — the $ form skips prices/whitespace edges
      // (no space just inside the delimiters, and bare numbers like $5$ are left alone).
      src = src.replace(/\\\(([\s\S]+?)\\\)/g, (_, tex) => keep(renderTex(tex, false)));
      src = src.replace(/\$(?=\S)([^\n$]*?\S)\$/g, (m, tex) =>
        /^\d+(\.\d+)?$/.test(tex.trim()) ? m : keep(renderTex(tex, false)));

      // Inline code spans.
      src = src.replace(/`([^`\n]+)`/g, (_, code) => keep(`<code class="inline">${esc(code)}</code>`));

      // Whatever remains is plain prose → escape, then apply light markdown.
      let html = esc(src)
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');

      // Restore the protected (already-safe) HTML fragments.
      return html.replace(/@@TUNA(\d+)@@/g, (_, i) => stash[Number(i)] || '');
    }

    function updatePromptHeight() {
      const prompt = document.getElementById('prompt');
      prompt.style.height = 'auto';
      prompt.style.height = Math.min(prompt.scrollHeight, 220) + 'px';
    }

    function openDrawer() {
      document.body.classList.add('drawer-open');
    }

    function closeDrawer() {
      document.body.classList.remove('drawer-open');
    }

    function toggleMenu(force) {
      const menu = document.getElementById('chat-menu');
      const next = typeof force === 'boolean' ? !force : menu.hidden;
      menu.hidden = next;
    }

    function updateSendButton() {
      const btn = document.getElementById('send-btn');
      btn.innerHTML = state.generating ? STOP_ICON : SEND_ICON;
      btn.setAttribute('aria-label', state.generating ? 'Stop' : 'Send');
    }

    function renderStatus() {
      const badge = document.getElementById('status-badge');
      const strip = document.getElementById('status-strip');
      const status = state.status;
      badge.classList.toggle('online', !!status.available);
      strip.textContent = status.available
        ? `Ready · ${status.models.length || 0} model${status.models.length === 1 ? '' : 's'}`
        : (status.setupMessage || status.error || 'Offline');
    }

    function renderSidebar() {
      ensureActiveChat();
      const list = document.getElementById('chat-list');
      list.innerHTML = '';
      [...state.chats].sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || '')).forEach(chat => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'chat-item' + (chat.id === state.activeChatId ? ' active' : '');
        button.innerHTML = `
          <div class="chat-item-title">${esc(chat.title || 'New Chat')}</div>
          <div class="chat-item-meta">${esc(formatTime(chat.updatedAt))}</div>
        `;
        button.onclick = () => {
          state.activeChatId = chat.id;
          syncControlsFromChat();
          render();
          scheduleSave();
          closeDrawer();
        };
        list.appendChild(button);
      });
    }

    function renderDraftFiles() {
      const wrap = document.getElementById('draft-files');
      wrap.innerHTML = '';
      state.draftFiles.forEach(file => {
        const pill = document.createElement('div');
        pill.className = 'draft-file';
        pill.innerHTML = `<span>${esc(file.name)}</span>`;
        const remove = document.createElement('button');
        remove.type = 'button';
        remove.textContent = '×';
        remove.setAttribute('aria-label', 'Remove ' + file.name);
        remove.onclick = () => {
          state.draftFiles = state.draftFiles.filter(item => item.id !== file.id);
          renderDraftFiles();
        };
        pill.appendChild(remove);
        wrap.appendChild(pill);
      });
    }

    function suggestionGridHtml() {
      return `
        <div class="suggestion-grid">
          ${SUGGESTIONS.map((item, index) => `
            <button class="suggestion-btn" type="button" data-suggestion="${index}">${esc(item.title)}</button>
          `).join('')}
        </div>
      `;
    }

    function renderMessages() {
      const container = document.getElementById('messages');
      const chat = activeChat();
      document.getElementById('active-title').textContent = chat ? chat.title : 'Emma';
      container.innerHTML = '';

      if (!chat || !chat.messages.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-card">
              <div class="empty-mark"></div>
              <div class="empty-title">How can I help?</div>
              ${suggestionGridHtml()}
            </div>
          </div>
        `;

        container.querySelectorAll('[data-suggestion]').forEach(button => {
          button.addEventListener('click', () => {
            const item = SUGGESTIONS[Number(button.getAttribute('data-suggestion'))];
            if (!item) return;
            const prompt = document.getElementById('prompt');
            prompt.value = item.prompt;
            updatePromptHeight();
            prompt.focus();
          });
        });
        return;
      }

      chat.messages.forEach((message, index) => {
        const row = document.createElement('div');
        row.className = 'msg ' + message.role;
        const isLast = index === chat.messages.length - 1;
        const isPendingAssistant = message.role === 'assistant'
          && !String(message.content || '').trim()
          && state.generating
          && isLast;
        const attachments = Array.isArray(message.attachments) && message.attachments.length
          ? `<div class="attachments">${message.attachments.map(file => `<span class="attachment-pill">${esc(file.name)}</span>`).join('')}</div>`
          : '';
        const hasContent = message.role === 'assistant' && String(message.content || '').trim();
        const canRegen = hasContent && isLast && !state.generating;
        const actions = hasContent
          ? `<div class="msg-actions"><button class="mini-btn" data-copy="${index}">Copy</button>${canRegen ? '<button class="mini-btn" data-regen="1">Redo</button>' : ''}</div>`
          : '';
        const bodyHtml = isPendingAssistant
          ? '<span class="thinking"></span>'
          : renderMarkdown(message.content || '');

        row.innerHTML = `
          <div class="msg-head">
            <span class="msg-author">${message.role === 'assistant' ? 'Emma' : 'You'}</span>
            <span>${formatTime(message.createdAt)}</span>
          </div>
          <div class="bubble-wrap">
            <div class="bubble">${bodyHtml}</div>
            ${attachments}
            ${actions}
          </div>
        `;
        container.appendChild(row);
      });

      container.querySelectorAll('[data-copy]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const chat = activeChat();
          const index = Number(btn.getAttribute('data-copy'));
          const message = chat?.messages[index];
          if (!message) return;
          try {
            await navigator.clipboard.writeText(message.content || '');
            btn.textContent = 'Copied';
            setTimeout(() => { btn.textContent = 'Copy'; }, 900);
          } catch {}
        });
      });

      container.querySelectorAll('[data-regen]').forEach(btn => {
        btn.addEventListener('click', regenerateLast);
      });

      const wrap = document.getElementById('messages-wrap');
      wrap.scrollTop = wrap.scrollHeight;
    }

    // Capability profiles keyed by model family — used to explain what each local
    // model is good at in the selector dropdown and the caption beneath it.
    const MODEL_PROFILES = [
      { match: /qwen.*coder|coder.*qwen/, name: 'Qwen Coder',    blurb: 'Tuned for writing, explaining and debugging code.' },
      { match: /qwen/,                    name: 'Qwen',          blurb: 'Strong all-round reasoning, math and multilingual chat.' },
      { match: /deepseek.*coder/,         name: 'DeepSeek Coder', blurb: 'Code-focused generation, refactoring and review.' },
      { match: /deepseek.*r1|(^|[^a-z])r1/, name: 'DeepSeek R1', blurb: 'Shows step-by-step reasoning — great for math and logic.' },
      { match: /deepseek/,                name: 'DeepSeek',      blurb: 'Capable general reasoning and coding model.' },
      { match: /codellama|starcoder|codegemma/, name: 'Code model', blurb: 'Specialised for programming tasks.' },
      { match: /llama/,                   name: 'Llama',         blurb: 'Well-rounded general assistant with broad knowledge.' },
      { match: /gemma/,                   name: 'Gemma',         blurb: 'Light, fast and concise general-purpose chat.' },
      { match: /phi/,                     name: 'Phi',           blurb: 'Small and quick — solid everyday Q&A on modest hardware.' },
      { match: /mixtral/,                 name: 'Mixtral',       blurb: 'Mixture-of-experts model with strong general quality.' },
      { match: /mistral/,                 name: 'Mistral',       blurb: 'Balanced speed and quality for general tasks.' },
    ];

    // Build a friendly label + capability summary for one model object from /status.
    function describeModel(model) {
      const name = (model && model.name) || '';
      const profile = MODEL_PROFILES.find(p => p.match.test(name.toLowerCase()));
      const base = profile ? profile.name : shortModelLabel(name);
      const size = (model && model.parameterSize) ? String(model.parameterSize).toUpperCase() : '';
      const params = parseFloat(size);
      let speed = '';
      if (Number.isFinite(params)) {
        if (params <= 4) speed = 'very fast, lightweight';
        else if (params <= 9) speed = 'fast, balanced quality';
        else if (params <= 16) speed = 'slower, higher quality';
        else speed = 'heaviest, top quality';
      }
      const blurb = profile ? profile.blurb : 'Local language model.';
      return {
        base,
        size,
        blurb,
        speed,
        label: size ? `${base} · ${size}` : base,
        title: [blurb, speed && (size ? `${size} — ${speed}` : speed)].filter(Boolean).join(' · '),
      };
    }

    function renderModelSelect() {
      const select = document.getElementById('model-select');
      const chat = activeChat();
      const current = chat?.model || state.settings.preferredModel || '';
      const models = state.status.models || [];
      const options = [];
      if (state.status.recommendedModel) {
        const rec = models.find(m => m.name === state.status.recommendedModel) || { name: state.status.recommendedModel };
        const d = describeModel(rec);
        options.push(`<option value="" title="${esc('Auto-picks the recommended local model · ' + d.title)}">Auto · ${esc(d.label)}</option>`);
      } else {
        options.push('<option value="" title="Auto-picks the best available local model.">Auto</option>');
      }
      models.forEach(model => {
        const d = describeModel(model);
        options.push(`<option value="${esc(model.name)}" title="${esc(d.title)}">${esc(d.label)}</option>`);
      });
      if (!models.length) options.push('<option value="" disabled>No local models</option>');
      select.innerHTML = options.join('');
      select.value = current && models.some(model => model.name === current) ? current : '';
      updateModelCapability();
    }

    // Caption under the controls describing the model that will actually answer.
    function updateModelCapability() {
      const el = document.getElementById('model-capability');
      if (!el) return;
      const models = state.status.models || [];
      if (!state.status.available || !models.length) { el.innerHTML = ''; return; }
      const select = document.getElementById('model-select');
      const selectedName = select && select.value;
      const model = selectedName
        ? models.find(m => m.name === selectedName)
        : (models.find(m => m.name === state.status.recommendedModel) || models[0]);
      if (!model) { el.innerHTML = ''; return; }
      const d = describeModel(model);
      const tags = [];
      if (d.size) tags.push(`<span class="cap-tag">${esc(d.size)}</span>`);
      if (model.quantizationLevel) tags.push(`<span class="cap-tag">${esc(model.quantizationLevel)}</span>`);
      el.innerHTML =
        `<span class="cap-name">${esc(d.base)}</span>` +
        tags.join('') +
        `<span>${esc(d.blurb)}${d.speed ? ' · ' + esc(d.speed) : ''}</span>`;
    }

    function renderSkillSelect() {
      const select = document.getElementById('skill-select');
      select.innerHTML = SKILLS.map(skill => `<option value="${skill.id}">${skill.label}</option>`).join('');
      select.value = activeChat()?.skill || state.settings.defaultSkill || 'general';
    }

    function syncControlsFromChat() {
      renderModelSelect();
      renderSkillSelect();
    }

    function render() {
      renderStatus();
      renderSidebar();
      renderMessages();
      renderDraftFiles();
      syncControlsFromChat();
      document.body.classList.toggle('generating', state.generating);
      updateSendButton();
      updatePromptHeight();
    }

    function updateActiveChat(mutator) {
      const chat = activeChat();
      if (!chat) return null;
      mutator(chat);
      chat.updatedAt = nowIso();
      return chat;
    }

    async function refreshStatus() {
      try {
        const res = await api('/api/eco-ai/status');
        const data = await res.json();
        state.status = data;
        render();
      } catch (error) {
        state.status = {
          available: false,
          models: [],
          recommendedModel: '',
          setupMessage: 'Could not reach the BIG TUNA server for Emma status.',
          error: String(error || ''),
        };
        renderStatus();
      }
    }

    function currentPayloadMessages(chat) {
      return chat.messages.map(message => ({
        role: message.role,
        content: message.content,
        attachments: Array.isArray(message.attachments) ? message.attachments.map(file => ({
          name: file.name,
          type: file.type || '',
          text: file.text || '',
        })) : [],
      }));
    }

    // One streaming attempt. Appends tokens onto `assistant.content` and resolves
    // with { empty }. Throws on transport/stream error so the caller can retry.
    async function streamOnce(chat, assistant, controller) {
      const res = await api('/api/eco-ai/chat', {
        method: 'POST',
        body: JSON.stringify({
          model: chat.model || '',
          skill: chat.skill || 'general',
          messages: currentPayloadMessages(chat).slice(0, -1),
        }),
        signal: controller.signal,
      });

      if (!res.ok || !res.body) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || `Emma request failed (HTTP ${res.status})`);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let emptyCompletion = false;

      try {
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          let newline = buffer.indexOf('\n');
          while (newline >= 0) {
            const line = buffer.slice(0, newline).trim();
            buffer = buffer.slice(newline + 1);
            newline = buffer.indexOf('\n');
            if (!line) continue;

            let event;
            try { event = JSON.parse(line); } catch { continue; }

            if (event.type === 'meta' && event.model) {
              renderSidebar();
              renderModelSelect();
            } else if (event.type === 'delta') {
              assistant.content += event.content || '';
              renderMessages();
            } else if (event.type === 'error') {
              throw new Error(event.error || 'Streaming failed');
            } else if (event.type === 'done') {
              emptyCompletion = !!event.empty;
            }
            // Unknown event types (e.g. keepalive "ping") are intentionally ignored.
          }
        }
      } finally {
        try { reader.releaseLock(); } catch {}
      }

      return { empty: emptyCompletion };
    }

    // Returns true when a real assistant answer was produced and kept. Failures
    // are non-destructive: the empty placeholder is removed instead of being
    // saved as an error, so existing answers in the chat are never replaced.
    async function sendChatRequest(chat) {
      state.generating = true;
      render();

      const assistant = {
        id: uid(),
        role: 'assistant',
        content: '',
        attachments: [],
        createdAt: nowIso(),
      };
      chat.messages.push(assistant);
      renderMessages();

      const controller = new AbortController();
      state.activeAbort = controller;

      let kept = false;
      let lastError = '';
      const MAX_ATTEMPTS = 3;

      try {
        for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
          try {
            const { empty } = await streamOnce(chat, assistant, controller);
            if (assistant.content.trim() && !empty) {
              kept = true;
              lastError = '';
            } else {
              lastError = 'the local model returned no text';
            }
            break;
          } catch (error) {
            if (controller.signal.aborted) { lastError = ''; break; }
            lastError = error.message || String(error);
            const transient = (error instanceof TypeError)
              || /load failed|failed to fetch|network|connection|stream/i.test(lastError);
            // Only auto-retry when nothing has streamed yet, so we never duplicate text.
            if (transient && attempt < MAX_ATTEMPTS && !assistant.content.trim()) {
              await sleep(700 * attempt);
              continue;
            }
            break;
          }
        }

        // Keep any partial answer we did receive — a real response is never thrown away.
        if (!kept && assistant.content.trim()) kept = true;
      } finally {
        const aborted = controller.signal.aborted;
        state.generating = false;
        state.activeAbort = null;

        if (kept) {
          chat.updatedAt = nowIso();
          if (!chat.title || chat.title === 'New Chat') {
            const firstUser = chat.messages.find(message => message.role === 'user');
            if (firstUser) chat.title = summarizeTitle(firstUser.content);
          }
        } else {
          const index = chat.messages.indexOf(assistant);
          if (index !== -1) chat.messages.splice(index, 1);
          if (!aborted) {
            showToast(
              'Emma couldn’t respond (' + (lastError || 'unknown error') + '). Your message was kept.',
              'Retry',
              regenerateLast,
            );
          }
        }

        render();
        scheduleSave();
      }

      return kept;
    }

    async function handleSend() {
      if (state.generating) return;
      const promptEl = document.getElementById('prompt');
      const content = promptEl.value.trim();
      if (!content && !state.draftFiles.length) return;

      const chat = activeChat();
      if (!chat) return;

      chat.model = document.getElementById('model-select').value || '';
      chat.skill = document.getElementById('skill-select').value || 'general';
      state.settings.defaultSkill = chat.skill;
      if (chat.model) state.settings.preferredModel = chat.model;

      chat.messages.push({
        id: uid(),
        role: 'user',
        content,
        attachments: state.draftFiles.map(file => ({
          name: file.name,
          type: file.type,
          text: file.text,
        })),
        createdAt: nowIso(),
      });
      chat.updatedAt = nowIso();

      if (chat.title === 'New Chat') {
        chat.title = summarizeTitle(content || state.draftFiles[0]?.name || 'New Chat');
      }

      promptEl.value = '';
      state.draftFiles = [];
      render();
      scheduleSave();
      await sendChatRequest(chat);
    }

    function onSendClick() {
      if (state.generating) stopGeneration();
      else handleSend();
    }

    async function readFileAsText(file) {
      const text = await file.text();
      return text.slice(0, FILE_CHAR_LIMIT);
    }

    async function handleFiles(fileList) {
      const files = Array.from(fileList || []);
      if (!files.length) return;

      let total = state.draftFiles.reduce((sum, file) => sum + (file.text || '').length, 0);

      for (const file of files) {
        const isTextLike = file.type.startsWith('text/')
          || /\.(txt|md|json|csv|js|ts|tsx|jsx|html|css|xml|yml|yaml|sql|py|java|c|cpp|h|cs|rb|go|rs|sh|ps1)$/i.test(file.name);
        if (!isTextLike) {
          alert(`Skipped ${file.name}: only text and code files are supported right now.`);
          continue;
        }

        const text = await readFileAsText(file);
        total += text.length;
        if (total > FILE_TOTAL_LIMIT) {
          alert('Attachment limit reached. Keep total attached text under roughly 240k characters.');
          break;
        }

        state.draftFiles.push({
          id: uid(),
          name: file.name,
          type: file.type || 'text/plain',
          text,
        });
      }

      renderDraftFiles();
    }

    function createAndSelectChat() {
      const chat = newChat({
        model: state.settings.preferredModel,
        skill: state.settings.defaultSkill,
      });
      state.chats.unshift(chat);
      state.activeChatId = chat.id;
      render();
      scheduleSave();
      document.getElementById('prompt').focus();
      closeDrawer();
    }

    function renameActiveChat() {
      toggleMenu(false);
      const chat = activeChat();
      if (!chat) return;
      const next = prompt('Rename chat', chat.title || '');
      if (!next) return;
      chat.title = next.trim().slice(0, 80) || chat.title;
      chat.updatedAt = nowIso();
      render();
      scheduleSave();
    }

    function deleteActiveChat() {
      toggleMenu(false);
      const chat = activeChat();
      if (!chat) return;
      if (!confirm(`Delete "${chat.title}"?`)) return;
      state.chats = state.chats.filter(item => item.id !== chat.id);
      ensureActiveChat();
      render();
      scheduleSave();
    }

    async function regenerateLast() {
      if (state.generating) return;
      const chat = activeChat();
      if (!chat) return;
      if (!chat.messages.some(message => message.role === 'user')) return;
      // Hold onto the previous answer; only drop it if a new one succeeds.
      let previous = null;
      if (chat.messages[chat.messages.length - 1]?.role === 'assistant') {
        previous = chat.messages.pop();
      }
      render();
      const ok = await sendChatRequest(chat);
      if (!ok && previous) {
        chat.messages.push(previous);
        chat.updatedAt = nowIso();
        render();
        scheduleSave();
      }
    }

    function stopGeneration() {
      if (state.activeAbort) state.activeAbort.abort();
    }

    Auth.onReady(async () => {
      const [savedSettings, savedData] = await Promise.all([
        Auth.loadSettings(APP_ID).catch(() => null),
        api('/api/data/' + APP_ID).then(res => res.json()).catch(() => null),
      ]);

      if (savedSettings && typeof savedSettings === 'object') {
        state.settings = {
          preferredModel: typeof savedSettings.preferredModel === 'string' ? savedSettings.preferredModel : '',
          defaultSkill: typeof savedSettings.defaultSkill === 'string' ? savedSettings.defaultSkill : 'general',
        };
      }

      if (savedData && Array.isArray(savedData.chats)) {
        state.chats = savedData.chats.map(chat => ({
          ...newChat(),
          ...chat,
          messages: pruneBrokenMessages(Array.isArray(chat.messages) ? chat.messages.map(message => ({
            id: message.id || uid(),
            role: message.role === 'assistant' ? 'assistant' : 'user',
            content: typeof message.content === 'string' ? message.content : '',
            attachments: Array.isArray(message.attachments) ? message.attachments.map(file => ({
              name: file.name || 'file',
              type: file.type || '',
              text: file.text || '',
            })) : [],
            createdAt: message.createdAt || nowIso(),
          })) : []),
        }));
        state.activeChatId = typeof savedData.activeChatId === 'string' ? savedData.activeChatId : '';
      }

      ensureActiveChat();
      render();
      refreshStatus();

      // KaTeX is deferred; if the first paint happened before it loaded, re-render
      // the conversation once it's available so any math typesets immediately.
      if (!window.katex) {
        let tries = 0;
        const katexWatch = setInterval(() => {
          if (window.katex || tries++ > 40) {
            clearInterval(katexWatch);
            if (window.katex) renderMessages();
          }
        }, 100);
      }

      document.getElementById('new-chat-btn').onclick = createAndSelectChat;
      document.getElementById('rename-chat-btn').onclick = renameActiveChat;
      document.getElementById('delete-chat-btn').onclick = deleteActiveChat;
      document.getElementById('send-btn').onclick = onSendClick;
      document.getElementById('attach-btn').onclick = () => document.getElementById('file-input').click();
      document.getElementById('file-input').addEventListener('change', async event => {
        await handleFiles(event.target.files);
        event.target.value = '';
      });
      document.getElementById('model-select').addEventListener('change', event => {
        updateActiveChat(chat => { chat.model = event.target.value; });
        state.settings.preferredModel = event.target.value;
        renderSidebar();
        updateModelCapability();
        scheduleSave();
      });
      document.getElementById('skill-select').addEventListener('change', event => {
        updateActiveChat(chat => { chat.skill = event.target.value; });
        state.settings.defaultSkill = event.target.value;
        scheduleSave();
      });

      // Chat options menu
      const menuBtn = document.getElementById('menu-btn');
      menuBtn.onclick = event => {
        event.stopPropagation();
        toggleMenu();
      };
      document.addEventListener('click', event => {
        const wrap = document.querySelector('.header-menu-wrap');
        if (wrap && !wrap.contains(event.target)) toggleMenu(false);
      });
      document.addEventListener('keydown', event => {
        if (event.key === 'Escape') toggleMenu(false);
      });

      const prompt = document.getElementById('prompt');
      prompt.addEventListener('input', updatePromptHeight);
      prompt.addEventListener('keydown', event => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          handleSend();
        }
      });
      updatePromptHeight();

      document.getElementById('open-drawer-btn').onclick = openDrawer;
      document.getElementById('close-drawer-btn').onclick = closeDrawer;
      document.getElementById('drawer-backdrop').onclick = closeDrawer;

      Auth.beforeLogout(saveAll);

      // Best-effort flush so the last answer is never lost when the tab is hidden or closed.
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') saveAll();
      });
      window.addEventListener('pagehide', () => { saveAll(); });

      // Arriving from the homepage Ask Emma bar (/eco-ai/?q=…): open a fresh chat,
      // drop the exact prompt into the composer, and send it automatically.
      const incomingQuery = (new URLSearchParams(location.search).get('q') || '').trim();
      if (incomingQuery) {
        // Clear the query string so a refresh doesn't resend the same prompt.
        history.replaceState(null, '', location.pathname);
        createAndSelectChat();
        const promptEl = document.getElementById('prompt');
        promptEl.value = incomingQuery;
        updatePromptHeight();
        handleSend();
      }
    });
  </script>
</body>
</html>
