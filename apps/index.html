<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TUNA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(16px, 5vh, 40px) 20px;
    text-align: center;
    position: relative;
  }

  /* Temperature corner widget */
  #temp-widget {
    position: fixed;
    top: 24px;
    right: 28px;
    text-align: right;
    user-select: none;
  }
  #temp-value {
    font-size: 2.4rem;
    font-weight: 200;
    letter-spacing: -1px;
    color: #fff;
    line-height: 1;
  }
  #temp-label {
    font-size: 0.65rem;
    color: #444;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Big TUNA logo */
  .logo {
    font-size: clamp(3.5rem, 14vw, 8rem);
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1;
    color: #ff4d4d;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #ff4d4d 35%, #b91c1c 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Date display */
  .date-display {
    font-size: 0.9rem;
    color: #444;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: clamp(16px, 4vh, 32px);
  }

  /* ── Digital clock ── */
  .clock-digital {
    display: flex;
    align-items: center;
    gap: clamp(4px, 1.2vw, 8px);
    margin-bottom: clamp(20px, 6vh, 48px);
    user-select: none;
  }

  .digit-slot {
    position: relative;
    width: clamp(32px, 7.5vw, 52px);
    height: clamp(48px, 11vw, 76px);
    background: #111;
    border-radius: 8px;
    border: 1px solid #1e1e1e;
    overflow: hidden;
    /* inner drum shadow — top & bottom fade */
    box-shadow:
      inset 0 14px 16px -8px rgba(0,0,0,.9),
      inset 0 -14px 16px -8px rgba(0,0,0,.9),
      0 4px 20px rgba(0,0,0,.6);
  }
  .digit-slot.sec {
    border-color: #1f6feb;
    box-shadow:
      inset 0 14px 16px -8px rgba(0,0,0,.9),
      inset 0 -14px 16px -8px rgba(0,0,0,.9),
      0 4px 20px rgba(0,0,0,.6),
      0 0 12px rgba(88,166,255,.08);
  }

  .digit-val {
    position: absolute;
    width: 100%;
    text-align: center;
    font-family: 'SF Mono', ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
    font-size: clamp(26px, 6vw, 44px);
    font-weight: 700;
    line-height: clamp(48px, 11vw, 76px);
    color: #ddd;
    letter-spacing: -0.02em;
  }
  .digit-slot.sec .digit-val { color: #58a6ff; }

  /* roll animations */
  @keyframes roll-out-up {
    0%   { transform: translateY(0);     opacity: 1; }
    100% { transform: translateY(-115%); opacity: 0; }
  }
  @keyframes roll-in-up {
    0%   { transform: translateY(115%);  opacity: 0; }
    100% { transform: translateY(0);     opacity: 1; }
  }
  .digit-val.leaving { animation: roll-out-up 0.28s cubic-bezier(0.4,0,0.2,1) forwards; }
  .digit-val.arriving { animation: roll-in-up  0.28s cubic-bezier(0.4,0,0.2,1) forwards; }

  /* separator colon */
  .clock-sep {
    font-family: 'SF Mono', ui-monospace, monospace;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 300;
    color: #2a2a2a;
    padding-bottom: 3px;
    flex-shrink: 0;
  }
  .clock-sep.sec-sep { color: #1f6feb; }

  /* App grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    width: 100%;
    max-width: 600px;
  }

  .card {
    --accent: #58a6ff;
    --accent-soft: rgba(88,166,255,.16);
    position: relative;
    isolation: isolate;
    min-height: 128px;
    background:
      radial-gradient(circle at 28% 18%, var(--accent-soft), transparent 34%),
      linear-gradient(145deg, rgba(255,255,255,.07), rgba(255,255,255,.02) 48%, rgba(255,255,255,.045));
    border-radius: 14px;
    padding: 22px 16px 18px;
    text-decoration: none;
    color: #f4f7fb;
    transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease;
    border: 1px solid rgba(255,255,255,.1);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.08),
      0 14px 28px rgba(0,0,0,.28);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    overflow: hidden;
  }
  .card::after {
    content: "";
    position: absolute;
    inset: auto 18px 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: .85;
    z-index: -1;
  }
  .card:hover {
    transform: translateY(-5px);
    background:
      radial-gradient(circle at 28% 18%, color-mix(in srgb, var(--accent) 28%, transparent), transparent 38%),
      linear-gradient(145deg, rgba(255,255,255,.095), rgba(255,255,255,.032) 48%, rgba(255,255,255,.06));
    border-color: color-mix(in srgb, var(--accent) 65%, rgba(255,255,255,.2));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.12),
      0 18px 34px rgba(0,0,0,.35),
      0 0 24px color-mix(in srgb, var(--accent) 22%, transparent);
  }
  .card:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 4px;
  }
  .card .icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: grid;
    place-items: center;
    background: color-mix(in srgb, var(--accent) 18%, rgba(255,255,255,.06));
    border: 1px solid color-mix(in srgb, var(--accent) 35%, rgba(255,255,255,.1));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
    font-size: 1.9rem;
    line-height: 1;
  }
  .card .name {
    font-size: 0.93rem;
    font-weight: 700;
    line-height: 1.18;
    letter-spacing: 0;
  }
  .card:nth-child(2) { --accent: #ffcc66; --accent-soft: rgba(255,204,102,.15); }
  .card:nth-child(3) { --accent: #44d7b6; --accent-soft: rgba(68,215,182,.14); }
  .card:nth-child(4) { --accent: #ff8a7a; --accent-soft: rgba(255,138,122,.15); }
  .card:nth-child(5) { --accent: #7ee787; --accent-soft: rgba(126,231,135,.14); }
  .card:nth-child(6) { --accent: #c297ff; --accent-soft: rgba(194,151,255,.14); }
  .card:nth-child(7) { --accent: #f2a7d8; --accent-soft: rgba(242,167,216,.14); }

  #dev-btn {
    position: fixed;
    bottom: 18px;
    right: 20px;
    font-family: monospace;
    font-size: 11px;
    color: #2a2a2a;
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: color 0.2s;
    user-select: none;
  }
  #dev-btn:hover { color: #555; }

  @media (max-width: 600px) {
    body {
      min-height: 100svh;
      justify-content: flex-start;
      padding: calc(env(safe-area-inset-top, 0px) + 64px) 14px 18px;
    }

    #temp-widget {
      top: calc(env(safe-area-inset-top, 0px) + 14px);
      right: 14px;
    }

    #temp-value {
      font-size: 1.45rem;
      letter-spacing: 0;
    }

    #temp-label {
      font-size: 0.55rem;
    }

    .logo {
      font-size: clamp(2.75rem, 15vw, 3.4rem);
      margin-bottom: 5px;
    }

    .date-display {
      font-size: 0.72rem;
      margin-bottom: 12px;
    }

    .clock-digital {
      gap: 3px;
      margin-bottom: 16px;
    }

    .digit-slot {
      width: clamp(24px, 8vw, 31px);
      height: clamp(36px, 11vw, 42px);
      border-radius: 6px;
    }

    .digit-val {
      font-size: clamp(19px, 6.4vw, 24px);
      line-height: clamp(36px, 11vw, 42px);
    }

    .clock-sep {
      font-size: 1.35rem;
      padding-bottom: 1px;
    }

    .grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      max-width: 390px;
    }

    .card {
      min-height: 86px;
      padding: 12px 8px 10px;
      border-radius: 10px;
      gap: 6px;
    }

    .card:hover {
      transform: none;
    }

    .card .icon {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      font-size: 1.35rem;
      line-height: 1;
    }

    .card .name {
      font-size: 0.78rem;
      line-height: 1.15;
    }
  }
</style>
</head>
<body>

<!-- Account widget (injected by auth.js into this container) -->
<div data-auth-widget="left" style="position:fixed;top:20px;left:20px;z-index:300;"></div>


<!-- Temperature widget -->
<div id="temp-widget">
  <div id="temp-value">—</div>
  <div id="temp-label">feels like</div>
</div>

<div class="logo">BIG TUNA</div>
<div class="date-display" id="date-display"></div>

<!-- Digital clock -->
<div class="clock-digital" id="clock">
  <div class="digit-slot" id="h1"></div>
  <div class="digit-slot" id="h2"></div>
  <div class="clock-sep">:</div>
  <div class="digit-slot" id="m1"></div>
  <div class="digit-slot" id="m2"></div>
  <div class="clock-sep sec-sep">:</div>
  <div class="digit-slot sec" id="s1"></div>
  <div class="digit-slot sec" id="s2"></div>
</div>

<div class="grid">
  <a href="/workout-timer/" class="card">
    <div class="icon">⏱️</div>
    <div class="name">Workout Timer</div>
  </a>
  <a href="/quiz-app/" class="card">
    <div class="icon">❓</div>
    <div class="name">Quizzes</div>
  </a>
  <a href="/psych-sheet/" class="card">
    <div class="icon">🏊</div>
    <div class="name">Psych Sheet</div>
  </a>
  <a href="/list-maker/" class="card">
    <div class="icon">📋</div>
    <div class="name">Lists</div>
  </a>
  <a href="/world-map/" class="card">
    <div class="icon">🌍</div>
    <div class="name">World Map</div>
  </a>
  <a href="/pace-calculator/" class="card">
    <div class="icon">🏃</div>
    <div class="name">Pace Calculator</div>
  </a>
  <a href="/capitals-quiz/" class="card">
    <div class="icon">🏛</div>
    <div class="name">Capitals Quiz</div>
  </a>
</div>

<script>
  // Date display
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('date-display').textContent =
    `${days[now.getDay()]}  ·  ${months[now.getMonth()]} ${now.getDate()}`;

  // ── Digital clock ──
  // Track last displayed value per slot
  const slotState = {};

  function setSlot(id, char) {
    const slot = document.getElementById(id);
    if (slotState[id] === char) return; // no change, skip
    slotState[id] = char;

    // Remove any currently-arriving element instantly
    const old = slot.querySelector('.digit-val');
    if (old) {
      old.classList.add('leaving');
      // clean up after animation
      old.addEventListener('animationend', () => old.remove(), { once: true });
    }

    const next = document.createElement('div');
    next.className = 'digit-val arriving';
    next.textContent = char;
    slot.appendChild(next);
    next.addEventListener('animationend', () => next.classList.remove('arriving'), { once: true });
  }

  function tickClock() {
    const t = new Date();
    const h = String(t.getHours()).padStart(2, '0');
    const m = String(t.getMinutes()).padStart(2, '0');
    const s = String(t.getSeconds()).padStart(2, '0');
    setSlot('h1', h[0]); setSlot('h2', h[1]);
    setSlot('m1', m[0]); setSlot('m2', m[1]);
    setSlot('s1', s[0]); setSlot('s2', s[1]);
  }

  tickClock();
  setInterval(tickClock, 1000);

  // Temperature — feels like, using Open-Meteo (no API key needed)
  function fetchTemp(lat, lon) {
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=apparent_temperature&temperature_unit=celsius`)
      .then(r => r.json())
      .then(d => {
        const t = Math.round(d.current.apparent_temperature);
        document.getElementById('temp-value').textContent = `${t}°`;
      })
      .catch(() => {});
  }

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => fetchTemp(pos.coords.latitude, pos.coords.longitude),
      () => {}
    );
  }
</script>

<a href="/terminal/" id="dev-btn">&gt;_ dev</a>

<script src="/auth.js"></script>
</body>
</html>
