<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TUNA</title>
<link rel="stylesheet" href="/styles/tokens.css">
<style>
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(16px, 5vh, 40px) 20px;
    text-align: center;
    position: relative;
  }

  /* Temperature corner widget */
  #temp-widget {
    position: fixed;
    top: 24px;
    right: 28px;
    text-align: right;
    user-select: none;
    text-decoration: none;
    color: inherit;
    border-radius: var(--radius-sm);
    padding: 4px 5px;
    transition: background var(--dur), transform var(--dur);
  }
  #temp-widget:hover,
  #temp-widget:focus-visible {
    background: var(--accent-soft);
    outline: none;
    transform: translateY(-1px);
  }
  #temp-value {
    font-size: var(--text-3xl);
    font-weight: 200;
    letter-spacing: -1px;
    color: var(--text);
    line-height: 1;
  }
  #temp-label {
    font-size: var(--text-xs);
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Big TUNA logo */
  .logo {
    font-size: clamp(3.5rem, 14vw, 8rem);
    font-weight: var(--weight-black);
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--accent);
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent) 35%, var(--accent-press) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Date display */
  .date-display {
    font-size: 0.9rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: clamp(16px, 4vh, 32px);
  }

  /* ── Digital clock ── */
  .clock-digital {
    display: flex;
    align-items: center;
    gap: clamp(4px, 1.2vw, 8px);
    margin-bottom: clamp(20px, 6vh, 48px);
    user-select: none;
  }

  .digit-slot {
    position: relative;
    width: clamp(32px, 7.5vw, 52px);
    height: clamp(48px, 11vw, 76px);
    background: var(--bg-raised);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    overflow: hidden;
    /* inner drum shadow — top & bottom fade */
    box-shadow:
      inset 0 14px 16px -8px rgba(0,0,0,.9),
      inset 0 -14px 16px -8px rgba(0,0,0,.9),
      var(--shadow-2);
  }
  .digit-slot.sec {
    border-color: var(--accent);
    box-shadow:
      inset 0 14px 16px -8px rgba(0,0,0,.9),
      inset 0 -14px 16px -8px rgba(0,0,0,.9),
      var(--shadow-2),
      0 0 12px var(--accent-soft);
  }

  .digit-val {
    position: absolute;
    width: 100%;
    text-align: center;
    font-family: var(--font-mono);
    font-size: clamp(26px, 6vw, 44px);
    font-weight: var(--weight-bold);
    line-height: clamp(48px, 11vw, 76px);
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .digit-slot.sec .digit-val { color: var(--accent); }

  /* roll animations */
  @keyframes roll-out-up {
    0%   { transform: translateY(0);     opacity: 1; }
    100% { transform: translateY(-115%); opacity: 0; }
  }
  @keyframes roll-in-up {
    0%   { transform: translateY(115%);  opacity: 0; }
    100% { transform: translateY(0);     opacity: 1; }
  }
  .digit-val.leaving { animation: roll-out-up 0.28s cubic-bezier(0.4,0,0.2,1) forwards; }
  .digit-val.arriving { animation: roll-in-up  0.28s cubic-bezier(0.4,0,0.2,1) forwards; }

  /* separator colon */
  .clock-sep {
    font-family: var(--font-mono);
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 300;
    color: var(--text-faint);
    padding-bottom: 3px;
    flex-shrink: 0;
  }
  .clock-sep.sec-sep { color: var(--accent); }

  /* App grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    width: 100%;
    max-width: 600px;
  }

  .card {
    position: relative;
    isolation: isolate;
    min-height: 128px;
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 22px 16px 18px;
    text-decoration: none;
    color: var(--text);
    transition: transform var(--dur) var(--ease), border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), background var(--dur) var(--ease);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    overflow: hidden;
  }
  .card:hover {
    transform: translateY(-5px);
    background: var(--surface-2);
    border-color: var(--accent);
    box-shadow: var(--shadow-3), 0 0 24px var(--accent-soft);
  }
  .card:focus-visible {
    outline: none;
    border-color: var(--accent);
    box-shadow: var(--ring);
  }
  .card .icon {
    width: 48px;
    height: 48px;
    border-radius: var(--radius);
    display: grid;
    place-items: center;
    background: var(--accent-soft);
    border: 1px solid var(--border-strong);
    font-size: 1.9rem;
    line-height: 1;
  }
  .card .name {
    font-size: var(--text-base);
    font-weight: var(--weight-bold);
    line-height: 1.18;
    letter-spacing: 0;
  }

  #downloads-menu {
    position: fixed;
    bottom: 18px;
    right: 82px;
    display: grid;
    justify-items: end;
  }

  #downloads-btn {
    font-family: var(--font-mono);
    background: transparent;
    border: 0;
    padding: 0;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.05em;
    transition: color var(--dur);
    user-select: none;
    cursor: pointer;
  }
  #downloads-btn:hover,
  #downloads-btn:focus-visible {
    color: var(--text-muted);
    outline: none;
  }

  #downloads-list {
    position: absolute;
    right: 0;
    bottom: 22px;
    min-width: 178px;
    display: none;
    padding: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-3);
    text-align: left;
  }

  #downloads-menu.is-open #downloads-list {
    display: grid;
    gap: 4px;
  }

  .download-item {
    display: block;
    padding: 8px 9px;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 11px;
    line-height: 1.2;
    text-decoration: none;
    white-space: nowrap;
  }

  .download-item:hover,
  .download-item:focus-visible {
    color: var(--text);
    background: var(--accent-soft);
    outline: none;
  }

  #minimal-btn {
    position: fixed;
    left: 18px;
    bottom: 14px;
    min-width: 42px;
    height: 32px;
    padding: 0 10px;
    display: grid;
    place-items: center;
    font: var(--weight-bold) 10px/1 var(--font-ui);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: color var(--dur), background var(--dur), border-color var(--dur);
    user-select: none;
  }
  #minimal-btn:hover,
  #minimal-btn:focus-visible {
    color: var(--accent);
    background: var(--accent-soft);
    border-color: var(--accent);
    outline: none;
  }

  body.minimal-mode {
    justify-content: center;
    padding: clamp(16px, 5vh, 40px) 20px;
  }
  body.minimal-mode [data-auth-widget],
  body.minimal-mode #temp-widget,
  body.minimal-mode .grid,
  body.minimal-mode #downloads-menu {
    display: none !important;
  }
  body.minimal-mode .logo {
    font-size: clamp(4rem, 16vw, 9rem);
    margin-bottom: 10px;
  }
  body.minimal-mode .date-display {
    margin-bottom: clamp(20px, 5vh, 42px);
  }
  body.minimal-mode .clock-digital {
    margin-bottom: 0;
  }

  #lights-btn {
    position: fixed;
    right: 20px;
    bottom: 14px;
    width: 42px;
    height: 42px;
    display: grid;
    place-items: center;
    color: var(--text-faint);
    text-decoration: none;
    border-radius: var(--radius-full);
    background: var(--surface-2);
    border: 1px solid var(--border);
    transition: color var(--dur), background var(--dur), border-color var(--dur), box-shadow var(--dur);
    user-select: none;
  }
  /* Warm glow is deliberate: this control opens the physical Lights app. */
  #lights-btn:hover {
    color: var(--warning);
    background: color-mix(in srgb, var(--warning) 8%, transparent);
    border-color: color-mix(in srgb, var(--warning) 16%, transparent);
    box-shadow: 0 0 18px color-mix(in srgb, var(--warning) 10%, transparent);
  }
  #lights-btn svg {
    width: 21px;
    height: 21px;
    fill: currentColor;
  }

  @media (max-width: 600px) {
    body {
      min-height: 100svh;
      justify-content: flex-start;
      padding: calc(env(safe-area-inset-top, 0px) + 64px) 14px 18px;
    }

    #temp-widget {
      top: calc(env(safe-area-inset-top, 0px) + 14px);
      right: 14px;
    }

    #temp-value {
      font-size: 1.45rem;
      letter-spacing: 0;
    }

    #temp-label {
      font-size: 0.55rem;
    }

    .logo {
      font-size: clamp(2.75rem, 15vw, 3.4rem);
      margin-bottom: 5px;
    }

    .date-display {
      font-size: 0.72rem;
      margin-bottom: 12px;
    }

    .clock-digital {
      gap: 3px;
      margin-bottom: 16px;
    }

    .digit-slot {
      width: clamp(24px, 8vw, 31px);
      height: clamp(36px, 11vw, 42px);
      border-radius: 6px;
    }

    .digit-val {
      font-size: clamp(19px, 6.4vw, 24px);
      line-height: clamp(36px, 11vw, 42px);
    }

    .clock-sep {
      font-size: 1.35rem;
      padding-bottom: 1px;
    }

    .grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      max-width: 390px;
    }

    .card {
      min-height: 86px;
      padding: 12px 8px 10px;
      border-radius: var(--radius);
      gap: 6px;
    }

    .card:hover {
      transform: none;
    }

    .card .icon {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      font-size: 1.35rem;
      line-height: 1;
    }

    .card .name {
      font-size: 0.78rem;
      line-height: 1.15;
    }

    #downloads-menu {
      right: 76px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 21px);
    }

    #minimal-btn {
      left: 16px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 17px);
      height: 30px;
      padding: 0 9px;
      font-size: 9px;
    }

    #lights-btn {
      right: 16px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
    }

    body.minimal-mode {
      justify-content: center;
      padding: calc(env(safe-area-inset-top, 0px) + 24px) 14px calc(env(safe-area-inset-bottom, 0px) + 52px);
    }

    body.minimal-mode .logo {
      font-size: clamp(3rem, 18vw, 4.4rem);
    }
  }
</style>
</head>
<body>

<!-- Account widget (injected by auth.js into this container) -->
<div data-auth-widget="left" style="position:fixed;top:20px;left:20px;z-index:300;"></div>


<!-- Temperature widget -->
<a id="temp-widget" href="/weather/" aria-label="Open Weather app">
  <div id="temp-value">—</div>
  <div id="temp-label">feels like</div>
</a>

<div class="logo">BIG TUNA</div>
<div class="date-display" id="date-display"></div>

<!-- Digital clock -->
<div class="clock-digital" id="clock">
  <div class="digit-slot" id="h1"></div>
  <div class="digit-slot" id="h2"></div>
  <div class="clock-sep">:</div>
  <div class="digit-slot" id="m1"></div>
  <div class="digit-slot" id="m2"></div>
  <div class="clock-sep sec-sep">:</div>
  <div class="digit-slot sec" id="s1"></div>
  <div class="digit-slot sec" id="s2"></div>
</div>

<div class="grid">
  <a href="/climb-tracker/" class="card">
    <div class="icon">&#9968;</div>
    <div class="name">Climb Tracker</div>
  </a>
  <a href="/workout-timer/" class="card">
    <div class="icon">⏱️</div>
    <div class="name">Workout Timer</div>
  </a>
  <a href="/quiz-app/" class="card">
    <div class="icon">❓</div>
    <div class="name">Quizzes</div>
  </a>
  <a href="/psych-sheet/" class="card">
    <div class="icon">🏊</div>
    <div class="name">Psych Sheet</div>
  </a>
  <a href="/list-maker/" class="card">
    <div class="icon">📋</div>
    <div class="name">Lists</div>
  </a>
  <a href="/eco-ai/" class="card">
    <div class="icon">🌱</div>
    <div class="name">Eco AI</div>
  </a>
  <a href="/assignments/" class="card">
    <div class="icon">✓</div>
    <div class="name">Assignments</div>
  </a>
  <a href="/world-map/" class="card">
    <div class="icon">🌍</div>
    <div class="name">World Map</div>
  </a>
  <a href="/pace-calculator/" class="card">
    <div class="icon">🏃</div>
    <div class="name">Pace Calculator</div>
  </a>
  <a href="/capitals-quiz/" class="card">
    <div class="icon">🏛</div>
    <div class="name">Capitals Quiz</div>
  </a>
</div>

<script>
  const MINIMAL_MODE_KEY = 'home_minimal_mode';

  function setMinimalMode(enabled) {
    document.body.classList.toggle('minimal-mode', enabled);
    localStorage.setItem(MINIMAL_MODE_KEY, enabled ? '1' : '0');
    const btn = document.getElementById('minimal-btn');
    if (btn) {
      btn.textContent = enabled ? 'Exit' : 'Min';
      btn.setAttribute('aria-label', enabled ? 'Exit minimal mode' : 'Enter minimal mode');
      btn.setAttribute('aria-pressed', String(enabled));
    }
  }

  setMinimalMode(localStorage.getItem(MINIMAL_MODE_KEY) === '1');

  // Date display
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('date-display').textContent =
    `${days[now.getDay()]}  ·  ${months[now.getMonth()]} ${now.getDate()}`;

  // ── Digital clock ──
  // Track last displayed value per slot
  const slotState = {};

  function pruneSlot(slot, keep) {
    slot.querySelectorAll('.digit-val').forEach(el => {
      if (el !== keep) el.remove();
    });
  }

  function setSlot(id, char) {
    const slot = document.getElementById(id);
    const existing = Array.from(slot.querySelectorAll('.digit-val'));
    const current = existing[existing.length - 1] || null;

    if (slotState[id] === char) {
      pruneSlot(slot, current);
      if (current) current.classList.remove('leaving', 'arriving');
      return; // no change, skip
    }

    slotState[id] = char;
    pruneSlot(slot, current);

    if (current) {
      current.classList.remove('arriving');
      current.classList.add('leaving');
      current.addEventListener('animationend', () => current.remove(), { once: true });
    }

    const next = document.createElement('div');
    next.className = 'digit-val arriving';
    next.textContent = char;
    slot.appendChild(next);
    next.addEventListener('animationend', () => {
      next.classList.remove('arriving');
      pruneSlot(slot, next);
    }, { once: true });
  }

  function tickClock() {
    const t = new Date();
    const h = String(t.getHours()).padStart(2, '0');
    const m = String(t.getMinutes()).padStart(2, '0');
    const s = String(t.getSeconds()).padStart(2, '0');
    setSlot('h1', h[0]); setSlot('h2', h[1]);
    setSlot('m1', m[0]); setSlot('m2', m[1]);
    setSlot('s1', s[0]); setSlot('s2', s[1]);
  }

  tickClock();
  setInterval(tickClock, 1000);

  // Temperature — "feels like", from Open-Meteo (no API key). Tries the
  // browser's location first, falls back to Halifax, then to a placeholder.
  const HALIFAX_WEATHER = { lat: 44.6488, lon: -63.5752 };

  async function fetchHomepageTemp(lat, lon) {
    const params = new URLSearchParams({
      latitude: lat,
      longitude: lon,
      current: 'apparent_temperature',
      temperature_unit: 'celsius',
    });
    const response = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
    if (!response.ok) throw new Error('Weather request failed');
    const data = await response.json();
    const temp = data && data.current && data.current.apparent_temperature;
    if (!Number.isFinite(temp)) throw new Error('Weather unavailable');
    document.getElementById('temp-value').textContent = `${Math.round(temp)}\u00b0`;
  }

  function getBrowserPosition() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) {
        reject(new Error('Geolocation unavailable'));
        return;
      }
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: false,
        timeout: 7000,
        maximumAge: 600000,
      });
    });
  }

  async function loadHomepageTemp() {
    try {
      const pos = await getBrowserPosition();
      await fetchHomepageTemp(pos.coords.latitude, pos.coords.longitude);
    } catch {
      try {
        await fetchHomepageTemp(HALIFAX_WEATHER.lat, HALIFAX_WEATHER.lon);
      } catch {
        document.getElementById('temp-value').textContent = '0\u00b0';
      }
    }
  }

  loadHomepageTemp();
</script>

<button id="minimal-btn" type="button" aria-label="Enter minimal mode" aria-pressed="false">Min</button>
<a href="/lights/" id="lights-btn" aria-label="Lights">
  <svg viewBox="0 0 24 24" aria-hidden="true">
    <path d="M9 21h6v-1.5H9V21Zm3-20C8.14 1 5 4.08 5 7.86c0 2.24 1.11 4.23 2.82 5.49.72.53 1.18 1.35 1.18 2.24V17h6v-1.41c0-.89.46-1.71 1.18-2.24A6.78 6.78 0 0 0 19 7.86C19 4.08 15.86 1 12 1Zm2.99 10.74A4.75 4.75 0 0 0 13 15.5h-2a4.75 4.75 0 0 0-1.99-3.76A4.77 4.77 0 0 1 7 7.86C7 5.18 9.24 3 12 3s5 2.18 5 4.86c0 1.54-.74 2.99-2.01 3.88Z"/>
  </svg>
</a>
<div id="downloads-menu">
  <button id="downloads-btn" type="button" aria-haspopup="true" aria-expanded="false">downloads</button>
  <div id="downloads-list" role="menu" aria-label="Available downloads">
    <a class="download-item" role="menuitem" href="https://github.com/yannickbigtuna-dev/BIG-TUNA/releases/download/lights-mac-latest/big-tuna-lights-mac.zip">Lights app</a>
    <a class="download-item" role="menuitem" href="https://github.com/yannickbigtuna-dev/BIG-TUNA/releases/download/weather-mac-latest/big-tuna-weather-mac.zip">Weather app</a>
    <a class="download-item" role="menuitem" href="https://github.com/yannickbigtuna-dev/BIG-TUNA/releases/download/codex-mac-latest/big-tuna-codex-mac.zip">Codex app</a>
  </div>
</div>

<script src="/auth.js"></script>
<script>
  const minimalBtn = document.getElementById('minimal-btn');
  setMinimalMode(document.body.classList.contains('minimal-mode'));
  minimalBtn.addEventListener('click', () => {
    setMinimalMode(!document.body.classList.contains('minimal-mode'));
  });

  const downloadsMenu = document.getElementById('downloads-menu');
  const downloadsBtn = document.getElementById('downloads-btn');
  const setDownloadsOpen = open => {
    downloadsMenu.classList.toggle('is-open', open);
    downloadsBtn.setAttribute('aria-expanded', String(open));
  };

  downloadsBtn.addEventListener('click', event => {
    event.stopPropagation();
    setDownloadsOpen(!downloadsMenu.classList.contains('is-open'));
  });
  document.addEventListener('click', event => {
    if (!downloadsMenu.contains(event.target)) setDownloadsOpen(false);
  });
  document.addEventListener('keydown', event => {
    if (event.key === 'Escape') setDownloadsOpen(false);
  });
</script>
</body>
</html>
