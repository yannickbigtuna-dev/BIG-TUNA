<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BIG TUNA</title>
<link rel="stylesheet" href="/styles/tokens.css">
<style>
  body {
    min-height: 100vh;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: calc(env(safe-area-inset-top, 0px) + 96px) 20px calc(env(safe-area-inset-bottom, 0px) + 112px);
    text-align: center;
    position: relative;
    overflow-x: hidden;
  }

  /* Mouse-follow atmosphere */
  #atmosphere {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    transition: background 0.4s var(--ease);
  }

  /* Inline icon defaults */
  svg.ic { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; display: block; }

  /* ── Glass top nav ── */
  #topnav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: calc(env(safe-area-inset-top, 0px) + 12px) clamp(14px, 4vw, 40px) 12px;
    background: var(--glass-strong);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border-bottom: 1px solid var(--glass-border);
  }
  [data-auth-widget] { display: flex; }

  #nav-right {
    display: flex;
    align-items: center;
    gap: clamp(12px, 3vw, 24px);
  }
  #temp-widget {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    text-decoration: none;
    color: inherit;
    border-radius: var(--radius-sm);
    padding: 2px 4px;
    transition: transform var(--dur), background var(--dur);
  }
  #temp-widget:hover { transform: translateY(-1px); background: rgba(255,255,255,0.05); }
  #temp-value { font-size: var(--text-xl); font-weight: var(--weight-bold); color: var(--text); line-height: 1; letter-spacing: -0.02em; }
  #temp-label { font-family: var(--font-mono); font-size: 0.58rem; color: var(--text-dim); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 4px; opacity: 0.7; }

  #nav-divider { width: 1px; height: 30px; background: var(--glass-border); }

  #nav-clock-wrap { display: flex; flex-direction: column; align-items: flex-start; }
  #nav-clock { font-family: var(--font-mono); font-size: var(--text-base); color: var(--accent); font-weight: var(--weight-medium); line-height: 1; letter-spacing: 0.04em; }
  #nav-tz { font-family: var(--font-mono); font-size: 0.58rem; color: var(--text-dim); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 5px; opacity: 0.7; }

  /* ── Centerpiece ── */
  .stage { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; width: 100%; }

  .date-display {
    font-family: var(--font-mono);
    font-size: 0.74rem;
    color: var(--text-muted);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    opacity: 0.85;
    margin-bottom: clamp(8px, 1.6vh, 16px);
    padding-left: 0.4em; /* optical balance for tracking */
  }

  .logo {
    font-size: clamp(3.6rem, 15vw, 8rem);
    font-weight: var(--weight-black);
    letter-spacing: -0.05em;
    line-height: 0.92;
    color: var(--accent);
    text-transform: uppercase;
    text-shadow: 0 0 60px var(--accent-glow), 0 0 24px color-mix(in srgb, var(--accent) 40%, transparent);
    margin-bottom: clamp(22px, 5vh, 46px);
    user-select: none;
  }

  /* ── Segment clock ── */
  .clock-digital {
    display: flex;
    align-items: center;
    gap: clamp(6px, 1.6vw, 12px);
    margin-bottom: clamp(28px, 7vh, 56px);
    user-select: none;
  }
  .digit-slot {
    position: relative;
    width: clamp(44px, 8.4vw, 70px);
    height: clamp(62px, 12.4vw, 100px);
    background: linear-gradient(180deg, #1a1a1a 0%, #0b0b0b 100%);
    border-radius: var(--radius);
    border: 1px solid var(--glass-border);
    overflow: hidden;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.65), var(--shadow-1);
  }
  .digit-slot.sec { border-color: var(--accent-ring); box-shadow: inset 0 2px 8px rgba(0,0,0,0.65), 0 0 24px color-mix(in srgb, var(--accent) 16%, transparent); }
  .digit-val {
    position: absolute;
    width: 100%;
    text-align: center;
    font-family: var(--font-mono);
    font-size: clamp(34px, 6.8vw, 56px);
    font-weight: var(--weight-bold);
    line-height: clamp(62px, 12.4vw, 100px);
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .digit-slot.sec .digit-val { color: var(--accent); text-shadow: 0 0 18px var(--accent-glow); }

  @keyframes roll-out-up { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-115%); opacity: 0; } }
  @keyframes roll-in-up  { 0% { transform: translateY(115%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
  .digit-val.leaving  { animation: roll-out-up 0.28s var(--ease) forwards; }
  .digit-val.arriving { animation: roll-in-up  0.28s var(--ease) forwards; }

  .clock-sep { font-family: var(--font-mono); font-size: clamp(28px, 5.4vw, 44px); font-weight: 300; color: var(--text-faint); padding-bottom: 6px; flex-shrink: 0; }
  .clock-sep.sec-sep { color: var(--accent); opacity: 0.5; }

  /* ── Rainbow app grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: clamp(12px, 1.6vw, 22px);
    width: 100%;
    max-width: 960px;
  }
  .card {
    position: relative;
    aspect-ratio: 1 / 1;
    background: var(--glass);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border-radius: var(--radius-xl);
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow-1);
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 14px;
    transition: transform var(--dur) var(--ease), border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), background var(--dur) var(--ease);
  }
  .card:hover {
    transform: translateY(-8px);
    background: rgba(255, 255, 255, 0.07);
    border-color: color-mix(in srgb, var(--tile) 55%, transparent);
    box-shadow: 0 18px 38px -12px color-mix(in srgb, var(--tile) 32%, transparent);
  }
  .card:focus-visible { outline: none; border-color: var(--tile); box-shadow: 0 0 0 3px color-mix(in srgb, var(--tile) 45%, transparent); }
  .card .icon {
    width: clamp(48px, 5.5vw, 64px);
    height: clamp(48px, 5.5vw, 64px);
    border-radius: var(--radius-lg);
    display: grid;
    place-items: center;
    background: color-mix(in srgb, var(--tile) 14%, transparent);
    color: var(--tile);
    transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  }
  .card:hover .icon { transform: scale(1.1); box-shadow: 0 0 22px -4px color-mix(in srgb, var(--tile) 45%, transparent); }
  .card .icon svg { width: clamp(26px, 3vw, 34px); height: clamp(26px, 3vw, 34px); }
  .card .name {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: var(--weight-medium);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    line-height: 1.2;
    color: var(--text-muted);
    transition: color var(--dur) var(--ease);
  }
  .card:hover .name { color: var(--tile); }

  /* ── Floating glass dock (bottom) ── */
  #botnav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 50;
    display: flex;
    justify-content: center;
    padding: 0 16px calc(env(safe-area-inset-bottom, 0px) + 20px);
    pointer-events: none;
  }
  .dock {
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 7px;
    background: var(--glass-strong);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-full);
    box-shadow: var(--shadow-3);
  }
  .dock-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: none;
    border-radius: var(--radius-full);
    color: var(--text-muted);
    padding: 10px 18px;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    font-weight: var(--weight-medium);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background var(--dur), color var(--dur), transform var(--dur-fast);
    user-select: none;
  }
  .dock-btn:hover, .dock-btn:focus-visible { background: rgba(255,255,255,0.08); color: var(--text); outline: none; }
  .dock-btn:active { transform: scale(0.95); }
  .dock-btn svg.ic { width: 17px; height: 17px; }

  /* MIN = primary coral pill */
  #minimal-pill {
    background: var(--accent);
    color: var(--on-accent);
    box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 40%, transparent);
  }
  #minimal-pill:hover, #minimal-pill:focus-visible { background: var(--accent-hover); color: var(--on-accent); }

  #lights-btn { padding: 10px 14px; }
  #lights-btn:hover { color: var(--warning); }

  #downloads-menu { position: relative; }
  #downloads-list {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(100% + 12px);
    min-width: 188px;
    display: none;
    padding: 7px;
    background: var(--surface);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-3);
    text-align: left;
  }
  #downloads-menu.is-open #downloads-list { display: grid; gap: 4px; }
  .download-item {
    display: block;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 0.78rem;
    text-decoration: none;
    white-space: nowrap;
    transition: background var(--dur), color var(--dur);
  }
  .download-item:hover, .download-item:focus-visible { color: var(--text); background: rgba(255,255,255,0.06); outline: none; }

  /* ── Minimal mode ── */
  body.minimal-mode { justify-content: center; }
  body.minimal-mode #topnav,
  body.minimal-mode .grid,
  body.minimal-mode #downloads-menu,
  body.minimal-mode #lights-btn { display: none !important; }
  body.minimal-mode .logo { font-size: clamp(4.4rem, 17vw, 9rem); margin-bottom: 18px; }
  body.minimal-mode .clock-digital { margin-bottom: 0; }

  @media (max-width: 820px) {
    .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); max-width: 560px; }
  }
  @media (max-width: 600px) {
    body { justify-content: flex-start; padding-top: calc(env(safe-area-inset-top, 0px) + 80px); }
    #nav-divider, #nav-clock-wrap { display: none; }
    .date-display { font-size: 0.64rem; letter-spacing: 0.3em; margin-bottom: 8px; }
    .logo { font-size: clamp(3rem, 16vw, 4rem); margin-bottom: 14px; }
    .clock-digital { gap: 5px; margin-bottom: 24px; }
    .digit-slot { width: clamp(32px, 11.5vw, 46px); height: clamp(46px, 17vw, 64px); border-radius: 11px; }
    .digit-val { font-size: clamp(24px, 8.5vw, 32px); line-height: clamp(46px, 17vw, 64px); }
    .clock-sep { font-size: 1.5rem; }
    .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; max-width: 420px; }
    .card { border-radius: var(--radius-lg); gap: 8px; }
    .dock-btn span { display: none; }
    .dock-btn { padding: 11px; }
    #minimal-pill span { display: inline; }
    #minimal-pill { padding: 11px 16px; }
  }
</style>
</head>
<body>

<div id="atmosphere"></div>

<!-- Glass top nav -->
<nav id="topnav">
  <div data-auth-widget="left"></div>
  <div id="nav-right">
    <a id="temp-widget" href="/weather/" aria-label="Open Weather app">
      <div id="temp-value">—</div>
      <div id="temp-label">feels like</div>
    </a>
    <div id="nav-divider"></div>
    <div id="nav-clock-wrap">
      <div id="nav-clock">00:00:00</div>
      <div id="nav-tz">local</div>
    </div>
  </div>
</nav>

<main class="stage">
  <div class="date-display" id="date-display"></div>
  <div class="logo">BIG TUNA</div>

  <!-- Segment clock -->
  <div class="clock-digital" id="clock">
    <div class="digit-slot" id="h1"></div>

    <div class="digit-slot sec" id="s1"></div>

  </div>

  <!-- Rainbow app grid -->
  <div class="grid">
    <a href="/climb-tracker/"  class="card" style="--tile: var(--c-red)">
      <div class="icon"><svg class="ic" viewBox="0 0 24 24"><path d="M3 20h18L14 7l-3.5 6L8 9l-5 11Z"/></svg></div>

    <a href="/workout-timer/"  class="card" style="--tile: var(--c-orange)">
      <div class="icon"><svg class="ic" viewBox="0 0 24 24"><path d="M9 2h6"/><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2.5"/></svg></div>

      <div class="icon"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg></div>
      <div class="name">Quizzes</div>
    </a>
    <a href="/psych-sheet/"    class="card" style="--tile: var(--c-green)">
      <div class="icon"><svg class="ic" viewBox="0 0 24 24"><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 1.3 0 1.9-.5 2.5-1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 1.3 0 1.9-.5 2.5-1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 1.3 0 1.9-.5 2.5-1"/></svg></div>
      <div class="name">Psych Sheet</div>

    <a href="/list-maker/"     class="card" style="--tile: var(--c-teal)">
      <div class="icon"><svg class="ic" viewBox="0 0 24 24"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg></div>
      <div class="name">Lists</div>
    </a>
    <a href="/eco-ai/"         class="card" style="--tile: var(--c-cyan)">
      <div class="icon"><svg class="ic" viewBox="0 0 24 24"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/></svg></div>
      <div class="name">Eco AI</div>
    </a>
    <a href="/assignments/"    class="card" style="--tile: var(--c-blue)">
      <div class="icon"><svg class="ic" viewBox="0 0 24 24"><rect width="8" height="4" x="8" y="2" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></svg></div>

    <a href="/world-map/"      class="card" style="--tile: var(--c-indigo)">
      <div class="icon"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg></div>

    <a href="/pace-calculator/" class="card" style="--tile: var(--c-purple)">
      <div class="icon"><svg class="ic" viewBox="0 0 24 24"><path d="M12 14l4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg></div>

    <a href="/capitals-quiz/"  class="card" style="--tile: var(--c-pink)">

</main>

<!-- Floating glass dock -->
<nav id="botnav">
  <div class="dock">
    <button id="minimal-pill" class="dock-btn" type="button" aria-label="Enter minimal mode" aria-pressed="false">
      <svg class="ic" id="minimal-icon" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
      <span id="minimal-label">Min</span>
    </button>

    <div id="downloads-menu">
      <button id="downloads-btn" class="dock-btn" type="button" aria-haspopup="true" aria-expanded="false">
        <svg class="ic" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/></svg>
        <span>Downloads</span>
      </button>
      <div id="downloads-list" role="menu" aria-label="Available downloads">
        <a class="download-item" role="menuitem" href="https://github.com/yannickbigtuna-dev/BIG-TUNA/releases/download/lights-mac-latest/big-tuna-lights-mac.zip">Lights app</a>
        <a class="download-item" role="menuitem" href="https://github.com/yannickbigtuna-dev/BIG-TUNA/releases/download/weather-mac-latest/big-tuna-weather-mac.zip">Weather app</a>
        <a class="download-item" role="menuitem" href="https://github.com/yannickbigtuna-dev/BIG-TUNA/releases/download/codex-mac-latest/big-tuna-codex-mac.zip">Codex app</a>
      </div>
    </div>

    <a href="/lights/" id="lights-btn" class="dock-btn" aria-label="Lights">
      <svg class="ic" viewBox="0 0 24 24"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
    </a>
  </div>
</nav>

<script>
  const MINIMAL_MODE_KEY = 'home_minimal_mode';
  const ICON_MAX = '<path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>';
  const ICON_MIN = '<path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/>';

  function setMinimalMode(enabled) {
    document.body.classList.toggle('minimal-mode', enabled);
    localStorage.setItem(MINIMAL_MODE_KEY, enabled ? '1' : '0');
    const btn = document.getElementById('minimal-pill');
    if (btn) {
      document.getElementById('minimal-label').textContent = enabled ? 'Exit' : 'Min';
      document.getElementById('minimal-icon').innerHTML = enabled ? ICON_MIN : ICON_MAX;
      btn.setAttribute('aria-label', enabled ? 'Exit minimal mode' : 'Enter minimal mode');
      btn.setAttribute('aria-pressed', String(enabled));
    }
  }

  setMinimalMode(localStorage.getItem(MINIMAL_MODE_KEY) === '1');

  // ── Date + nav clock ──
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function updateDate() {
    const now = new Date();
    document.getElementById('date-display').textContent =
      `${days[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()}`;
  }
  updateDate();

  // ── Segment clock (per-digit roll) ──
  const slotState = {};
  function pruneSlot(slot, keep) {
    slot.querySelectorAll('.digit-val').forEach(el => { if (el !== keep) el.remove(); });
  }
  function setSlot(id, char) {
    const slot = document.getElementById(id);
    const existing = Array.from(slot.querySelectorAll('.digit-val'));
    const current = existing[existing.length - 1] || null;
    if (slotState[id] === char) {
      pruneSlot(slot, current);
      if (current) current.classList.remove('leaving', 'arriving');
      return;
    }
    slotState[id] = char;
    pruneSlot(slot, current);
    if (current) {
      current.classList.remove('arriving');
      current.classList.add('leaving');
      current.addEventListener('animationend', () => current.remove(), { once: true });
    }
    const next = document.createElement('div');
    next.className = 'digit-val arriving';
    next.textContent = char;
    slot.appendChild(next);
    next.addEventListener('animationend', () => { next.classList.remove('arriving'); pruneSlot(slot, next); }, { once: true });
  }
  function tickClock() {
    const t = new Date();
    const h = String(t.getHours()).padStart(2, '0');
    const m = String(t.getMinutes()).padStart(2, '0');
    const s = String(t.getSeconds()).padStart(2, '0');
    setSlot('h1', h[0]); setSlot('h2', h[1]);
    setSlot('m1', m[0]); setSlot('m2', m[1]);
    setSlot('s1', s[0]); setSlot('s2', s[1]);
    const nc = document.getElementById('nav-clock');
    if (nc) nc.textContent = `${h}:${m}:${s}`;
    if (t.getHours() === 0 && t.getMinutes() === 0 && t.getSeconds() === 0) updateDate();
  }
  tickClock();
  setInterval(tickClock, 1000);

  // Timezone label
  try {
    document.getElementById('nav-tz').textContent =
      Intl.DateTimeFormat().resolvedOptions().timeZone.split('/').pop().replace(/_/g, ' ') || 'local';
  } catch { document.getElementById('nav-tz').textContent = 'local'; }

  // ── Temperature: Open-Meteo "feels like" ──
  const HALIFAX_WEATHER = { lat: 44.6488, lon: -63.5752 };
  async function fetchHomepageTemp(lat, lon) {
    const params = new URLSearchParams({
      latitude: lat, longitude: lon,
      current: 'apparent_temperature', temperature_unit: 'celsius',
    });
    const response = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
    if (!response.ok) throw new Error('Weather request failed');
    const data = await response.json();
    const temp = data && data.current && data.current.apparent_temperature;
    if (!Number.isFinite(temp)) throw new Error('Weather unavailable');
    document.getElementById('temp-value').textContent = `${Math.round(temp)}°`;
  }
  function getBrowserPosition() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) { reject(new Error('Geolocation unavailable')); return; }
      navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: false, timeout: 7000, maximumAge: 600000 });
    });
  }
  async function loadHomepageTemp() {
    try {
      const pos = await getBrowserPosition();
      await fetchHomepageTemp(pos.coords.latitude, pos.coords.longitude);
    } catch {
      try { await fetchHomepageTemp(HALIFAX_WEATHER.lat, HALIFAX_WEATHER.lon); }
      catch { document.getElementById('temp-value').textContent = '0°'; }
    }
  }
  loadHomepageTemp();

  // ── Mouse-follow atmosphere ──
  const atmosphere = document.getElementById('atmosphere');
  if (window.matchMedia('(pointer: fine)').matches) {
    document.addEventListener('mousemove', e => {
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      atmosphere.style.background =
        `radial-gradient(circle at ${x}% ${y}%, color-mix(in srgb, var(--accent) 6%, transparent) 0%, transparent 55%)`;
    });
  }
</script>

<script src="/auth.js"></script>
<script>
  const minimalBtn = document.getElementById('minimal-pill');
  setMinimalMode(document.body.classList.contains('minimal-mode'));
  minimalBtn.addEventListener('click', () => {
    setMinimalMode(!document.body.classList.contains('minimal-mode'));
  });

  const downloadsMenu = document.getElementById('downloads-menu');
  const downloadsBtn = document.getElementById('downloads-btn');
  const setDownloadsOpen = open => {
    downloadsMenu.classList.toggle('is-open', open);
    downloadsBtn.setAttribute('aria-expanded', String(open));
  };
  downloadsBtn.addEventListener('click', event => {
    event.stopPropagation();
    setDownloadsOpen(!downloadsMenu.classList.contains('is-open'));
  });
  document.addEventListener('click', event => {
    if (!downloadsMenu.contains(event.target)) setDownloadsOpen(false);
  });
  document.addEventListener('keydown', event => {
    if (event.key === 'Escape') setDownloadsOpen(false);
  });
</script>
