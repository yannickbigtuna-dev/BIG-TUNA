<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BIG TUNA</title>
<link rel="stylesheet" href="/styles/tokens.css">
<style>
  body {
    min-height: 100vh;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: calc(env(safe-area-inset-top, 0px) + 96px) 20px calc(env(safe-area-inset-bottom, 0px) + 96px);
    text-align: center;
    position: relative;
    overflow-x: hidden;
  }

  /* Mouse-follow atmosphere */
  #atmosphere {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(circle at 100% 0%, color-mix(in srgb, var(--accent) 3%, transparent) 0%, transparent 50%);
    transition: background 0.4s var(--ease);
  }

  svg.ic { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; display: block; }

  /* ── Glass top nav ── */
  #topnav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: calc(env(safe-area-inset-top, 0px) + 12px) clamp(14px, 4vw, 40px) 12px;
    background: var(--glass-strong);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border-bottom: 1px solid var(--glass-border);
  }
  [data-auth-widget] { display: flex; }

  #temp-widget {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    text-decoration: none;
    color: inherit;
    border-radius: var(--radius-sm);
    padding: 2px 4px;
    transition: transform var(--dur), background var(--dur);
  }
  #temp-widget:hover { transform: translateY(-1px); background: rgba(255,255,255,0.05); }
  #temp-value { font-size: var(--text-2xl); font-weight: var(--weight-black); color: var(--text); line-height: 1; letter-spacing: -0.03em; }
  #temp-label { font-family: var(--font-mono); font-size: 0.58rem; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; opacity: 0.6; }

  /* ── Centerpiece ── */
  .stage { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; width: 100%; }

  .hero { display: flex; flex-direction: column; align-items: center; gap: clamp(12px, 2vh, 20px); margin-bottom: clamp(30px, 6vh, 54px); }

  .logo {
    font-size: clamp(2.8rem, 12vw, 5.4rem);
    font-weight: var(--weight-black);
    letter-spacing: -0.045em;
    line-height: 1;
    color: var(--accent);
    text-transform: uppercase;
    text-shadow: 0 0 30px color-mix(in srgb, var(--accent) 50%, transparent);
    user-select: none;
  }

  .date-display {
    font-family: var(--font-ui);
    font-size: 0.74rem;
    font-weight: var(--weight-medium);
    color: var(--text-muted);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.85;
  }

  /* ── Segment clock ── */
  .clock-digital {
    display: flex;
    align-items: center;
    gap: clamp(5px, 1.2vw, 10px);
    user-select: none;
    margin-top: clamp(4px, 1.4vh, 12px);
  }
  .digit-slot {
    position: relative;
    width: clamp(40px, 7.6vw, 64px);
    height: clamp(56px, 11.4vw, 96px);
    background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.05);
    overflow: hidden;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
  }
  .digit-slot.sec { border-color: var(--accent-ring); }
  .digit-val {
    position: absolute;
    width: 100%;
    text-align: center;
    font-family: var(--font-ui);
    font-variant-numeric: tabular-nums;
    font-size: clamp(34px, 6.6vw, 56px);
    font-weight: var(--weight-black);
    line-height: clamp(56px, 11.4vw, 96px);
    color: var(--text);
    letter-spacing: -0.04em;
  }
  .digit-slot.sec .digit-val { color: var(--accent); text-shadow: 0 0 18px var(--accent-glow); }

  @keyframes roll-out-up { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-115%); opacity: 0; } }
  @keyframes roll-in-up  { 0% { transform: translateY(115%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
  .digit-val.leaving  { animation: roll-out-up 0.28s var(--ease) forwards; }
  .digit-val.arriving { animation: roll-in-up  0.28s var(--ease) forwards; }

  .clock-sep { font-family: var(--font-ui); font-size: clamp(26px, 5vw, 40px); font-weight: var(--weight-black); color: var(--accent); opacity: 0.4; padding-bottom: 4px; flex-shrink: 0; animation: sep-pulse 2s var(--ease) infinite; }
  @keyframes sep-pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.15; } }

  /* ── Ask Emma bar (Eco AI assistant) ── */
  #ask-emma {
    position: relative;
    width: 100%;
    max-width: 640px;
    margin-bottom: clamp(28px, 5vh, 48px);
  }
  #ask-emma::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: calc(var(--radius-lg) + 4px);
    background: var(--accent-soft);
    filter: blur(10px);
    opacity: 0.25;
    transition: opacity var(--dur);
    pointer-events: none;
  }
  #ask-emma:focus-within::before { opacity: 0.5; }
  .emma-inner {
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface-2);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    padding: 15px 18px;
    transition: border-color var(--dur);
  }
  #ask-emma:focus-within .emma-inner { border-color: var(--accent-ring); }
  .emma-spark { color: var(--accent); flex-shrink: 0; }
  .emma-spark svg { width: 20px; height: 20px; fill: currentColor; stroke: none; }
  #emma-input {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: var(--text-base);
  }
  #emma-input::placeholder { color: color-mix(in srgb, var(--text-muted) 50%, transparent); }
  .emma-kbd {
    flex-shrink: 0;
    font-family: var(--font-mono);
    font-size: 0.62rem;
    color: var(--text-dim);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    padding: 4px 8px;
    opacity: 0.6;
  }

  /* ── Rainbow app grid (3 columns) ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: clamp(12px, 1.8vw, 24px);
    width: 100%;
    max-width: 720px;
  }
  .card {
    position: relative;
    aspect-ratio: 1 / 1;
    background: var(--glass);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border-radius: var(--radius-xl);
    border: 1px solid var(--glass-border);
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 16px;
    transition: transform 0.3s var(--ease), border-color 0.3s var(--ease), box-shadow 0.3s var(--ease), background 0.3s var(--ease);
  }
  .card:hover {
    transform: translateY(-4px);
    background: rgba(26, 26, 26, 0.9);
    border-color: color-mix(in srgb, var(--tile) 50%, transparent);
    box-shadow: 0 10px 30px -10px color-mix(in srgb, var(--tile) 25%, transparent);
  }
  .card:focus-visible { outline: none; border-color: var(--tile); box-shadow: 0 0 0 3px color-mix(in srgb, var(--tile) 45%, transparent); }
  .card .icon {
    width: clamp(52px, 6vw, 64px);
    height: clamp(52px, 6vw, 64px);
    border-radius: var(--radius-lg);
    display: grid;
    place-items: center;
    background: color-mix(in srgb, var(--tile) 10%, transparent);
    color: var(--tile);
    transition: transform var(--dur) var(--ease);
  }
  .card:hover .icon { transform: scale(1.1); }
  .card .icon svg { width: clamp(30px, 3.4vw, 38px); height: clamp(30px, 3.4vw, 38px); }
  .card .name {
    font-size: var(--text-xs);
    font-weight: var(--weight-medium);
    letter-spacing: 0.02em;
    line-height: 1.18;
    color: var(--text);
    transition: color var(--dur) var(--ease);
  }
  .card:hover .name { color: var(--tile); }

  /* ── Bottom-right corner tools ── */
  .corner-tools {
    position: fixed;
    right: clamp(14px, 3vw, 32px);
    bottom: calc(env(safe-area-inset-bottom, 0px) + clamp(14px, 3vw, 32px));
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .tool-btn {
    width: 48px;
    height: 48px;
    display: grid;
    place-items: center;
    border-radius: var(--radius-full);
    background: var(--glass);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    color: var(--text-muted);
    cursor: pointer;
    transition: color var(--dur), border-color var(--dur), transform var(--dur-fast), background var(--dur);
  }
  .tool-btn:hover { color: var(--text); background: rgba(26,26,26,0.9); }
  .tool-btn:active { transform: scale(0.94); }
  .tool-btn:focus-visible { outline: none; box-shadow: var(--ring); }
  .tool-btn svg.ic { width: 20px; height: 20px; }
  #lights-btn:hover { color: var(--warning); border-color: color-mix(in srgb, var(--warning) 35%, transparent); }
  #downloads-btn:hover { color: var(--accent); border-color: var(--accent-ring); }

  #downloads-menu { position: relative; }
  #downloads-list {
    position: absolute;
    right: 0;
    bottom: calc(100% + 12px);
    min-width: 190px;
    display: none;
    padding: 7px;
    background: var(--surface);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-3);
    text-align: left;
  }
  #downloads-menu.is-open #downloads-list { display: grid; gap: 4px; }
  .download-item {
    display: block;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 0.78rem;
    text-decoration: none;
    white-space: nowrap;
    transition: background var(--dur), color var(--dur);
  }
  .download-item:hover, .download-item:focus-visible { color: var(--text); background: rgba(255,255,255,0.06); outline: none; }

  @media (max-width: 600px) {
    body { justify-content: flex-start; padding-top: calc(env(safe-area-inset-top, 0px) + 84px); padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 88px); }
    .logo { font-size: clamp(2.4rem, 13vw, 3rem); }
    .date-display { font-size: 0.64rem; letter-spacing: 0.26em; }
    .digit-slot { width: clamp(38px, 13vw, 48px); height: clamp(52px, 18vw, 64px); }
    .digit-val { font-size: clamp(26px, 9vw, 34px); line-height: clamp(52px, 18vw, 64px); }
    .clock-sep { font-size: 1.5rem; }
    .grid { gap: 14px; max-width: 400px; }
    .card { gap: 0; border-radius: var(--radius-lg); }
    .card .name { display: none; }  /* mobile design: icon-only tiles */
    .emma-kbd { display: none; }
  }
</style>
</head>
<body>

<div id="atmosphere"></div>

<!-- Glass top nav -->
<nav id="topnav">
  <div data-auth-widget="left"></div>
  <a id="temp-widget" href="/weather/" aria-label="Open Weather app">
    <div id="temp-value">—</div>
    <div id="temp-label">feels like</div>
  </a>
</nav>

<main class="stage">
  <!-- Hero: wordmark → date → clock -->
  <header class="hero">
    <div class="logo">BIG TUNA</div>
    <div class="date-display" id="date-display"></div>
    <div class="clock-digital" id="clock">
      <div class="digit-slot" id="h1"></div>
      <div class="digit-slot" id="h2"></div>
      <div class="clock-sep">:</div>
      <div class="digit-slot" id="m1"></div>
      <div class="digit-slot" id="m2"></div>
      <div class="clock-sep">:</div>
      <div class="digit-slot sec" id="s1"></div>
      <div class="digit-slot sec" id="s2"></div>
    </div>
  </header>

  <!-- Ask Emma (Eco AI assistant) -->
  <form id="ask-emma" action="/eco-ai/" method="get" autocomplete="off">
    <div class="emma-inner">
      <span class="emma-spark"><svg viewBox="0 0 24 24"><path d="M12 2.5l2.35 6.15L20.5 11l-6.15 2.35L12 19.5l-2.35-6.15L3.5 11l6.15-2.35L12 2.5Z"/></svg></span>
      <input id="emma-input" name="q" type="text" placeholder="Ask Emma…" aria-label="Ask Emma — open the Eco AI assistant">

  </form>

  <!-- Rainbow app grid -->
  <div class="grid">
    <a href="/climb-tracker/"  class="card" style="--tile: var(--c-red)" aria-label="Climb Tracker">
      <div class="icon"><svg class="ic" viewBox="0 0 24 24"><path d="M3 20h18L14 7l-3.5 6L8 9l-5 11Z"/></svg></div>
      <div class="name">Climb Tracker</div>
    </a>
    <a href="/workout-timer/"  class="card" style="--tile: var(--c-orange)" aria-label="Workout Timer">
      <div class="icon"><svg class="ic" viewBox="0 0 24 24"><path d="M9 2h6"/><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2.5"/></svg></div>
      <div class="name">Workout Timer</div>
    </a>
    <a href="/quiz-app/"       class="card" style="--tile: var(--c-yellow)" aria-label="Quizzes">
      <div class="icon"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg></div>
      <div class="name">Quizzes</div>
    </a>
    <a href="/psych-sheet/"    class="card" style="--tile: var(--c-green)" aria-label="Psych Sheet">
      <div class="icon"><svg class="ic" viewBox="0 0 24 24"><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 1.3 0 1.9-.5 2.5-1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 1.3 0 1.9-.5 2.5-1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 1.3 0 1.9-.5 2.5-1"/></svg></div>
      <div class="name">Psych Sheet</div>
    </a>
    <a href="/list-maker/"     class="card" style="--tile: var(--c-teal)" aria-label="Lists">
      <div class="icon"><svg class="ic" viewBox="0 0 24 24"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg></div>
      <div class="name">Lists</div>

    <a href="/assignments/"    class="card" style="--tile: var(--c-blue)" aria-label="Assignments">

      <div class="name">Assignments</div>
    </a>
    <a href="/world-map/"      class="card" style="--tile: var(--c-indigo)" aria-label="World Map">
      <div class="icon"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg></div>
      <div class="name">World Map</div>

    <a href="/pace-calculator/" class="card" style="--tile: var(--c-purple)" aria-label="Pace Calculator">
      <div class="icon"><svg class="ic" viewBox="0 0 24 24"><path d="M12 14l4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg></div>
      <div class="name">Pace Calculator</div>

    <a href="/capitals-quiz/"  class="card" style="--tile: var(--c-pink)" aria-label="Capitals Quiz">
      <div class="icon"><svg class="ic" viewBox="0 0 24 24"><path d="M3 22h18"/><path d="M6 18V11"/><path d="M10 18V11"/><path d="M14 18V11"/><path d="M18 18V11"/><path d="M12 2 21 8H3Z"/></svg></div>
      <div class="name">Capitals Quiz</div>
    </a>

</main>

<!-- Bottom-right corner tools -->
<div class="corner-tools">
  <div id="downloads-menu">
    <button id="downloads-btn" class="tool-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Downloads">
      <svg class="ic" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/></svg>
    </button>
    <div id="downloads-list" role="menu" aria-label="Available downloads">
      <a class="download-item" role="menuitem" href="https://github.com/yannickbigtuna-dev/BIG-TUNA/releases/download/lights-mac-latest/big-tuna-lights-mac.zip">Lights app</a>
      <a class="download-item" role="menuitem" href="https://github.com/yannickbigtuna-dev/BIG-TUNA/releases/download/weather-mac-latest/big-tuna-weather-mac.zip">Weather app</a>
      <a class="download-item" role="menuitem" href="https://github.com/yannickbigtuna-dev/BIG-TUNA/releases/download/codex-mac-latest/big-tuna-codex-mac.zip">Codex app</a>
    </div>
  </div>
  <a href="/lights/" id="lights-btn" class="tool-btn" aria-label="Lights">
    <svg class="ic" viewBox="0 0 24 24"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
  </a>
</div>

<script>
  // ── Date ──
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function updateDate() {
    const now = new Date();
    document.getElementById('date-display').textContent =
      `${days[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()}`;
  }
  updateDate();

  // ── Segment clock (per-digit roll) ──
  const slotState = {};
  function pruneSlot(slot, keep) {
    slot.querySelectorAll('.digit-val').forEach(el => { if (el !== keep) el.remove(); });
  }
  function setSlot(id, char) {
    const slot = document.getElementById(id);
    const existing = Array.from(slot.querySelectorAll('.digit-val'));
    const current = existing[existing.length - 1] || null;
    if (slotState[id] === char) {
      pruneSlot(slot, current);
      if (current) current.classList.remove('leaving', 'arriving');
      return;
    }
    slotState[id] = char;
    pruneSlot(slot, current);
    if (current) {
      current.classList.remove('arriving');
      current.classList.add('leaving');
      current.addEventListener('animationend', () => current.remove(), { once: true });
    }
    const next = document.createElement('div');
    next.className = 'digit-val arriving';
    next.textContent = char;
    slot.appendChild(next);
    next.addEventListener('animationend', () => { next.classList.remove('arriving'); pruneSlot(slot, next); }, { once: true });
  }
  function tickClock() {
    const t = new Date();
    const h = String(t.getHours()).padStart(2, '0');
    const m = String(t.getMinutes()).padStart(2, '0');
    const s = String(t.getSeconds()).padStart(2, '0');
    setSlot('h1', h[0]); setSlot('h2', h[1]);
    setSlot('m1', m[0]); setSlot('m2', m[1]);
    setSlot('s1', s[0]); setSlot('s2', s[1]);
    if (t.getHours() === 0 && t.getMinutes() === 0 && t.getSeconds() === 0) updateDate();
  }
  tickClock();
  setInterval(tickClock, 1000);

  // ── Ask Emma → Eco AI ──
  const emmaForm = document.getElementById('ask-emma');
  const emmaInput = document.getElementById('emma-input');
  emmaForm.addEventListener('submit', e => {
    e.preventDefault();
    const q = emmaInput.value.trim();
    window.location.href = q ? `/eco-ai/?q=${encodeURIComponent(q)}` : '/eco-ai/';
  });
  // ⌘K / Ctrl+K focuses the prompt
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      emmaInput.focus();
    }
  });

  // ── Temperature: Open-Meteo "feels like" ──
  const HALIFAX_WEATHER = { lat: 44.6488, lon: -63.5752 };
  async function fetchHomepageTemp(lat, lon) {
    const params = new URLSearchParams({
      latitude: lat, longitude: lon,
      current: 'apparent_temperature', temperature_unit: 'celsius',
    });
    const response = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
    if (!response.ok) throw new Error('Weather request failed');
    const data = await response.json();
    const temp = data && data.current && data.current.apparent_temperature;
    if (!Number.isFinite(temp)) throw new Error('Weather unavailable');
    document.getElementById('temp-value').textContent = `${Math.round(temp)}°`;
  }
  function getBrowserPosition() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) { reject(new Error('Geolocation unavailable')); return; }
      navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: false, timeout: 7000, maximumAge: 600000 });
    });
  }
  async function loadHomepageTemp() {
    try {
      const pos = await getBrowserPosition();
      await fetchHomepageTemp(pos.coords.latitude, pos.coords.longitude);
    } catch {
      try { await fetchHomepageTemp(HALIFAX_WEATHER.lat, HALIFAX_WEATHER.lon); }
      catch { document.getElementById('temp-value').textContent = '0°'; }
    }
  }
  loadHomepageTemp();

  // ── Mouse-follow atmosphere ──
  const atmosphere = document.getElementById('atmosphere');
  if (window.matchMedia('(pointer: fine)').matches) {
    document.addEventListener('mousemove', e => {
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      atmosphere.style.background =
        `radial-gradient(circle at ${x}% ${y}%, color-mix(in srgb, var(--accent) 4%, transparent) 0%, transparent 50%)`;
    });
  }
</script>

<script src="/auth.js"></script>
<script>
  // ── Downloads menu ──
  const downloadsMenu = document.getElementById('downloads-menu');
  const downloadsBtn = document.getElementById('downloads-btn');
  const setDownloadsOpen = open => {
    downloadsMenu.classList.toggle('is-open', open);
    downloadsBtn.setAttribute('aria-expanded', String(open));
  };
  downloadsBtn.addEventListener('click', event => {
    event.stopPropagation();
    setDownloadsOpen(!downloadsMenu.classList.contains('is-open'));
  });
  document.addEventListener('click', event => {
    if (!downloadsMenu.contains(event.target)) setDownloadsOpen(false);
  });
  document.addEventListener('keydown', event => {
    if (event.key === 'Escape') setDownloadsOpen(false);
  });
</script>
</body>
</html>
