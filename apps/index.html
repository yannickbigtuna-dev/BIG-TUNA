<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TUNA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(16px, 5vh, 40px) 20px;
    text-align: center;
    position: relative;
  }

  /* Temperature corner widget */
  #temp-widget {
    position: fixed;
    top: 24px;
    right: 28px;
    text-align: right;
    user-select: none;
  }
  #temp-value {
    font-size: 2.4rem;
    font-weight: 200;
    letter-spacing: -1px;
    color: #fff;
    line-height: 1;
  }
  #temp-label {
    font-size: 0.65rem;
    color: #444;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Big TUNA logo */
  .logo {
    font-size: clamp(3.5rem, 14vw, 8rem);
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1;
    color: #58a6ff;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #58a6ff 35%, #1f6feb 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Date display */
  .date-display {
    font-size: 0.9rem;
    color: #444;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: clamp(16px, 4vh, 32px);
  }

  /* ── Digital clock ── */
  .clock-digital {
    display: flex;
    align-items: center;
    gap: clamp(4px, 1.2vw, 8px);
    margin-bottom: clamp(20px, 6vh, 48px);
    user-select: none;
  }

  .digit-slot {
    position: relative;
    width: clamp(32px, 7.5vw, 52px);
    height: clamp(48px, 11vw, 76px);
    background: #111;
    border-radius: 8px;
    border: 1px solid #1e1e1e;
    overflow: hidden;
    /* inner drum shadow — top & bottom fade */
    box-shadow:
      inset 0 14px 16px -8px rgba(0,0,0,.9),
      inset 0 -14px 16px -8px rgba(0,0,0,.9),
      0 4px 20px rgba(0,0,0,.6);
  }
  .digit-slot.sec {
    border-color: #1f6feb;
    box-shadow:
      inset 0 14px 16px -8px rgba(0,0,0,.9),
      inset 0 -14px 16px -8px rgba(0,0,0,.9),
      0 4px 20px rgba(0,0,0,.6),
      0 0 12px rgba(88,166,255,.08);
  }

  .digit-val {
    position: absolute;
    width: 100%;
    text-align: center;
    font-family: 'SF Mono', ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
    font-size: clamp(26px, 6vw, 44px);
    font-weight: 700;
    line-height: clamp(48px, 11vw, 76px);
    color: #ddd;
    letter-spacing: -0.02em;
  }
  .digit-slot.sec .digit-val { color: #58a6ff; }

  /* roll animations */
  @keyframes roll-out-up {
    0%   { transform: translateY(0);     opacity: 1; }
    100% { transform: translateY(-115%); opacity: 0; }
  }
  @keyframes roll-in-up {
    0%   { transform: translateY(115%);  opacity: 0; }
    100% { transform: translateY(0);     opacity: 1; }
  }
  .digit-val.leaving { animation: roll-out-up 0.28s cubic-bezier(0.4,0,0.2,1) forwards; }
  .digit-val.arriving { animation: roll-in-up  0.28s cubic-bezier(0.4,0,0.2,1) forwards; }

  /* separator colon */
  .clock-sep {
    font-family: 'SF Mono', ui-monospace, monospace;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 300;
    color: #2a2a2a;
    padding-bottom: 3px;
    flex-shrink: 0;
  }
  .clock-sep.sec-sep { color: #1f6feb; }

  /* App grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    width: 100%;
    max-width: 600px;
  }

  .card {
    --accent: #58a6ff;
    --accent-soft: rgba(88,166,255,.16);
    position: relative;
    isolation: isolate;
    min-height: 128px;
    background:
      radial-gradient(circle at 28% 18%, var(--accent-soft), transparent 34%),
      linear-gradient(145deg, rgba(255,255,255,.07), rgba(255,255,255,.02) 48%, rgba(255,255,255,.045));
    border-radius: 14px;
    padding: 22px 16px 18px;
    text-decoration: none;
    color: #f4f7fb;
    transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease;
    border: 1px solid rgba(255,255,255,.1);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.08),
      0 14px 28px rgba(0,0,0,.28);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    overflow: hidden;
  }
  .card::after {
    content: "";
    position: absolute;
    inset: auto 18px 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: .85;
    z-index: -1;
  }
  .card:hover {
    transform: translateY(-5px);
    background:
      radial-gradient(circle at 28% 18%, color-mix(in srgb, var(--accent) 28%, transparent), transparent 38%),
      linear-gradient(145deg, rgba(255,255,255,.095), rgba(255,255,255,.032) 48%, rgba(255,255,255,.06));
    border-color: color-mix(in srgb, var(--accent) 65%, rgba(255,255,255,.2));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.12),
      0 18px 34px rgba(0,0,0,.35),
      0 0 24px color-mix(in srgb, var(--accent) 22%, transparent);
  }
  .card:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 4px;
  }
  .card .icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: grid;
    place-items: center;
    background: color-mix(in srgb, var(--accent) 18%, rgba(255,255,255,.06));
    border: 1px solid color-mix(in srgb, var(--accent) 35%, rgba(255,255,255,.1));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
    font-size: 1.9rem;
    line-height: 1;
  }
  .card .name {
    font-size: 0.93rem;
    font-weight: 700;
    line-height: 1.18;
    letter-spacing: 0;
  }
  .card:nth-child(2) { --accent: #ffcc66; --accent-soft: rgba(255,204,102,.15); }
  .card:nth-child(3) { --accent: #44d7b6; --accent-soft: rgba(68,215,182,.14); }
  .card:nth-child(4) { --accent: #ff8a7a; --accent-soft: rgba(255,138,122,.15); }
  .card:nth-child(5) { --accent: #7ee787; --accent-soft: rgba(126,231,135,.14); }
  .card:nth-child(6) { --accent: #c297ff; --accent-soft: rgba(194,151,255,.14); }
  .card:nth-child(7) { --accent: #f2a7d8; --accent-soft: rgba(242,167,216,.14); }

  #dev-btn {
    position: fixed;
    bottom: 18px;
    right: 82px;
    font-family: monospace;
    font-size: 11px;
    color: #2a2a2a;
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: color 0.2s;
    user-select: none;
  }
  #dev-btn:hover { color: #555; }

  #minimal-btn {
    position: fixed;
    left: 18px;
    bottom: 14px;
    min-width: 42px;
    height: 32px;
    padding: 0 10px;
    display: grid;
    place-items: center;
    font: 700 10px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #343434;
    background: rgba(255, 255, 255, 0.035);
    border: 1px solid rgba(255, 255, 255, 0.045);
    border-radius: 8px;
    cursor: pointer;
    transition: color 0.18s, background 0.18s, border-color 0.18s;
    user-select: none;
  }
  #minimal-btn:hover,
  #minimal-btn:focus-visible {
    color: #58a6ff;
    background: rgba(88, 166, 255, 0.08);
    border-color: rgba(88, 166, 255, 0.18);
    outline: none;
  }

  body.minimal-mode {
    justify-content: center;
    padding: clamp(16px, 5vh, 40px) 20px;
  }
  body.minimal-mode [data-auth-widget],
  body.minimal-mode #temp-widget,
  body.minimal-mode .grid,
  body.minimal-mode #dev-btn {
    display: none !important;
  }
  body.minimal-mode .logo {
    font-size: clamp(4rem, 16vw, 9rem);
    margin-bottom: 10px;
  }
  body.minimal-mode .date-display {
    margin-bottom: clamp(20px, 5vh, 42px);
  }
  body.minimal-mode .clock-digital {
    margin-bottom: 0;
  }

  #lights-btn {
    position: fixed;
    right: 20px;
    bottom: 14px;
    width: 42px;
    height: 42px;
    display: grid;
    place-items: center;
    color: #383838;
    text-decoration: none;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.035);
    border: 1px solid rgba(255, 255, 255, 0.045);
    transition: color 0.18s, background 0.18s, border-color 0.18s, box-shadow 0.18s;
    user-select: none;
  }
  #lights-btn:hover {
    color: #ffd36d;
    background: rgba(255, 211, 109, 0.08);
    border-color: rgba(255, 211, 109, 0.16);
    box-shadow: 0 0 18px rgba(255, 211, 109, 0.1);
  }
  #lights-btn svg {
    width: 21px;
    height: 21px;
    fill: currentColor;
  }

  @media (max-width: 600px) {
    body {
      min-height: 100svh;
      justify-content: flex-start;
      padding: calc(env(safe-area-inset-top, 0px) + 64px) 14px 18px;
    }

    #temp-widget {
      top: calc(env(safe-area-inset-top, 0px) + 14px);
      right: 14px;
    }

    #temp-value {
      font-size: 1.45rem;
      letter-spacing: 0;
    }

    #temp-label {
      font-size: 0.55rem;
    }

    .logo {
      font-size: clamp(2.75rem, 15vw, 3.4rem);
      margin-bottom: 5px;
    }

    .date-display {
      font-size: 0.72rem;
      margin-bottom: 12px;
    }

    .clock-digital {
      gap: 3px;
      margin-bottom: 16px;
    }

    .digit-slot {
      width: clamp(24px, 8vw, 31px);
      height: clamp(36px, 11vw, 42px);
      border-radius: 6px;
    }

    .digit-val {
      font-size: clamp(19px, 6.4vw, 24px);
      line-height: clamp(36px, 11vw, 42px);
    }

    .clock-sep {
      font-size: 1.35rem;
      padding-bottom: 1px;
    }

    .grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      max-width: 390px;
    }

    .card {
      min-height: 86px;
      padding: 12px 8px 10px;
      border-radius: 10px;
      gap: 6px;
    }

    .card:hover {
      transform: none;
    }

    .card .icon {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      font-size: 1.35rem;
      line-height: 1;
    }

    .card .name {
      font-size: 0.78rem;
      line-height: 1.15;
    }

    #dev-btn {
      right: 76px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 21px);
    }

    #minimal-btn {
      left: 16px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 17px);
      height: 30px;
      padding: 0 9px;
      font-size: 9px;
    }

    #lights-btn {
      right: 16px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
    }

    body.minimal-mode {
      justify-content: center;
      padding: calc(env(safe-area-inset-top, 0px) + 24px) 14px calc(env(safe-area-inset-bottom, 0px) + 52px);
    }

    body.minimal-mode .logo {
      font-size: clamp(3rem, 18vw, 4.4rem);
    }
  }
</style>
</head>
<body>

<!-- Account widget (injected by auth.js into this container) -->
<div data-auth-widget="left" style="position:fixed;top:20px;left:20px;z-index:300;"></div>


<!-- Temperature widget -->
<div id="temp-widget">
  <div id="temp-value">—</div>
  <div id="temp-label">feels like</div>
</div>

<div class="logo">BIG TUNA</div>
<div class="date-display" id="date-display"></div>

<!-- Digital clock -->
<div class="clock-digital" id="clock">
  <div class="digit-slot" id="h1"></div>
  <div class="digit-slot" id="h2"></div>
  <div class="clock-sep">:</div>
  <div class="digit-slot" id="m1"></div>
  <div class="digit-slot" id="m2"></div>
  <div class="clock-sep sec-sep">:</div>
  <div class="digit-slot sec" id="s1"></div>
  <div class="digit-slot sec" id="s2"></div>
</div>

<div class="grid">
  <a href="/workout-timer/" class="card">
    <div class="icon">⏱️</div>
    <div class="name">Workout Timer</div>
  </a>
  <a href="/quiz-app/" class="card">
    <div class="icon">❓</div>
    <div class="name">Quizzes</div>
  </a>
  <a href="/psych-sheet/" class="card">
    <div class="icon">🏊</div>
    <div class="name">Psych Sheet</div>
  </a>
  <a href="/list-maker/" class="card">
    <div class="icon">📋</div>
    <div class="name">Lists</div>
  </a>
  <a href="/world-map/" class="card">
    <div class="icon">🌍</div>
    <div class="name">World Map</div>
  </a>
  <a href="/pace-calculator/" class="card">
    <div class="icon">🏃</div>
    <div class="name">Pace Calculator</div>
  </a>
  <a href="/capitals-quiz/" class="card">
    <div class="icon">🏛</div>
    <div class="name">Capitals Quiz</div>
  </a>
</div>

<script>
  const MINIMAL_MODE_KEY = 'home_minimal_mode';

  function setMinimalMode(enabled) {
    document.body.classList.toggle('minimal-mode', enabled);
    localStorage.setItem(MINIMAL_MODE_KEY, enabled ? '1' : '0');
    const btn = document.getElementById('minimal-btn');
    if (btn) {
      btn.textContent = enabled ? 'Exit' : 'Min';
      btn.setAttribute('aria-label', enabled ? 'Exit minimal mode' : 'Enter minimal mode');
      btn.setAttribute('aria-pressed', String(enabled));
    }
  }

  setMinimalMode(localStorage.getItem(MINIMAL_MODE_KEY) === '1');

  // Date display
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('date-display').textContent =
    `${days[now.getDay()]}  ·  ${months[now.getMonth()]} ${now.getDate()}`;

  // ── Digital clock ──
  // Track last displayed value per slot
  const slotState = {};

  function pruneSlot(slot, keep) {
    slot.querySelectorAll('.digit-val').forEach(el => {
      if (el !== keep) el.remove();
    });
  }

  function setSlot(id, char) {
    const slot = document.getElementById(id);
    const existing = Array.from(slot.querySelectorAll('.digit-val'));
    const current = existing[existing.length - 1] || null;

    if (slotState[id] === char) {
      pruneSlot(slot, current);
      if (current) current.classList.remove('leaving', 'arriving');
      return; // no change, skip
    }

    slotState[id] = char;
    pruneSlot(slot, current);

    if (current) {
      current.classList.remove('arriving');
      current.classList.add('leaving');
      current.addEventListener('animationend', () => current.remove(), { once: true });
    }

    const next = document.createElement('div');
    next.className = 'digit-val arriving';
    next.textContent = char;
    slot.appendChild(next);
    next.addEventListener('animationend', () => {
      next.classList.remove('arriving');
      pruneSlot(slot, next);
    }, { once: true });
  }

  function tickClock() {
    const t = new Date();
    const h = String(t.getHours()).padStart(2, '0');
    const m = String(t.getMinutes()).padStart(2, '0');
    const s = String(t.getSeconds()).padStart(2, '0');
    setSlot('h1', h[0]); setSlot('h2', h[1]);
    setSlot('m1', m[0]); setSlot('m2', m[1]);
    setSlot('s1', s[0]); setSlot('s2', s[1]);
  }

  tickClock();
  setInterval(tickClock, 1000);

  // Temperature — feels like, using Open-Meteo (no API key needed)
  function fetchTemp(lat, lon) {
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=apparent_temperature&temperature_unit=celsius`)
      .then(r => r.json())
      .then(d => {
        const t = Math.round(d.current.apparent_temperature);
        document.getElementById('temp-value').textContent = `${t}°`;
      })
      .catch(() => {});
  }

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => fetchTemp(pos.coords.latitude, pos.coords.longitude),
      () => {}
    );
  }
</script>

<button id="minimal-btn" type="button" aria-label="Enter minimal mode" aria-pressed="false">Min</button>
<a href="/lights/" id="lights-btn" aria-label="Lights">
  <svg viewBox="0 0 24 24" aria-hidden="true">
    <path d="M9 21h6v-1.5H9V21Zm3-20C8.14 1 5 4.08 5 7.86c0 2.24 1.11 4.23 2.82 5.49.72.53 1.18 1.35 1.18 2.24V17h6v-1.41c0-.89.46-1.71 1.18-2.24A6.78 6.78 0 0 0 19 7.86C19 4.08 15.86 1 12 1Zm2.99 10.74A4.75 4.75 0 0 0 13 15.5h-2a4.75 4.75 0 0 0-1.99-3.76A4.77 4.77 0 0 1 7 7.86C7 5.18 9.24 3 12 3s5 2.18 5 4.86c0 1.54-.74 2.99-2.01 3.88Z"/>
  </svg>
</a>
<a href="/terminal/" id="dev-btn">&gt;_ dev</a>

<script src="/auth.js"></script>
<script>
  const minimalBtn = document.getElementById('minimal-btn');
  setMinimalMode(document.body.classList.contains('minimal-mode'));
  minimalBtn.addEventListener('click', () => {
    setMinimalMode(!document.body.classList.contains('minimal-mode'));
  });
</script>
</body>
</html>
